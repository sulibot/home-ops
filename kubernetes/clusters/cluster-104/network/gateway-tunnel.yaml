---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-tunnel
  namespace: network
  labels:
    app.kubernetes.io/part-of: cluster-104
    cilium.io/gateway: "true"
    bgp-advertise: "true"
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 10.104.250.12
    - type: IPAddress
      value: fd00:104:250::12
  infrastructure:
    labels:
      advertise: loadbalancer
      bgp-advertise: "true"
  listeners:
    - name: sulibot-https
      hostname: sulibot.com
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: sulibot-com-tls
    - name: sulibot-wildcard-https
      hostname: "*.sulibot.com"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: sulibot-com-tls
    - name: sulibot-http
      hostname: sulibot.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: sulibot-wildcard-http
      hostname: "*.sulibot.com"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
