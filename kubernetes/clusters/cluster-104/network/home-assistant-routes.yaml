---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant-browser
  namespace: default
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  hostnames:
    - hass.sulibot.com
  parentRefs:
    - name: gateway-tunnel
      namespace: network
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/oidc/redirect
    - backendRefs:
        - name: home-assistant
          port: 8123
---
