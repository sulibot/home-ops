---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: home-assistant-config
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-ha
  volumeMode: Filesystem
  local:
    path: /var/mnt/ha-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - talos01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
  namespace: default
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 80Gi
  storageClassName: local-ha
  volumeName: home-assistant-config
