apiVersion: v1
kind: PersistentVolume
metadata:
  name: music-assistant-config
  labels:
    app.kubernetes.io/name: music-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-music-assistant
  volumeMode: Filesystem
  local:
    path: /var/mnt/music-assistant-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - talos01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-assistant-config
  namespace: default
  labels:
    app.kubernetes.io/name: music-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-music-assistant
  volumeName: music-assistant-config
