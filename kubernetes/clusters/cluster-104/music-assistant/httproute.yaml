apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: music-assistant
  namespace: default
  labels:
    app.kubernetes.io/name: music-assistant
    app.kubernetes.io/part-of: cluster-104
spec:
  hostnames:
    - music-assistant.sulibot.com
    - ma.sulibot.com
  parentRefs:
    - name: gateway-tunnel
      namespace: network
  rules:
    - backendRefs:
        - name: music-assistant
          port: 8095
