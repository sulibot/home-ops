---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/daemonset.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cluster-104-log-forwarder
  namespace: log-forwarding
  labels:
    app.kubernetes.io/name: cluster-104-log-forwarder
    app.kubernetes.io/part-of: cluster-104
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-104-log-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-104-log-forwarder
        app.kubernetes.io/part-of: cluster-104
    spec:
      serviceAccountName: cluster-104-log-forwarder
      tolerations:
        - operator: Exists
      initContainers:
        - name: wait-for-loki
          image: curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              until curl -fsS --connect-timeout 5 --max-time 10 https://loki.sulibot.com/ready; do
                echo "waiting for loki.sulibot.com";
                sleep 30;
              done
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:4.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --config=/fluent-bit/etc/containers.conf
          ports:
            - name: metrics
              containerPort: 2020
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/containers.conf
              subPath: containers.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/custom_parsers.conf
              subPath: custom_parsers.conf
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: buffers
              mountPath: /var/log/fluent-bit-cluster104-buffers
            - name: state
              mountPath: /var/log/fluent-bit-cluster104-state
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: cluster-104-log-forwarder
        - name: containers
          hostPath:
            path: /var/log/containers
            type: Directory
        - name: pods
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: buffers
          hostPath:
            path: /var/log/fluent-bit-cluster104-buffers
            type: DirectoryOrCreate
        - name: state
          hostPath:
            path: /var/log/fluent-bit-cluster104-state
            type: DirectoryOrCreate
