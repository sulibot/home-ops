---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-104-event-forwarder
  namespace: log-forwarding
  labels:
    app.kubernetes.io/name: cluster-104-event-forwarder
    app.kubernetes.io/part-of: cluster-104
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-104-event-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-104-event-forwarder
        app.kubernetes.io/part-of: cluster-104
    spec:
      serviceAccountName: cluster-104-log-forwarder
      initContainers:
        - name: wait-for-loki
          image: curlimages/curl:8.21.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              until curl -fsS --connect-timeout 5 --max-time 10 https://loki.sulibot.com/ready; do
                echo "waiting for loki.sulibot.com";
                sleep 30;
              done
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:4.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --config=/fluent-bit/etc/events.conf
          ports:
            - name: metrics
              containerPort: 2021
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/events.conf
              subPath: events.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/scripts/kubernetes_event_labels.lua
              subPath: kubernetes_event_labels.lua
              readOnly: true
            - name: state
              mountPath: /var/lib/fluent-bit-cluster104-events
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: cluster-104-log-forwarder
        - name: state
          emptyDir: {}
