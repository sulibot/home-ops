---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-observer-config
  namespace: observer
  labels:
    app.kubernetes.io/name: gatus-observer
    app.kubernetes.io/part-of: cluster-104
data:
  config.yaml: |-
    endpoints:
      - name: Internet DNS IPv4
        group: network
        url: tcp://1.1.1.1:53
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: RouterOS API
        group: network
        url: tcp://10.30.0.254:443
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: PVE01 API
        group: pve
        url: tcp://[fd00:10::1]:8006
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: PVE02 API
        group: pve
        url: tcp://[fd00:10::2]:8006
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: PVE03 API
        group: pve
        url: tcp://[fd00:10::3]:8006
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: Cluster 101 API VIP
        group: cluster-101
        url: tcp://[fd00:101::10]:6443
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Cluster 101 Grafana
        group: cluster-101-observability
        url: https://grafana.sulibot.com/
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Cluster 101 Prometheus
        group: cluster-101-observability
        url: https://prometheus.sulibot.com/-/ready
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Cluster 101 Alertmanager
        group: cluster-101-observability
        url: https://alertmanager.sulibot.com/-/ready
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Cluster 101 Status Page
        group: cluster-101-observability
        url: https://status.sulibot.com/
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] == 200"

      - name: Cluster 104 API
        group: cluster-104
        url: tcp://10.104.0.4:6443
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: Cluster 104 Gateway Internal
        group: cluster-104
        url: tcp://[fd00:104:250::11]:443
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: Cluster 104 Gateway Tunnel
        group: cluster-104
        url: tcp://[fd00:104:250::12]:443
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: Hubble Metrics
        group: cluster-104
        url: http://hubble-metrics.kube-system.svc:9965/metrics
        interval: 1m
        client:
          timeout: 5s
        conditions:
          - "[STATUS] == 200"

      - name: Home Assistant
        group: cluster-104-apps
        url: https://hass.sulibot.com/
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Home Assistant Dashboard
        group: cluster-104-apps
        url: https://hass-app.sulibot.com/lovelace/default_view
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Home Assistant Google Assistant
        group: cluster-104-apps
        url: https://ha-google.sulibot.com/api/google_assistant
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Music Assistant
        group: cluster-104-apps
        url: https://music-assistant.sulibot.com/
        interval: 1m
        client:
          timeout: 10s
        conditions:
          - "[STATUS] >= 200"
          - "[STATUS] < 500"

      - name: Matter Server
        group: cluster-104-apps
        url: tcp://matter-server.matter-server.svc.cluster.local:5580
        interval: 1m
        conditions:
          - "[CONNECTED] == true"

      - name: OTBR REST
        group: cluster-104-apps
        url: http://otbr.otbr.svc.cluster.local:8081/node
        interval: 1m
        client:
          timeout: 5s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].state == router"
          - "[BODY].routerCount >= 3"

      - name: OTBR Router State
        group: cluster-104-apps
        url: http://otbr.otbr.svc.cluster.local:8081/node
        interval: 1m
        client:
          timeout: 5s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].state == router"

    metrics: true

    storage:
      type: sqlite
      caching: true
      path: /data/gatus.db

    ui:
      title: Observer | Cluster 104
      header: Cluster 104 Observer
      link: https://github.com/sulibot/home-ops

    web:
      port: 8080
