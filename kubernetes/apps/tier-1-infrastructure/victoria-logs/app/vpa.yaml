---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: victoria-logs-server
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: victoria-logs-server
  updatePolicy:
    updateMode: "Initial"
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: "4"
          memory: 16Gi
