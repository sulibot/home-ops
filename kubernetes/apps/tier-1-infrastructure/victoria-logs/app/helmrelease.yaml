---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    global:
      victoriaLogs:
        server:
          fullnameOverride: victoria-logs
    server:
      # Side-by-side trial next to Loki: fluent-bit dual-writes via the
      # Loki-compatible push endpoint (/insert/loki/api/v1/push). Evaluate
      # query speed + vmui ergonomics for two weeks, then keep one.
      retentionPeriod: 7d
      persistentVolume:
        enabled: true
        storageClassName: csi-cephfs-config-sc
        size: 20Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      vmServiceScrape:
        enabled: true
