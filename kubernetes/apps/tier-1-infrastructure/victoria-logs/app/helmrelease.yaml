---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: victoria-logs-server
            patch: |-
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe
                value:
                  exec:
                    command:
                      - sh
                      - -c
                      - wget -q -O- http://127.0.0.1:9428/health >/dev/null
                  failureThreshold: 10
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  successThreshold: 1
                  timeoutSeconds: 5
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe
                value:
                  exec:
                    command:
                      - sh
                      - -c
                      - wget -q -O- http://127.0.0.1:9428/health >/dev/null
                  failureThreshold: 3
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  successThreshold: 1
                  timeoutSeconds: 5
  interval: 1h
  timeout: 10m  # Give more time for chart installation during bootstrap
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    fullnameOverride: victoria-logs
    server:
      retentionPeriod: 14d
      persistentVolume:
        enabled: true
        storageClassName: csi-cephfs-config-sc
        size: 20Gi
      # Use wildcard listen addr (instead of bracketed IPv6) to avoid invalid bind parsing.
      # This keeps kubelet probes healthy on dual-stack clusters.
      extraArgs:
        httpListenAddr: ":9428"
      # Victoria Logs listens on IPv4 only in this image build; keep service IPv4-only
      # to avoid intermittent connection refusals from IPv6 endpoint selection.
      service:
        ipFamilyPolicy: SingleStack
        ipFamilies:
          - IPv4
      route:
        enabled: true
        hostnames:
          - victoria-logs.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
