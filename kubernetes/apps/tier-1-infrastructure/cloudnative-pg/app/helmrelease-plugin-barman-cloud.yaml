---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Barman Cloud Plugin for CNPG — replaces deprecated inline barmanObjectStore.
# Runs as a sidecar alongside each postgres instance pod, handles WAL archiving
# and base backups via the plugin GRPC interface. Hot-reloads credentials.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-plugin-barman-cloud
  namespace: default
spec:
  dependsOn:
    - name: cert-manager
      namespace: flux-system
  chartRef:
    kind: OCIRepository
    name: cnpg-plugin-barman-cloud
    namespace: default
  interval: 1h0m0s
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: cnpg-plugin-barman-cloud
            patch: |
              - op: remove
                path: /spec/template/spec/containers/0/args/5
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
                value: 5
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
                value: 6
