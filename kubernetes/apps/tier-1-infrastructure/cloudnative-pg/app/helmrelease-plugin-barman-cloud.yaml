---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Barman Cloud Plugin for CNPG — replaces deprecated inline barmanObjectStore.
# Runs as a sidecar alongside each postgres instance pod, handles WAL archiving
# and base backups via the plugin GRPC interface. Hot-reloads credentials.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-plugin-barman-cloud
  namespace: default
spec:
  chart:
    spec:
      chart: plugin-barman-cloud
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      version: 0.5.0
  interval: 1h0m0s
