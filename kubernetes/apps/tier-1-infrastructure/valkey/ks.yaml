---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: valkey
  namespace: flux-system
  labels:
    layer: "data"
    component: cache
    critical: "false"
spec:
  dependsOn:
    - name: onepassword
      namespace: flux-system
    - name: storage-ready
      namespace: flux-system
  interval: 15m
  retryInterval: 30s
  path: ./kubernetes/apps/tier-1-infrastructure/valkey/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: valkey
      namespace: default
