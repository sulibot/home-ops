---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vpn
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "vpn",
      "plugins": [
        {
          "type": "macvlan",
          # bond0 doesn't exist on cluster-101 (VM nodes, no physical NIC
          # bonding) - it's down on all 6 nodes, confirmed 2026-07-18. Every
          # other working NAD (vlan10/30/31) uses ens19.<vlan> instead.
          "master": "ens19.90",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "routes": [
              {"dst": "::/0", "gw": "fd00:90::1"}
            ]
          }
        }
      ]
    }
