---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan10
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "vlan10",
      "plugins": [
        {
          "type": "macvlan",
          "master": "ens19.10",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "addresses": [
              {"address": "10.10.0.253/24"},
              {"address": "fd00:10::253/64"}
            ],
            "routes": [
              {"dst": "0.0.0.0/0", "gw": "10.10.0.254"},
              {"dst": "::/0", "gw": "fd00:10::fffe"}
            ]
          }
        },
        {
          "type": "sbr"
        }
      ]
    }
