---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-ready
  namespace: flux-system
  labels:
    layer: "capability"
    component: ingress
    critical: "false"
spec:
  dependsOn:
    - name: cilium-gateway
      namespace: flux-system
  interval: 15m
  retryInterval: 30s
  path: ./kubernetes/apps/tier-1-infrastructure/ingress-ready/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: flux-system
  wait: true
  healthChecks:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      name: cilium
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      name: gateway-tunnel
      namespace: network
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      name: gateway-internal
      namespace: network
