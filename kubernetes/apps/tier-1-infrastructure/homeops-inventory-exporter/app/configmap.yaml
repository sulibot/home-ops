---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeops-inventory-exporter
data:
  exporter.py: |
    #!/usr/bin/env python3
    import json
    import os
    import re
    import socket
    import ssl
    import time
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    API = "https://kubernetes.default.svc"
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    PORT = int(os.environ.get("PORT", "9808"))
    CACHE_TTL_SECONDS = int(os.environ.get("CACHE_TTL_SECONDS", "30"))

    cache = {
        "expires": 0,
        "body": "",
    }

    def prom_escape(value):
        if value is None:
            return ""
        return str(value).replace("\\", "\\\\").replace("\n", "\\n").replace('"', '\\"')

    def metric(name, labels, value=1):
        label_text = ",".join(f'{k}="{prom_escape(v)}"' for k, v in sorted(labels.items()))
        return f"{name}{{{label_text}}} {value}"

    def kube_get(path):
        with open(TOKEN_PATH, "r", encoding="utf-8") as token_file:
            token = token_file.read().strip()

        context = ssl.create_default_context(cafile=CA_PATH)
        request = urllib.request.Request(
            API + path,
            headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/json",
            },
        )
        with urllib.request.urlopen(request, context=context, timeout=10) as response:
            return json.loads(response.read().decode("utf-8"))

    def owner_for_pod(pod):
        owners = pod.get("metadata", {}).get("ownerReferences", []) or []
        if not owners:
            return "", ""
        owner = owners[0]
        kind = owner.get("kind", "")
        name = owner.get("name", "")
        if kind == "ReplicaSet":
            deployment = re.sub(r"-[a-f0-9]{9,10}$", "", name)
            if deployment != name:
                return "Deployment", deployment
        return kind, name

    def node_placement(node):
        metadata = node.get("metadata", {})
        labels = metadata.get("labels", {}) or {}
        annotations = metadata.get("annotations", {}) or {}
        node_name = metadata.get("name", "")
        pve_node = (
            labels.get("topology.kubernetes.io/zone")
            or labels.get("failure-domain.beta.kubernetes.io/zone")
            or labels.get("homeops.sulibot.com/pve-node")
            or annotations.get("homeops.sulibot.com/pve-node")
            or ""
        )
        vmid = (
            labels.get("homeops.sulibot.com/vmid")
            or annotations.get("homeops.sulibot.com/vmid")
            or labels.get("proxmox.io/vmid")
            or annotations.get("proxmox.io/vmid")
            or ""
        )
        return node_name, pve_node, vmid

    def pv_ceph_labels(pv):
        metadata = pv.get("metadata", {})
        spec = pv.get("spec", {})
        csi = spec.get("csi", {}) or {}
        attrs = csi.get("volumeAttributes", {}) or {}
        driver = csi.get("driver", "")
        handle = csi.get("volumeHandle", "")
        storageclass = spec.get("storageClassName", "")

        pool = attrs.get("pool") or attrs.get("poolName") or attrs.get("pool_name") or ""
        image = attrs.get("imageName") or attrs.get("image") or ""
        fs_name = attrs.get("fsName") or attrs.get("fs_name") or ""
        root_path = attrs.get("rootPath") or attrs.get("root_path") or ""

        # ceph-csi RBD volume handles often contain enough identity to correlate manually
        # even when pool/image attributes are not exposed in the PV.
        if driver.endswith("rbd.csi.ceph.com") and not image:
            image = handle

        return {
            "persistentvolume": metadata.get("name", ""),
            "storageclass": storageclass,
            "driver": driver,
            "volume_handle": handle,
            "pool_name": pool,
            "image": image,
            "fs_name": fs_name,
            "root_path": root_path,
        }

    def build_metrics():
        lines = [
            "# HELP homeops_inventory_exporter_build_info Static exporter build info.",
            "# TYPE homeops_inventory_exporter_build_info gauge",
            'homeops_inventory_exporter_build_info{version="0.1.0"} 1',
            "# HELP homeops_kube_pod_pvc_info Kubernetes pod to PVC mapping.",
            "# TYPE homeops_kube_pod_pvc_info gauge",
            "# HELP homeops_kube_pvc_pv_info Kubernetes PVC to PV mapping.",
            "# TYPE homeops_kube_pvc_pv_info gauge",
            "# HELP homeops_kube_pv_ceph_info Kubernetes PV to Ceph CSI backend mapping.",
            "# TYPE homeops_kube_pv_ceph_info gauge",
            "# HELP homeops_kube_node_vm_info Kubernetes node to Proxmox placement hint mapping.",
            "# TYPE homeops_kube_node_vm_info gauge",
        ]

        pods = kube_get("/api/v1/pods").get("items", [])
        pvcs = kube_get("/api/v1/persistentvolumeclaims").get("items", [])
        pvs = kube_get("/api/v1/persistentvolumes").get("items", [])
        nodes = kube_get("/api/v1/nodes").get("items", [])

        for node in nodes:
            node_name, pve_node, vmid = node_placement(node)
            lines.append(metric("homeops_kube_node_vm_info", {
                "node": node_name,
                "pve_node": pve_node,
                "vmid": vmid,
            }))

        for pvc in pvcs:
            metadata = pvc.get("metadata", {})
            spec = pvc.get("spec", {})
            namespace = metadata.get("namespace", "")
            name = metadata.get("name", "")
            pv_name = spec.get("volumeName", "")
            storageclass = spec.get("storageClassName", "")
            if pv_name:
                lines.append(metric("homeops_kube_pvc_pv_info", {
                    "namespace": namespace,
                    "persistentvolumeclaim": name,
                    "persistentvolume": pv_name,
                    "storageclass": storageclass,
                }))

        for pv in pvs:
            labels = pv_ceph_labels(pv)
            if labels["driver"]:
                lines.append(metric("homeops_kube_pv_ceph_info", labels))

        for pod in pods:
            metadata = pod.get("metadata", {})
            spec = pod.get("spec", {})
            namespace = metadata.get("namespace", "")
            pod_name = metadata.get("name", "")
            node_name = spec.get("nodeName", "")
            workload_kind, workload = owner_for_pod(pod)
            for volume in spec.get("volumes", []) or []:
                claim = (volume.get("persistentVolumeClaim") or {}).get("claimName")
                if not claim:
                    continue
                lines.append(metric("homeops_kube_pod_pvc_info", {
                    "namespace": namespace,
                    "pod": pod_name,
                    "node": node_name,
                    "volume": volume.get("name", ""),
                    "persistentvolumeclaim": claim,
                    "workload": workload,
                    "workload_kind": workload_kind,
                }))

        lines.append("")
        return "\n".join(lines)

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok\n")
                return

            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return

            now = time.time()
            if cache["expires"] < now:
                try:
                    cache["body"] = build_metrics()
                    cache["expires"] = now + CACHE_TTL_SECONDS
                except Exception as exc:
                    cache["body"] = (
                        "# HELP homeops_inventory_exporter_error Exporter collection error.\n"
                        "# TYPE homeops_inventory_exporter_error gauge\n"
                        f'homeops_inventory_exporter_error{{message="{prom_escape(exc)}"}} 1\n'
                    )
                    cache["expires"] = now + 5

            body = cache["body"].encode("utf-8")
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            return

    class IPv6HTTPServer(ThreadingHTTPServer):
        address_family = socket.AF_INET6

    if __name__ == "__main__":
        server = IPv6HTTPServer(("::", PORT), Handler)
        server.serve_forever()
