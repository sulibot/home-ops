---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeops-inventory-exporter
  labels:
    app.kubernetes.io/name: homeops-inventory-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homeops-inventory-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeops-inventory-exporter
    spec:
      serviceAccountName: homeops-inventory-exporter
      containers:
        - name: exporter
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/exporter.py
          ports:
            - name: metrics
              containerPort: 9808
              protocol: TCP
          env:
            - name: PORT
              value: "9808"
            - name: CACHE_TTL_SECONDS
              value: "30"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: app
          configMap:
            name: homeops-inventory-exporter
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
