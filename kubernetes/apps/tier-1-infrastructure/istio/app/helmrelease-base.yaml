---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: istio-base
    namespace: istio-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Istio base contains CRDs and cluster-wide resources
    defaultRevision: default
    # Validate webhook disabled (conflicts with CNI)
    validateWebhook: false
