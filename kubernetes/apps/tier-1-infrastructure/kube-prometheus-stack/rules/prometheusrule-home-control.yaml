---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: home-control-rules
  namespace: observability
spec:
  groups:
    - name: home-control.cluster-104
      interval: 30s
      rules:
        - alert: Cluster104HomeAssistantMetricsDown
          expr: |
            up{cluster="cluster-104",app="home-assistant",service="home-assistant"} == 0
            or absent(up{cluster="cluster-104",app="home-assistant",service="home-assistant"})
          for: 3m
          labels:
            severity: critical
            component: home-assistant
          annotations:
            summary: "Cluster-104 Home Assistant metrics are not being scraped"
            description: |
              Prometheus cannot scrape Home Assistant's /api/prometheus endpoint
              through hass-app.sulibot.com. Check Home Assistant, the cluster-104
              internal gateway, split DNS, and the cluster-104 tunnel/gateway path.

        - alert: HomeAssistantWallSwitchAutomationDisabled
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.wall_switch_automation_disabled_count"
            } > 0
          for: 2m
          labels:
            severity: critical
            component: home-assistant
          annotations:
            summary: "A wall-switch control automation is disabled"
            description: |
              One or more Home Assistant wall-switch automations is not enabled.
              Wall dimmers may stop controlling the Matter bulbs even when the
              switches and bulbs are individually reachable.

        - alert: HomeAssistantControlledMatterLightsUnavailable
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity=~"sensor.(living_room|master_bedroom|sebby_bedroom)_controlled_lights_unavailable_count"
            } > 0
          for: 5m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "Controlled Matter lights are unavailable in {{ $labels.friendly_name }}"
            description: |
              Home Assistant reports one or more Matter lights controlled by a
              room wall switch as unavailable. The room switch automation skips
              unavailable targets, so the room may appear partially broken.

        - alert: HomeAssistantWallSwitchTargetMismatch
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity=~"sensor.(living_room|master_bedroom|sebby_bedroom)_wall_switch_target_mismatch_count"
            } > 0
          for: 2m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "Wall switch and controlled lights disagree in {{ $labels.friendly_name }}"
            description: |
              A room wall switch is on or off, but one or more reachable target
              lights did not settle to the same state. Check the Matter bulb,
              Thread network, Home Assistant automation traces, and matter-server
              logs for command failures.

        - alert: HomeAssistantWallSwitchFollowFailure
          expr: |
            increase(hass_counter_value{
              cluster="cluster-104",
              entity="counter.wall_switch_follow_failures"
            }[15m]) > 0
          for: 0m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "A wall switch failed to drive its configured lights"
            description: |
              Home Assistant incremented the wall-switch follow-failure counter.
              This means a switch changed state but either all target bulbs were
              unavailable or at least one reachable bulb failed to follow within
              the automation timeout.

        - alert: HomeAssistantSemanticMetricsMissing
          expr: |
            absent(hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.ikea_button_event_stale_count"
            })
            or absent(hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.music_assistant_core_players_unavailable_count"
            })
            or absent(hass_sensor_unit_percent{
              cluster="cluster-104",
              entity="sensor.home_assistant_config_disk_used_percent"
            })
          for: 30m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "Cluster-104 Home Assistant semantic health metrics are missing"
            description: |
              Home Assistant is being scraped, but one or more expected semantic
              health sensors is absent. Check configuration.yaml load status and
              restart/reload Home Assistant after GitOps applies the ConfigMap.

        - alert: HomeAssistantIkeaButtonEventsStale
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.ikea_button_event_stale_count"
            } > 0
          for: 30m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "One or more monitored IKEA buttons has not emitted an event recently"
            description: |
              A monitored IKEA BILRESA button has no usable button event within
              the last 14 days, or its button event entities are unavailable.
              This excludes the intentionally unassigned green button, but
              includes the named stale green device record for cleanup visibility.

        - alert: HomeAssistantIkeaButtonBatteryLow
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.ikea_button_battery_low_count"
            } > 0
          for: 30m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "One or more monitored IKEA buttons has low battery"
            description: |
              A monitored IKEA BILRESA battery sensor is below 20%. Replace the
              battery before the button stops emitting events.

        - alert: HomeAssistantIkeaButtonBatteryTelemetryMissing
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.ikea_button_battery_unavailable_count"
            } > 0
          for: 15m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "One or more monitored IKEA button battery sensors is unavailable"
            description: |
              Home Assistant cannot read battery telemetry for at least one
              monitored IKEA BILRESA button. Check Matter/Thread reachability,
              battery state, and whether the device was removed or re-paired.

        - alert: HomeAssistantMusicPlayersUnavailable
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.music_assistant_core_players_unavailable_count"
            } > 0
          for: 5m
          labels:
            severity: warning
            component: music-assistant
          annotations:
            summary: "A core Music Assistant/Sonos player is unavailable"
            description: |
              Home Assistant reports one or more core Music Assistant/Sonos
              players as unavailable or unknown. Voice scripts may fail or play
              in the wrong room until discovery/player health recovers.

        - alert: HomeAssistantMusicScriptTargetsUnavailable
          expr: |
            hass_sensor_state{
              cluster="cluster-104",
              entity="sensor.music_assistant_script_targets_unavailable_count"
            } > 0
          for: 5m
          labels:
            severity: warning
            component: music-assistant
          annotations:
            summary: "A Home Assistant music script target is unavailable"
            description: |
              One or more media_player entities used by the KQED or sleep-music
              scripts is unavailable. Check Music Assistant, Sonos VLAN reachability,
              and player discovery before relying on voice-triggered scripts.

        - alert: HomeAssistantConfigDiskUsageHigh
          expr: |
            hass_sensor_unit_percent{
              cluster="cluster-104",
              entity="sensor.home_assistant_config_disk_used_percent"
            } > 80
          for: 30m
          labels:
            severity: warning
            component: home-assistant
          annotations:
            summary: "Home Assistant config volume usage is above 80%"
            description: |
              The /config volume inside Home Assistant is above 80% used. Review
              recorder growth, backups, media/cache directories, and local PV usage.

        - alert: HomeAssistantConfigDiskUsageCritical
          expr: |
            hass_sensor_unit_percent{
              cluster="cluster-104",
              entity="sensor.home_assistant_config_disk_used_percent"
            } > 90
          for: 10m
          labels:
            severity: critical
            component: home-assistant
          annotations:
            summary: "Home Assistant config volume usage is above 90%"
            description: |
              The /config volume inside Home Assistant is critically full. HA can
              become unstable if recorder or storage writes fail.
