---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
  namespace: observability
spec:
  route:
    receiver: blackhole
    repeatInterval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: AlertmanagerFailedToSendAlerts|AlertmanagerClusterFailedToSendAlerts
            matchType: =~
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: buddy-heartbeat
        groupWait: 0s
        repeatInterval: 2m30s
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      # Linear is the durable work log: always create/update a ticket for
      # actionable severities, regardless of time of day.
      - receiver: linear
        continue: true
        matchers:
          - name: severity
            value: warning|critical
            matchType: =~
      # Critical always interrupts, day or night.
      - receiver: pushover
        continue: true
        matchers:
          - name: severity
            value: critical
            matchType: =
      # Warning-level pages are muted overnight; the Linear ticket above still
      # captures them for review in the morning.
      - receiver: pushover
        continue: true
        muteTimeIntervals:
          - quiet-hours
        matchers:
          - name: severity
            value: warning
            matchType: =
      - receiver: email
        matchers:
          - name: severity
            value: critical
            matchType: =
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m

  timeIntervals:
    - name: quiet-hours
      timeIntervals:
        # MANUAL STEP: set `location` to your IANA timezone (e.g. America/New_York);
        # Alertmanager defaults to UTC otherwise. Adjust start/end to taste.
        - times:
            - startTime: "22:00"
              endTime: "23:59"
          weekdays:
            - "monday:sunday"
        - times:
            - startTime: "00:00"
              endTime: "07:00"
          weekdays:
            - "monday:sunday"

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =

  receivers:
    - name: blackhole
    - name: linear
      webhookConfigs:
        - url: http://alertmanager-linear-bridge.observability.svc.cluster.local:9096/webhook
          sendResolved: true
    - name: buddy-heartbeat
      webhookConfigs:
        - httpConfig:
            bearerTokenSecret:
              name: alertmanager-secret
              key: BUDDY_HEARTBEAT_TOKEN
          urlSecret:
            name: alertmanager-secret
            key: BUDDY_HEARTBEAT_URL
    - name: pushover
      pushoverConfigs:
        - html: true
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          sendResolved: true
          sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          ttl: 86400s
          token:
            name: alertmanager-secret
            key: ALERTMANAGER_PUSHOVER_TOKEN
          userKey:
            name: alertmanager-secret
            key: PUSHOVER_USER_KEY
          urlTitle: View in Alertmanager
    - name: email
      emailConfigs:
        - to: sahmad@sulibot.com,sulibot@sulibot.com
          from: noreply@sulibot.com
          smarthost: smtp-relay.default.svc.cluster.local:25
          requireTLS: false
          sendResolved: true
          text: |-
            {{ template "default.message" . }}
