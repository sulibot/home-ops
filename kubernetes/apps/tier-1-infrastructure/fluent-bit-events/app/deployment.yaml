---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit-events
  labels:
    app.kubernetes.io/name: fluent-bit-events
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-events
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-events
    spec:
      serviceAccountName: fluent-bit-events
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:4.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --config=/fluent-bit/etc/fluent-bit.conf
          ports:
            - name: metrics
              containerPort: 2022
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 15m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/scripts/kubernetes_event_labels.lua
              subPath: kubernetes_event_labels.lua
              readOnly: true
            - name: state
              mountPath: /var/lib/fluent-bit-events
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: fluent-bit-events
        - name: state
          persistentVolumeClaim:
            claimName: fluent-bit-events-state
