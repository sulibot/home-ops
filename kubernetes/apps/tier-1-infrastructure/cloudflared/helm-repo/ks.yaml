---
# Flux Kustomization for cloudflare HelmRepository
# Created in flux-system namespace to be referenced by cloudflared HelmRelease

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared-helm-repo
  namespace: flux-system
  labels:
    layer: infrastructure
spec:
  interval: 15m
  retryInterval: 30s
  path: ./kubernetes/apps/tier-1-infrastructure/cloudflared/helm-repo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: flux-system
  wait: false
