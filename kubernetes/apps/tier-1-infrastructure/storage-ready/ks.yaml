---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-ready
  namespace: flux-system
  labels:
    layer: "capability"
    component: storage
    critical: "false"
spec:
  dependsOn:
    - name: ceph-csi
      namespace: flux-system
  interval: ${TIER1_INTERVAL:=15m}
  retryInterval: ${TIER1_RETRY_INTERVAL:=30s}
  path: ./kubernetes/apps/tier-1-infrastructure/storage-ready/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: flux-system
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: ceph-csi-cephfs-nodeplugin
      namespace: ceph-csi
    - apiVersion: apps/v1
      kind: DaemonSet
      name: ceph-csi-rbd-nodeplugin
      namespace: ceph-csi
    - apiVersion: apps/v1
      kind: Deployment
      name: ceph-csi-cephfs-provisioner
      namespace: ceph-csi
    - apiVersion: apps/v1
      kind: Deployment
      name: ceph-csi-rbd-provisioner
      namespace: ceph-csi
