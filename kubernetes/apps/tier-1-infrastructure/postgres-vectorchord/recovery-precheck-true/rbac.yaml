apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-vectorchord-recovery-precheck
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-vectorchord-recovery-precheck
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-vectorchord-recovery-precheck
  namespace: default
subjects:
  - kind: ServiceAccount
    name: postgres-vectorchord-recovery-precheck
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-vectorchord-recovery-precheck
