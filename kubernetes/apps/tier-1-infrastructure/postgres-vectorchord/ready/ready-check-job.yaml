apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-vectorchord-ready-check
  namespace: default
  labels:
    app.kubernetes.io/name: postgres-vectorchord
    app.kubernetes.io/component: ready-check
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 1800
  template:
    spec:
      serviceAccountName: postgres-vectorchord-ready-check
      restartPolicy: Never
      containers:
        - name: ready-check
          image: public.ecr.aws/bitnami/kubectl:1.34.1
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              CLUSTER=postgres-vectorchord
              NS=default

              run_psql() {
                kubectl -n "${NS}" exec "${PRIMARY_POD}" -- psql -U postgres -Atqc "$1"
              }

              echo "Waiting for CNPG primary pod..."
              timeout 1200 bash -ec '
                while true; do
                  PRIMARY="$(kubectl -n "'"${NS}"'" get clusters.postgresql.cnpg.io "'"${CLUSTER}"'" -o jsonpath="{.status.currentPrimary}" 2>/dev/null || true)"
                  if [ -n "${PRIMARY}" ]; then
                    echo "${PRIMARY}" > /tmp/primary_pod
                    break
                  fi
                  sleep 5
                done
              '
              PRIMARY_POD="$(cat /tmp/primary_pod)"

              echo "Waiting for pod ${PRIMARY_POD} to become Ready..."
              kubectl -n "${NS}" wait --for=condition=Ready "pod/${PRIMARY_POD}" --timeout=1200s

              IN_RECOVERY="$(run_psql "SELECT pg_is_in_recovery();")"
              if [ "${IN_RECOVERY}" != "f" ]; then
                echo "Database is still in recovery mode."
                exit 1
              fi

              # Capability-based check: only verify DBs explicitly declared via CNPG Database CRs.
              mapfile -t REQUIRED_DBS < <(kubectl -n "${NS}" get databases.postgresql.cnpg.io \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null | sed '/^$/d' || true)

              if [ "${#REQUIRED_DBS[@]}" -eq 0 ]; then
                echo "No CNPG Database CRs found; skipping per-database existence checks."
              fi

              for DB in "${REQUIRED_DBS[@]}"; do
                EXISTS="$(run_psql "SELECT 1 FROM pg_database WHERE datname='${DB}';" || true)"
                if [ "${EXISTS}" != "1" ]; then
                  echo "Declared database '${DB}' is not present yet."
                  exit 1
                fi
              done

              kubectl -n "${NS}" exec "${PRIMARY_POD}" -- \
                psql -U postgres -d postgres -Atqc "BEGIN; CREATE TEMP TABLE __ready_probe(id int); INSERT INTO __ready_probe VALUES (1); ROLLBACK;"

              echo "postgres-vectorchord is ready for dependent applications."
