---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Pulls MinIO service-account credentials from 1Password and creates the
# cnpg-barman-s3 Secret that CNPG reads for barmanObjectStore WAL archiving.
# 1Password item "minio" in the Kubernetes vault must have fields:
#   access-key  — MinIO service account access key ID (e.g. "cnpg-barman")
#   secret-key  — MinIO service account secret key (random, from terragrunt apply)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-barman-s3
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cnpg-barman-s3
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: minio
        property: access-key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: minio
        property: secret-key
