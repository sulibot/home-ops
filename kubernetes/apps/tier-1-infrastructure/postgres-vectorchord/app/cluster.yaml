---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-vectorchord
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17-0.4.3

  # Increase delays for IPv6 networking latency
  startDelay: 30
  stopDelay: 30
  switchoverDelay: 60

  postgresql:
    shared_preload_libraries:
      - "vchord.so"

  # --- Backup configuration ---------------------------------------------------
  # Dual strategy: VolumeSnapshot (fast local) + barman/S3 (off-cluster PITR)
  backup:
    retentionPolicy: "14d"

    # Fast local recovery via Ceph RBD snapshot (survives cluster deletion because
    # snapshotOwnerReference: backup means VolumeSnapshots are owned by Backup CRs,
    # not the Cluster — Backup CRs are owned by ScheduledBackup, not Cluster).
    volumeSnapshot:
      className: csi-rbd-rbd-vm-snapclass
      snapshotOwnerReference: backup

    # Off-cluster WAL archiving to external MinIO LXC (VLAN 200, fd00:200::52).
    # WAL segments are archived continuously. ScheduledBackup triggers base backups.
    # Credentials come from cnpg-barman-s3 Secret (created by ExternalSecret from 1Password).
    barmanObjectStore:
      endpointURL: "http://[fd00:200::52]:9000"
      destinationPath: "s3://cnpg-backups/postgres-vectorchord"
      s3Credentials:
        accessKeyId:
          name: cnpg-barman-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-barman-s3
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        jobs: 2

  # --- Normal bootstrap (fresh cluster) ----------------------------------------
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;

  # --- Disaster recovery bootstrap (two paths) ---------------------------------
  #
  # PATH A — barman/WAL recovery (preferred; automatic, no snapshot name needed):
  #   Requires: barmanObjectStore WAL archive in MinIO must have at least one base backup.
  #   1. Delete the cluster:  kubectl delete cluster postgres-vectorchord -n default
  #   2. Comment out bootstrap.initdb above, uncomment bootstrap.recovery (barman) below.
  #   3. Commit and push — Flux applies → CNPG fetches latest base backup + replays WAL.
  #   4. Optionally revert bootstrap to initdb (not required once PVC exists + PG running).
  #
  # bootstrap:
  #   recovery:
  #     source: postgres-vectorchord   # references externalClusters entry below
  #     # Omit recoveryTarget to recover to the latest available point in time
  #
  # PATH B — VolumeSnapshot recovery (fast; requires specifying a snapshot name):
  #   1. Find snapshot: kubectl get volumesnapshot -n default \
  #        -l cnpg.io/cluster=postgres-vectorchord --sort-by=.metadata.creationTimestamp
  #   2. Delete the cluster, set the snapshot name below, uncomment, push.
  #
  # bootstrap:
  #   recovery:
  #     volumeSnapshots:
  #       storage:
  #         name: <snapshot-name>   # from kubectl get volumesnapshot above
  #         kind: VolumeSnapshot
  #         apiGroup: snapshot.storage.k8s.io

  # Always-present externalClusters for barman recovery (no effect during normal ops).
  # Activated by switching bootstrap to recovery.source: postgres-vectorchord above.
  externalClusters:
    - name: postgres-vectorchord
      barmanObjectStore:
        endpointURL: "http://[fd00:200::52]:9000"
        destinationPath: "s3://cnpg-backups/postgres-vectorchord"
        s3Credentials:
          accessKeyId:
            name: cnpg-barman-s3
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-barman-s3
            key: ACCESS_SECRET_KEY

  managed:
    roles:
      - name: authentik
        login: true
        ensure: present
        passwordSecret:
          name: authentik-pg-password
      - name: firefly
        login: true
        ensure: present
        passwordSecret:
          name: firefly-pg-password

  storage:
    size: 20Gi
    storageClass: csi-rbd-rbd-vm-sc-retain
