---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snmp-exporter-rules
spec:
  groups:
    - name: snmp-exporter.rules
      rules:
        # NOTE 2026-07-19: the previous UPSOnBattery alert (upsAdvBattery*
        # metrics) was inherited config for an APC UPS that does not exist in
        # this environment - zero ups* series have ever been scraped. Removed
        # rather than left as an alert that can never fire. The router is the
        # only real SNMP target; alert on its scrape health instead.
        - alert: RouterSNMPScrapeDown
          expr: |-
            up{job="snmp-exporter"} == 0
          for: 10m
          labels:
            severity: warning
            layer: network
          annotations:
            summary: >-
              SNMP scrape of the router ({{ $labels.instance }}) has been failing for 10m
            description: >-
              The router dashboard (network/router-mikrotik) and interface
              error alerting go dark without this scrape. Check snmp-exporter
              pod health (pinned to solwk01 for UDP/161 reachability) and the
              router itself.
