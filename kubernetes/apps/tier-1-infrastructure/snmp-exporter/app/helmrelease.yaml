---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app snmp-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: snmp-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    # Infra-device SNMP reachability is currently only reliable from solwk01.
    # solwk02/solwk03 lose or time out UDP/161 traffic to RouterOS/APC/Dell.
    nodeSelector:
      kubernetes.io/hostname: solwk01
    serviceMonitor:
      enabled: true
      params:
        # APC UPS fd00:1::80/10.1.0.80 and Dell fd00:1::82/10.1.0.82
        # did not answer SNMPv2 sysDescr from solwk01 on 2026-07-15. Keep
        # them out of active scraping until device-side SNMP is confirmed.
        - name: routeros-system
          module:
            - system
          target: udp6://[fd00:30::fffe]:161
          auth:
            - public_v2
        - name: routeros-interfaces
          module:
            - if_mib
          target: udp6://[fd00:30::fffe]:161
          auth:
            - public_v2
        - name: routeros-mikrotik
          module:
            - mikrotik
          target: udp6://[fd00:30::fffe]:161
          auth:
            - public_v2
      path: /snmp
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance
