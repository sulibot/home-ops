---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    uid: prometheus
    type: prometheus
    name: prometheus
    access: proxy
    isDefault: true
    url: http://prometheus-operated.observability.svc.cluster.local:9090
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: alertmanager
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: alertmanager
    name: alertmanager
    access: proxy
    jsonData:
      implementation: prometheus
    url: http://alertmanager-operated.observability.svc.cluster.local:9093
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    uid: loki
    type: loki
    name: loki
    access: proxy
    url: http://loki.observability.svc.cluster.local:3100
    jsonData:
      # SDK-instrumented apps (OTEL_PYTHON_LOG_CORRELATION etc.) emit trace
      # IDs in log lines; link them straight to Tempo.
      derivedFields:
        - name: TraceID
          datasourceUid: tempo
          matcherRegex: '(?:trace_id|otelTraceID)["'']?[=:]\s*["'']?([0-9a-f]{32})'
          # $$ escapes Flux's own postBuild substitution (which otherwise
          # chokes on the dot in __value.raw and fails the whole
          # Kustomization) - this is Grafana's own runtime template syntax.
          url: "$${__value.raw}"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    uid: tempo
    type: tempo
    name: tempo
    access: proxy
    url: http://tempo.observability.svc.cluster.local:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        # Logs carry no trace IDs (fluent-bit doesn't inject them); join on
        # Beyla span attributes -> Loki stream labels instead.
        filterByTraceID: false
        mapTagNamesEnabled: true
        tags:
          - key: k8s.namespace.name
            value: namespace
          - key: service.name
            value: app
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
