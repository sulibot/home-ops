---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-datastore-health-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  sre-datastore-health.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "tags": [],
          "targetBlank": false,
          "title": "Related dashboards",
          "type": "dashboards"
        }
      ],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Valkey Nodes Up",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(redis_up{job=\"valkey-metrics\"})",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Valkey Clients",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(redis_connected_clients{job=\"valkey-metrics\"})",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 100
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Valkey Memory",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(redis_memory_used_bytes{job=\"valkey-metrics\"})",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Valkey Hit Ratio",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(rate(redis_keyspace_hits_total{job=\"valkey-metrics\"}[5m])) / clamp_min(sum(rate(redis_keyspace_hits_total{job=\"valkey-metrics\"}[5m])) + sum(rate(redis_keyspace_misses_total{job=\"valkey-metrics\"}[5m])), 1)",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "yellow",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 0.8
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Postgres Collector",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 16,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "min(cnpg_collector_up{job=\"default/postgres-vectorchord\"})",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Postgres Lag",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 20,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "max(cnpg_pg_replication_lag{job=\"default/postgres-vectorchord\"}) or vector(0)",
              "refId": "A",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 104857600
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Valkey Commands by Pod",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(redis_commands_processed_total{job=\"valkey-metrics\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Valkey Memory by Pod",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "redis_memory_used_bytes{job=\"valkey-metrics\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Valkey Write/Connection Red Flags",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum(increase(redis_evicted_keys_total{job=\"valkey-metrics\"}[1h])) or vector(0)",
              "legendFormat": "evicted keys",
              "refId": "A"
            },
            {
              "expr": "sum(increase(redis_rejected_connections_total{job=\"valkey-metrics\"}[1h])) or vector(0)",
              "legendFormat": "rejected connections",
              "refId": "B"
            },
            {
              "expr": "sum(increase(redis_aof_delayed_fsync{job=\"valkey-metrics\"}[1h])) or vector(0)",
              "legendFormat": "delayed fsync",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 10,
          "type": "table",
          "title": "Valkey Topology",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "max by (pod, role, valkey_version, maxmemory_policy) (redis_instance_info{job=\"valkey-metrics\"})",
              "format": "table",
              "instant": true,
              "range": false,
              "refId": "A"
            },
            {
              "expr": "redis_connected_slaves{job=\"valkey-metrics\"}",
              "format": "table",
              "instant": true,
              "range": false,
              "refId": "B"
            },
            {
              "expr": "redis_master_link_up{job=\"valkey-metrics\"}",
              "format": "table",
              "instant": true,
              "range": false,
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          }
        },
        {
          "id": 11,
          "type": "table",
          "title": "Largest Postgres Databases",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "topk(15, cnpg_pg_database_size_bytes{job=\"default/postgres-vectorchord\"})",
              "format": "table",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Postgres Backends",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "topk(20, sum by (datname, state, usename) (cnpg_backends_total{job=\"default/postgres-vectorchord\"}))",
              "format": "table",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Postgres Backup and WAL Signals",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 28,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "time() - max(cnpg_collector_last_available_backup_timestamp{job=\"default/postgres-vectorchord\"})",
              "legendFormat": "seconds since last backup",
              "refId": "A"
            },
            {
              "expr": "time() - max(cnpg_collector_first_recoverability_point{job=\"default/postgres-vectorchord\"})",
              "legendFormat": "recoverability window seconds",
              "refId": "B"
            },
            {
              "expr": "sum by (value) (cnpg_collector_pg_wal_archive_status{job=\"default/postgres-vectorchord\"})",
              "legendFormat": "wal {{value}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 86400
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 14,
          "type": "logs",
          "title": "Database Warning/Error Logs",
          "datasource": {
            "type": "loki",
            "uid": "${DS_LOKI}"
          },
          "gridPos": {
            "x": 12,
            "y": 28,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "{namespace=\"default\",app=~\"cloudnative-pg|postgresql\"} |~ \"(?i)(error|warn|failed|timeout|panic|backup|replica|wal|aof|evict|reject)\"",
              "refId": "A"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "sre",
        "datastores",
        "valkey",
        "postgres",
        "lgtm"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "SRE Datastore Health",
      "uid": "sre-datastore-health",
      "version": 1,
      "weekStart": ""
    }
