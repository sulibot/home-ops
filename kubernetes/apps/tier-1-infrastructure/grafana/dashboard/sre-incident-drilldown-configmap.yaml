---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-incident-drilldown-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  sre-incident-drilldown.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(homeops:pod_fs_write_bytes:rate5m) or vector(0)",
              "legendFormat": "k8s pod writes",
              "refId": "A"
            },
            {
              "expr": "sum(homeops:proxmox_vm_disk_write_bytes:rate5m) or vector(0)",
              "legendFormat": "proxmox vm writes",
              "refId": "B"
            },
            {
              "expr": "homeops:ceph_recovery_bytes:rate5m",
              "legendFormat": "ceph recovery",
              "refId": "C"
            }
          ],
          "title": "Write IO vs Recovery",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "ceph_health_status or vector(0)",
              "legendFormat": "ceph health",
              "refId": "A"
            },
            {
              "expr": "sum(ceph_osd_up == 0) or vector(0)",
              "legendFormat": "osds down",
              "refId": "B"
            },
            {
              "expr": "sum(ceph_osd_in == 0) or vector(0)",
              "legendFormat": "osds out",
              "refId": "C"
            },
            {
              "expr": "sum(ceph_health_detail{name=~\"PG_.*|OBJECT_.*|SLOW_OPS|BLUESTORE_.*|MDS_.*|FS_.*\"}) or vector(0)",
              "legendFormat": "health details",
              "refId": "D"
            }
          ],
          "title": "Ceph Safety Signals",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "topk(15, homeops:pod_pvc_write_bytes:rate5m)",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Top Kubernetes Pod/PVC Writers",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "topk(15, homeops:proxmox_vm_disk_write_bytes:rate5m)",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Top Proxmox VM Writers",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "topk(15, homeops:node_disk_io_time:rate5m)",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Busiest Physical Disks",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Current Alerts",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "id": 7,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(hubble_drop_total[5m])) by (reason) or vector(0)",
              "legendFormat": "drop {{reason}}",
              "refId": "A"
            },
            {
              "expr": "sum(rate(hubble_dns_queries_total[5m])) by (rcode) or vector(0)",
              "legendFormat": "dns {{rcode}}",
              "refId": "B"
            },
            {
              "expr": "sum(rate(hubble_flows_processed_total[5m])) by (type) or vector(0)",
              "legendFormat": "flow {{type}}",
              "refId": "C"
            }
          ],
          "title": "Hubble Flows, Drops, and DNS",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "id": 8,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=~\"authentik|plex\"}[5m])) by (service_name) or vector(0)",
              "legendFormat": "{{service_name}} rps",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=~\"authentik|plex\",http_response_status_code=~\"5..\"}[5m])) by (service_name) or vector(0)",
              "legendFormat": "{{service_name}} errors",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{service_name=~\"authentik|plex\"}[5m])) by (le, service_name)) or vector(0)",
              "legendFormat": "{{service_name}} p95",
              "refId": "C"
            }
          ],
          "title": "Beyla Authentik and Plex RED",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 32
          },
          "id": 9,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "homeops_ceph_osd_device_info",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Ceph OSD Device Inventory",
          "type": "table"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${DS_VICTORIA_LOGS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 32
          },
          "id": 10,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{stream_class=\"event\"}",
              "refId": "A"
            }
          ],
          "title": "Kubernetes Events",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${DS_VICTORIA_LOGS}"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 40
          },
          "id": 11,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{stream_class=\"host\",source_type=~\"pve|talos\"}",
              "refId": "A"
            }
          ],
          "title": "PVE, Ceph, and Talos Host Logs",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${DS_VICTORIA_LOGS}"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 48
          },
          "id": 12,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{stream_class=\"infra\"}",
              "refId": "A"
            }
          ],
          "title": "Infra Logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "sre",
        "incident",
        "storage",
        "homeops"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "SRE Incident Drill-Down",
      "uid": "sre-incident-drilldown",
      "version": 1
    }
