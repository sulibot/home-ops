---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synthetic-probes-dashboard
data:
  synthetic-probes.json: |
    {
      "uid": "synthetic-probes",
      "title": "Synthetic Probes (Blackbox)",
      "tags": ["network", "synthetic"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Targets Down",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "count(probe_success == 0) or vector(0)", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "red", "value": 1}
              ]}
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Targets Monitored",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "count(probe_success)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 3,
          "type": "table",
          "title": "Probe Status by Target",
          "description": "LAN internal-host reachability and VPN/WAN egress checks (ICMP + HTTP). A row going red here answers 'is it the network' before you dig into any app.",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 4},
          "targets": [
            {"expr": "probe_success", "refId": "A", "instant": true, "range": false, "format": "table"},
            {"expr": "probe_duration_seconds", "refId": "B", "instant": true, "range": false, "format": "table"}
          ],
          "transformations": [
            {"id": "merge", "options": {}},
            {"id": "organize", "options": {
              "includeByName": {"instance": true, "job": true, "service": true, "Value #A": true, "Value #B": true},
              "renameByName": {"instance": "Target", "job": "Module", "service": "Probe", "Value #A": "Up", "Value #B": "Latency (s)"}
            }}
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Up"},
                "properties": [
                  {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [
                    {"color": "red", "value": null},
                    {"color": "green", "value": 1}
                  ]}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Latency (s)"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "decimals", "value": 3}
                ]
              }
            ]
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [{"displayName": "Up", "desc": false}]
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Probe Latency Trend",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 14},
          "targets": [
            {"expr": "probe_duration_seconds", "refId": "A", "legendFormat": "{{instance}} ({{service}})"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"drawStyle": "line", "fillOpacity": 5, "lineWidth": 1}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        }
      ]
    }
