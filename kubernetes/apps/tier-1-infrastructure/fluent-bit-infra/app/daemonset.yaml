---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/daemonset.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-infra
  labels:
    app.kubernetes.io/name: fluent-bit-infra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-infra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-infra
    spec:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:4.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --config=/fluent-bit/etc/fluent-bit.conf
          ports:
            - name: talos-tcp
              containerPort: 1514
              protocol: TCP
            - name: syslog-tcp
              containerPort: 2514
              protocol: TCP
            - name: metrics
              containerPort: 2021
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: buffers
              mountPath: /var/log/fluent-bit-infra-buffers
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: Exists
      volumes:
        - name: config
          configMap:
            name: fluent-bit-infra
        - name: buffers
          hostPath:
            path: /var/log/fluent-bit-infra-buffers
            type: DirectoryOrCreate
