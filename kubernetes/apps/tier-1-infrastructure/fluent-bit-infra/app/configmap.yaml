---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-infra
data:
  fluent-bit.conf: |
    [SERVICE]
      Daemon Off
      Flush 1
      Log_Level info
      Parsers_File parsers.conf
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port 2021
      Health_Check On
      storage.path /var/log/fluent-bit-infra-buffers/
      storage.sync normal
      storage.checksum off
      storage.max_chunks_up 128
      storage.backlog.mem_limit 64M

    [INPUT]
      Name tcp
      Alias talos
      Listen 127.0.0.1
      Port 1514
      Format json
      Tag talos
      Chunk_Size 64KB
      Buffer_Size 256KB
      storage.type filesystem

    [INPUT]
      Name syslog
      Alias pve-syslog
      Mode tcp
      Listen 0.0.0.0
      Port 2514
      Parser syslog-rfc5424
      Format octet_counting
      Tag pve.syslog
      source_address_key syslog_source_address
      raw_message_key raw_message
      storage.type filesystem

    [FILTER]
      Name modify
      Match talos
      Set cluster cluster-101
      Set source_type talos
      Set stream_class host
      Set node ${NODE_NAME}
      Rename talos-service talos_service
      Rename talos-level talos_level
      Rename talos-time talos_time
      Copy msg log

    [FILTER]
      Name modify
      Match pve.syslog
      Set cluster cluster-101
      Set source_type pve
      Set stream_class host
      Rename ident app
      Copy message log

    [OUTPUT]
      Name loki
      Match talos
      Host loki.observability.svc
      Port 3100
      label_keys $cluster,$source_type,$stream_class,$node,$talos_service,$talos_level
      labels job=fluentbit-infra
      line_format json
      compress gzip
      workers 2
      storage.total_limit_size 1G
      retry_limit false

    [OUTPUT]
      Name loki
      Match pve.syslog
      Host loki.observability.svc
      Port 3100
      label_keys $cluster,$source_type,$stream_class,$host,$app
      labels job=fluentbit-infra
      line_format json
      compress gzip
      workers 2
      storage.total_limit_size 1G
      retry_limit false
