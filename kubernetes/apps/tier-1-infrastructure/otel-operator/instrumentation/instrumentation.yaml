---
# Shared auto-instrumentation spec. Apps opt in via pod annotation
# instrumentation.opentelemetry.io/inject-<lang>: "observability/default".
# Set OTEL_SERVICE_NAME explicitly in each app so service.name matches the
# Loki `app` stream label (the operator's default is the Deployment name,
# e.g. "authentik-server", which would break the trace->logs tag join).
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: default
spec:
  exporter:
    endpoint: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"
  python:
    env:
      # Injects trace_id/span_id into python log records -> Loki derivedFields
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - name: OTEL_METRICS_EXPORTER
        value: otlp
      - name: OTEL_LOGS_EXPORTER
        value: none
      # authentik bootstraps Django programmatically (no manage.py, no
      # DJANGO_SETTINGS_MODULE env). Zero-code instrumentation needs it set
      # explicitly or app/command registry population races the instrumentor's
      # import hooks (opentelemetry-python-contrib#2495) - surfaced here as
      # django-tenants' migrate_schemas command "not found", crash-looping
      # gunicorn. With it set, the full Django instrumentor (request spans,
      # RED metrics, exemplars) can stay enabled.
      - name: DJANGO_SETTINGS_MODULE
        value: authentik.root.settings
  dotnet:
    # Operator's default (1.2.0) segfaults (exit 139) with the musl build on
    # sonarr's runtime; pin the current release instead.
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.16.0
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - name: OTEL_LOGS_EXPORTER
        value: none
      # readOnlyRootFilesystem pods: the native profiler must be able to
      # create its log directory or it silently never initializes. Point it
      # at the (writable) /tmp emptyDir.
      - name: OTEL_DOTNET_AUTO_LOG_DIRECTORY
        value: /tmp/otel-dotnet
      - name: OTEL_LOG_LEVEL
        value: warn
