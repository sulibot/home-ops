---
# Shared auto-instrumentation spec. Apps opt in via pod annotation
# instrumentation.opentelemetry.io/inject-<lang>: "observability/default".
# Set OTEL_SERVICE_NAME explicitly in each app so service.name matches the
# Loki `app` stream label (the operator's default is the Deployment name,
# e.g. "authentik-server", which would break the trace->logs tag join).
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: default
spec:
  exporter:
    endpoint: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"
  python:
    env:
      # Injects trace_id/span_id into python log records -> Loki derivedFields
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - name: OTEL_METRICS_EXPORTER
        value: otlp
      - name: OTEL_LOGS_EXPORTER
        value: none
      # CONCLUSION (tested 2026-07-17, twice): authentik's custom bootstrap
      # (lifecycle.migrate + programmatic Django setup) is fundamentally
      # incompatible with the zero-code Django instrumentor - it forces
      # django.setup() at interpreter start, before authentik's bootstrap
      # populates config, so django-tenants' migrate_schemas command is
      # never registered. Setting DJANGO_SETTINGS_MODULE explicitly
      # (otel-python-contrib#2495 workaround) does NOT fix it - the ordering
      # conflict is in authentik's own supervisor, not settings discovery.
      # Disabling only this instrumentor keeps psycopg/redis/http-client
      # spans + propagation; request-level spans for authentik come from
      # Beyla instead.
      - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
        value: django
  nodejs:
    env:
      - name: OTEL_METRICS_EXPORTER
        value: otlp
      - name: OTEL_LOGS_EXPORTER
        value: none
  dotnet:
    # Version matrix, tested 2026-07-17: operator default 1.2.0 segfaults
    # (exit 139) on musl; 1.16.0 loads cleanly but refuses .NET 6 (support
    # dropped in 1.8.0). Sonarr v4 is .NET 6 -> 1.7.0 is the newest release
    # that supports it.
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.7.0
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - name: OTEL_LOGS_EXPORTER
        value: none
      # readOnlyRootFilesystem pods: the native profiler must be able to
      # create its log directory or it silently never initializes. Point it
      # at the (writable) /tmp emptyDir.
      - name: OTEL_DOTNET_AUTO_LOG_DIRECTORY
        value: /tmp/otel-dotnet
      - name: OTEL_LOG_LEVEL
        value: warn
