---
alerting:
  pushover:
    application-token: ${BUDDY_PUSHOVER_TOKEN}
    default-alert:
      description: health-check failed
      failure-threshold: 3
      minimum-reminder-interval: 1h
      send-on-resolved: true
      success-threshold: 2
    priority: 1
    resolved-priority: 0
    title: Gatus
    user-key: ${BUDDY_PUSHOVER_USER_KEY}

external-endpoints:
  - name: Heartbeat
    group: buddy
    token: ${BUDDY_HEARTBEAT_TOKEN}
    heartbeat:
      interval: 5m
    alerts:
      - type: pushover
