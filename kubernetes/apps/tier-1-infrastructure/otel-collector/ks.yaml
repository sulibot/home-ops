---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel-collector
  namespace: flux-system
  labels:
    layer: "observability"
    component: distributed-tracing
    critical: "false"
spec:
  dependsOn:
    - name: otel-collector-helm-repo
      namespace: flux-system
    - name: kube-prometheus-stack
      namespace: flux-system
    - name: jaeger
      namespace: flux-system
    - name: victoria-logs
      namespace: flux-system
  interval: 15m
  retryInterval: 1m
  path: ./kubernetes/apps/tier-1-infrastructure/otel-collector/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
  timeout: 10m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: otel-collector
      namespace: observability
