---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: observability
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: opentelemetry-collector
      # Verified against the live chart index (open-telemetry.github.io/opentelemetry-helm-charts)
      # as the latest release; Renovate will track updates afterward.
      version: 0.165.0
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    mode: deployment
    replicaCount: 1

    image:
      repository: otel/opentelemetry-collector-contrib

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 384Mi

    ports:
      # Default keys are "otlp"/"otlp-http" (not "otlp-grpc"); override those
      # directly and drop hostPort so this Deployment doesn't bind node ports.
      otlp:
        hostPort: null
      otlp-http:
        hostPort: null
      # OpenMetrics exemplar-carrying scrape endpoint (see prometheus exporter)
      prom-exporter:
        enabled: true
        containerPort: 8889
        servicePort: 8889
        protocol: TCP
      # Disable ports we don't use to keep the footprint minimal
      jaeger-compact:
        enabled: false
      jaeger-thrift:
        enabled: false
      jaeger-grpc:
        enabled: false
      zipkin:
        enabled: false

    config:
      # IPv6 cluster: the chart's default health_check endpoint renders the
      # pod IP unbracketed (fd00::x:13133), which the collector can't parse
      # and exits 1. Bracket it, and bind OTLP on [::] (0.0.0.0 is v4-only).
      extensions:
        health_check:
          endpoint: "[${env:MY_POD_IP}]:13133"
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "[::]:4317"
            http:
              endpoint: "[::]:4318"
        # Prometheus/kube-state-metrics stay on their existing ServiceMonitor
        # scrape path; this collector is for OTLP-native app telemetry only.
        prometheus: null
        jaeger: null
        zipkin: null

      processors:
        batch: {}
        memory_limiter:
          check_interval: 5s
          limit_mib: 300
          spike_limit_mib: 75
          # The chart's default config sets limit_percentage/spike_limit_percentage;
          # Helm deep-merges maps by key, and the memory_limiter processor rejects
          # having both *_mib and *_percentage set. Null them out explicitly.
          limit_percentage: null
          spike_limit_percentage: null

      exporters:
        # Traces -> Tempo (OTLP-native ingestion)
        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true

        # Metrics -> OpenMetrics scrape endpoint on the collector itself.
        # Prometheus can ONLY ingest exemplars via OpenMetrics scrape, never
        # via its OTLP receiver - the OTLP push path silently drops them,
        # which killed the SDK exemplar demo until this was rerouted.
        prometheus:
          endpoint: "[${env:MY_POD_IP}]:8889"
          enable_open_metrics: true
          resource_to_telemetry_conversion:
            enabled: true

        # Logs -> Loki native OTLP ingestion
        otlphttp/loki:
          logs_endpoint: http://loki.observability.svc.cluster.local:3100/otlp/v1/logs
          tls:
            insecure: true

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/tempo]
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheus]
          logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlphttp/loki]
