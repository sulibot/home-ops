---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-linear-bridge
  labels:
    app.kubernetes.io/name: alertmanager-linear-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-linear-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-linear-bridge
    spec:
      containers:
        - name: bridge
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/bridge.py
          ports:
            - name: http
              containerPort: 9096
              protocol: TCP
          env:
            - name: PORT
              value: "9096"
            - name: LINEAR_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: alertmanager-linear-bridge-secret
                  key: LINEAR_TEAM_ID
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alertmanager-linear-bridge-secret
                  key: LINEAR_API_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: app
          configMap:
            name: alertmanager-linear-bridge
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
