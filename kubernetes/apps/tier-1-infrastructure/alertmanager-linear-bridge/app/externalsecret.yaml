---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-linear-bridge
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-linear-bridge-secret
    template:
      data:
        LINEAR_API_KEY: "{{ .LINEAR_API_KEY }}"
        LINEAR_TEAM_ID: "{{ .LINEAR_TEAM_ID }}"
  dataFrom:
    - extract:
        # 1Password item "alertmanager-linear-bridge" (Kubernetes vault),
        # dedicated to this integration - not the personal Linear login/key.
        # Fields: LINEAR_API_KEY, LINEAR_TEAM_ID.
        key: alertmanager-linear-bridge
