---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-linear-bridge
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-linear-bridge-secret
    template:
      data:
        LINEAR_API_KEY: "{{ .LINEAR_API_KEY }}"
  dataFrom:
    - extract:
        # MANUAL STEP: create a 1Password item named "linear" in the vault
        # the onepassword-connect ClusterSecretStore reads from, with a
        # field LINEAR_API_KEY set to a Linear personal API key
        # (Linear -> Settings -> Security & access -> Personal API keys).
        key: linear
