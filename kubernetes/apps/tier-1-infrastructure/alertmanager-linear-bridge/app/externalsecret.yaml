---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-linear-bridge
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-linear-bridge-secret
    template:
      data:
        LINEAR_API_KEY: "{{ index . `LINEAR-API-KEY-ALERTMANAGER-BRIDGE` }}"
        LINEAR_TEAM_ID: "{{ index . `LINEAR-TEAM-ID-ALERTMANAGER-BRIDGE` }}"
  dataFrom:
    - extract:
        # Shared "Linear" 1Password item (Kubernetes vault) - this is the
        # user's personal Linear login; this integration uses its own
        # dedicated fields (suffixed -ALERTMANAGER-BRIDGE) rather than the
        # personal LINEAR-API-KEY field.
        key: Linear
