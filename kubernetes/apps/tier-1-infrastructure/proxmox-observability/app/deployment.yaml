---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  labels:
    app.kubernetes.io/name: pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pve-exporter
    spec:
      automountServiceAccountToken: false
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:v3.8.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/pve.yml
            - --web.listen-address=[::]:9221
            - --collector.pve-api-metrics
            - --collector.target-metrics
          ports:
            - name: metrics
              containerPort: 9221
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          secret:
            secretName: pve-exporter-config
        - name: tmp
          emptyDir: {}
