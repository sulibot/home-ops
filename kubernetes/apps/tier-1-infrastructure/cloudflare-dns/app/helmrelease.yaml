---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-dns
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: cloudflare-dns
    namespace: flux-system
  targetNamespace: network
  interval: 1h
  values:
    fullnameOverride: cloudflare-dns-cf
    provider:
      name: cloudflare
    env:
      - name: &cf_api_token CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: &secret cloudflare-dns-secret
            key: *cf_api_token
      - name: &cf_zone_id CF_ZONE_ID
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *cf_zone_id
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --cloudflare-proxied
      - --default-targets=0977043f-80e9-4549-a6f0-0af145a17f27.cfargotunnel.com
      - --force-default-targets
      - --managed-record-types=CNAME
      - --managed-record-types=TXT
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=gateway-tunnel
      - --zone-id-filter=$(CF_ZONE_ID)
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - crd
      - gateway-httproute
    txtOwnerId: default
    txtPrefix: k8s.
    domainFilters:
      - sulibot.com
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
