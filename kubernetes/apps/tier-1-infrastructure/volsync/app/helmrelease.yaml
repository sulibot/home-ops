---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: Replace
spec:
  chartRef:
    kind: OCIRepository
    name: volsync
  interval: 1h
  timeout: 10m
  install:
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
    timeout: 10m
  # Patch the CRD to add repositoryPVC field (not yet in upstream schema)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: CustomResourceDefinition
              name: replicationsources.volsync.backube
            patch: |
              - op: add
                path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/kopia/properties/repositoryPVC
                value:
                  description: "RepositoryPVC is the name of an existing PVC to use as the Kopia repository storage"
                  type: string
  values:
    fullnameOverride: volsync # Required for volsync-perfectra1n fork
    image: &image
      repository: ghcr.io/perfectra1n/volsync
      tag: v0.17.8
    kopia: *image
    rclone: *image
    restic: *image
    rsync: *image
    rsync-tls: *image
    syncthing: *image
    manageCRDs: true
    # MutatingAdmissionPolicy mounts kopia PVC for restore (volsync-dst-*)
    # and backup jobs (volsync-src-*) to keep repository mount behavior consistent.
    mutatingAdmissionPolicy:
      enabled: true
    service:
      ipFamilyPolicy: PreferDualStack
      ipFamilies:
        - IPv6
        - IPv4
    metrics:
      disableAuth: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
