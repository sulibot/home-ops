---
# MutatingAdmissionPolicy to mount repository PVC for both backup and restore jobs
# Matches volsync-dst-* (restores) AND volsync-src-* (backups)
# repositoryPVC field in perfectra1n/volsync fork does not actually mount the PVC,
# so this policy handles it for both job types.
# Using failurePolicy: Ignore to prevent hangs if the policy fails
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: volsync-repository
spec:
  policyName: volsync-repository
---
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicy
metadata:
  name: volsync-repository
spec:
  matchConstraints:
    resourceRules:
      - apiGroups:
          - batch
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - jobs
  matchConditions:
    # Match backup (volsync-src-*), restore (volsync-dst-*), and KopiaMaintenance jobs
    - name: is-volsync-mover-job
      expression: >-
        object.metadata.name.startsWith("volsync-dst-") ||
        object.metadata.name.startsWith("volsync-src-") ||
        object.metadata.?labels["volsync.backube/kopia-maintenance"].orValue("") == "true"
    - name: has-volsync-labels
      expression: >-
        object.metadata.?labels["app.kubernetes.io/created-by"].orValue("") == "volsync" ||
        object.metadata.?labels["volsync.backube/kopia-maintenance"].orValue("") == "true"
    - name: repository-volume-does-not-exist
      expression: >-
        !has(object.spec.template.spec.volumes) ||
        !object.spec.template.spec.volumes.exists(item, item.name == "repository")
  failurePolicy: Ignore  # Changed from Fail to Ignore to prevent hangs
  reinvocationPolicy: IfNeeded
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          [
            JSONPatch{
              op: "add",
              path: "/spec/template/spec/containers/0/volumeMounts/-",
              value: Object.spec.template.spec.containers.volumeMounts{
                name: "repository",
                mountPath: "/repository"
              }
            },
            JSONPatch{
              op: "add",
              path: "/spec/template/spec/volumes/-",
              value: Object.spec.template.spec.volumes{
                name: "repository",
                persistentVolumeClaim: Object.spec.template.spec.volumes.persistentVolumeClaim{
                  claimName: "kopia",
                  readOnly: false
                }
              }
            }
          ]
