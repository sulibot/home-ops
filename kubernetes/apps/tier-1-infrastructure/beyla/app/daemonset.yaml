---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/v1/daemonset.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
  labels:
    app.kubernetes.io/name: beyla
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beyla
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beyla
    spec:
      serviceAccountName: beyla
      hostPID: true
      containers:
        - name: beyla
          image: docker.io/grafana/beyla:3.28.0
          imagePullPolicy: IfNotPresent
          env:
            - name: BEYLA_CONFIG_PATH
              value: /config/beyla-config.yml
            - name: BEYLA_KUBE_CLUSTER_NAME
              value: cluster-101
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: var-run-beyla
              mountPath: /var/run/beyla
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: tracefs
              mountPath: /sys/kernel/tracing
      tolerations:
        - operator: Exists
      volumes:
        - name: config
          configMap:
            name: beyla
        - name: var-run-beyla
          emptyDir: {}
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
