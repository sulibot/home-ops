---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-repository-pvc
  namespace: flux-system
  labels:
    layer: "applications"
    component: storage
spec:
  dependsOn:
    - name: ceph-csi
      namespace: flux-system
    - name: volsync
      namespace: flux-system
  interval: ${TIER2_INTERVAL:=15m}
  retryInterval: ${TIER2_RETRY_INTERVAL:=30s}
  path: ./kubernetes/apps/tier-2-applications/volsync-repository-pvc/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  targetNamespace: default
  healthChecks:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      name: kopia
      namespace: default
