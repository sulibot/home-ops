---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-owner-bootstrap
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-owner-bootstrap-secret
    creationPolicy: Owner
    template:
      data:
        N8N_OWNER_EMAIL: "{{ .username }}"
        N8N_OWNER_PASSWORD: "{{ .password }}"
        N8N_OWNER_FIRST_NAME: "Sulaiman"
        N8N_OWNER_LAST_NAME: "Ahmad"
  dataFrom:
    - extract:
        key: n8n-sulibot
