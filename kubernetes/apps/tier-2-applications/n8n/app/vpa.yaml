---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: n8n
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: app
        minAllowed:
          cpu: 25m
          memory: 256Mi
        maxAllowed:
          cpu: 2
          memory: 2Gi
        controlledResources: [cpu, memory]
