---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Bootstrap owner credentials are stored separately in 1Password item `n8n-admin`.
# They are intentionally not synced into Kubernetes because they are only used for
# break-glass UI login and initial owner provisioning, not for app runtime config.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-secret
    creationPolicy: Owner
    template:
      data:
        DB_TYPE: postgresdb
        DB_POSTGRESDB_HOST: postgres-vectorchord-rw.default.svc.cluster.local
        DB_POSTGRESDB_PORT: "5432"
        DB_POSTGRESDB_DATABASE: n8n
        DB_POSTGRESDB_USER: n8n
        DB_POSTGRESDB_PASSWORD: "{{ .N8N_DB_PASSWORD }}"
        DB_POSTGRESDB_SSL_ENABLED: "false"
        N8N_ENCRYPTION_KEY: "{{ .N8N_ENCRYPTION_KEY }}"
  dataFrom:
    - extract:
        key: n8n
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-pg-password
    creationPolicy: Owner
    template:
      data:
        username: n8n
        password: "{{ .N8N_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: n8n
