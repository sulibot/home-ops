---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: soulsync
spec:
  chartRef:
    kind: OCIRepository
    name: soulsync
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      soulsync:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          configure:
            image:
              repository: boulderbadgedad/soulsync
              tag: latest@sha256:cec7f4cec350f39ad8f370633b7cbeb9976bacf07cb0a101b6d26dee2d02dbf0
            envFrom:
              - secretRef:
                  name: slskd-secret
              - secretRef:
                  name: soulsync-secret
            command:
              - python
              - -c
              - |
                import json
                import os
                from pathlib import Path

                path = Path("/app/config/config.json")
                if path.exists():
                    config = json.loads(path.read_text())
                else:
                    config = {}

                soulseek = config.setdefault("soulseek", {})
                soulseek["slskd_url"] = "http://slskd-app.default.svc.cluster.local"
                if api_key := os.environ.get("SLSKD_API_KEY"):
                    soulseek["api_key"] = api_key
                soulseek["download_path"] = "/app/downloads"
                soulseek["transfer_path"] = "/app/Transfer"

                spotify = config.setdefault("spotify", {})
                if client_id := os.environ.get("SPOTIFY_CLIENT_ID"):
                    spotify["client_id"] = client_id
                if client_secret := os.environ.get("SPOTIFY_CLIENT_SECRET"):
                    spotify["client_secret"] = client_secret
                if redirect_uri := os.environ.get("SPOTIFY_REDIRECT_URI"):
                    spotify["redirect_uri"] = redirect_uri

                lastfm = config.setdefault("lastfm", {})
                if api_key := os.environ.get("LASTFM_API_KEY"):
                    lastfm["api_key"] = api_key
                if api_secret := os.environ.get("LASTFM_API_SECRET"):
                    lastfm["api_secret"] = api_secret
                # multi-scrobbler handles scrobbling; soulsync uses Last.fm only for discovery
                lastfm["scrobble_enabled"] = False

                discover = config.setdefault("discover", {})
                discover["your_artists_sources"] = "spotify,lastfm"

                path.write_text(json.dumps(config, indent=2) + "\n")
        containers:
          app:
            image:
              repository: boulderbadgedad/soulsync
              tag: latest@sha256:cec7f4cec350f39ad8f370633b7cbeb9976bacf07cb0a101b6d26dee2d02dbf0
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              UMASK: "022"
              FLASK_ENV: production
              PYTHONPATH: /app
              SOULSYNC_CONFIG_PATH: /app/config/config.json
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 3Gi
          proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.1.1
            command:
              - sh
              - -c
              - |
                socat TCP6-LISTEN:8008,ipv6only=1,fork,reuseaddr TCP4:127.0.0.1:8008 &
                socat TCP6-LISTEN:8888,ipv6only=1,fork,reuseaddr TCP4:127.0.0.1:8888 &
                socat TCP6-LISTEN:8889,ipv6only=1,fork,reuseaddr TCP4:127.0.0.1:8889 &
                wait
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          http:
            port: &port 8008
          spotify:
            port: 8888
          tidal:
            port: 8889
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /app/config
            subPath: config
          - path: /app/logs
            subPath: logs
          - path: /app/data
            subPath: data
      media:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /app/downloads
            subPath: data/media/soulseek/complete
          - path: /app/Transfer
            subPath: data/media/music
      tmp:
        type: emptyDir
