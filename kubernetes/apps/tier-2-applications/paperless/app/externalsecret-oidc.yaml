---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-oidc
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-oidc
    template:
      data:
        # JSON blob injected as a single env var — client_id/secret embedded
        PAPERLESS_SOCIALACCOUNT_PROVIDERS: >-
          {"openid_connect": {"SERVERS": [{"id": "authentik", "name": "Authentik",
          "server_url": "https://auth.sulibot.com/application/o/paperless/",
          "APP": {"client_id":
          "{{ .PAPERLESS_OIDC_CLIENT_ID }}", "secret":
          "{{ .PAPERLESS_OIDC_CLIENT_SECRET }}"}}]}}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik
