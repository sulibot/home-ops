---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: miniflux-secret
    creationPolicy: Owner
    template:
      data:
        ADMIN_USERNAME: '{{ if eq (index . "MINIFLUX_ADMIN_USERNAME" | default "") "admin" }}admin{{ else }}{{ .username | default "admin" }}{{ end }}'
        ADMIN_PASSWORD: '{{ if and (eq (index . "MINIFLUX_ADMIN_USERNAME" | default "") "admin") (ne (index . "MINIFLUX_ADMIN_PASSWORD" | default "") "") }}{{ index . "MINIFLUX_ADMIN_PASSWORD" }}{{ else }}{{ .password }}{{ end }}'
        DATABASE_URL: 'postgres://miniflux:{{ .MINIFLUX_DB_PASSWORD }}@postgres-vectorchord-rw.default.svc.cluster.local/miniflux?sslmode=disable'
        OAUTH2_CLIENT_SECRET: '{{ .MINIFLUX_OIDC_CLIENT_SECRET }}'
        MINIFLUX_WEBSITE_URL: '{{ index . "MINIFLUX_WEBSITE_URL" | default "https://miniflux.sulibot.com" }}'
  dataFrom:
    - extract:
        key: miniflux
    - extract:
        key: authentik
    - extract:
        key: default_admin
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: miniflux-pg-password
    creationPolicy: Owner
    template:
      data:
        username: miniflux
        password: '{{ .MINIFLUX_DB_PASSWORD }}'
  dataFrom:
    - extract:
        key: miniflux
