---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-configuration
  namespace: default
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    input_boolean:
      bedroom_lights_locked:
        name: Sebby Bedroom Lights Locked
        icon: mdi:lock
      bedroom_lights_override:
        name: Sebby Bedroom Lights Override
        icon: mdi:gesture-tap-button
      bilresa_orange_2_ch1_warmer:
        name: Dining Room Orange Button Ch1 Warmer
      bilresa_green_1_ch1_warmer:
        name: Master Bedroom Green Button Ch1 Warmer
      bilresa_orange_1_ch1_warmer:
        name: Master Bedroom Orange Button Ch1 Warmer
      bilresa_white_1_ch1_warmer:
        name: Sebby Bedroom White Button Ch1 Warmer
      bilresa_white_2_ch1_warmer:
        name: Living Room White Button Ch1 Warmer

    input_text:
      bilresa_orange_2_hold_repeat_ms:
        name: Dining Room Orange Button Hold Repeat MS
        initial: "150"
        min: 1
        max: 10
      bilresa_hold_state_living_white_2:
        name: Living Room White Button Hold State
        initial: "cooler,cooler,cooler"
        min: 1
        max: 50
      bilresa_green_1_hold_state:
        name: Master Bedroom Green Button Hold State
        initial: "cooler,cooler,cooler"
        min: 1
        max: 50
      bilresa_orange_1_hold_state:
        name: Master Bedroom Orange Button Hold State
        initial: "cooler,cooler,cooler"
        min: 1
        max: 50
      bilresa_orange_2_hold_state:
        name: Dining Room Orange Button Hold State
        initial: "cooler,cooler,cooler"
        min: 1
        max: 50
      bilresa_white_1_hold_state:
        name: Sebby Bedroom White Button Hold State
        initial: "cooler,cooler,cooler"
        min: 1
        max: 50

    counter:
      bedroom_lights_press_count:
        name: Sebby Bedroom Lights Press Count
        initial: 0
        step: 1

    timer:
      bedroom_lights_press_window:
        name: Sebby Bedroom Lights Press Window
        duration: "00:00:05"
      bedroom_lights_override:
        name: Sebby Bedroom Lights Override
        duration: "00:30:00"

    http:
      use_x_forwarded_for: true
      ip_ban_enabled: false
      login_attempts_threshold: 5
      trusted_proxies:
        - fd00:69::/64
        - fd00:42::/64
        - fd00:101:224:3::/64
        - fd00:101:224::/60
        - 10.101.224.0/20
        - fd00:104:224::/60
        - 10.104.224.0/20

    homeassistant:
      # The iOS/mobile app persists HA's advertised internal/external URLs from
      # discovery/onboarding. Keep both on the unified app/discovery hostname so
      # the client does not pivot from local split-DNS onto the legacy browser host.
      internal_url: https://hass-app.sulibot.com
      external_url: https://hass-app.sulibot.com
      auth_providers:
        - type: homeassistant
      customize:
        light.living_room_switch:
          friendly_name: Living Room Wall Dimmer
          icon: mdi:light-switch
        light.living_room_lights:
          friendly_name: Living Room Lights
          icon: mdi:ceiling-light-multiple
        light.master_switch:
          friendly_name: Master Bedroom Wall Dimmer
          icon: mdi:light-switch
        light.master_lights:
          friendly_name: Master Bedroom Lights
          icon: mdi:ceiling-light-multiple
        light.smart_wi_fi_dimmer_switch:
          friendly_name: Sebby Bedroom Wall Dimmer
          icon: mdi:light-switch
        light.bedroom_switch:
          friendly_name: Sebby Bedroom Wall Dimmer
          icon: mdi:light-switch
        light.bedroom_lights:
          friendly_name: Sebby Bedroom Lights
          icon: mdi:ceiling-light-multiple
        light.sofa:
          friendly_name: Sebby Bedroom Sofa Lights
          icon: mdi:sofa
        light.standing_lamp:
          friendly_name: Sebby Bedroom Standing Lamp
          icon: mdi:floor-lamp
        light.dining_room_fan:
          icon: mdi:ceiling-fan-light
        light.dining_room_lights:
          icon: mdi:chandelier

    auth_oidc:
      additional_scopes:
        - email
      client_id: homeassistant-app
      discovery_url: https://auth.sulibot.com/application/o/home-assistant-app/.well-known/openid-configuration
      display_name: Authentik SSO
      claims:
        username: email
      features:
        automatic_user_linking: true
        default_redirect: true
        force_https: true

    google_assistant:
      project_id: sulibot-home-assistant-17e85
      service_account: !include SERVICE_ACCOUNT.json
      report_state: true
      expose_by_default: false
      entity_config:
        light.living_room_lights:
          expose: true
          room: Living Room
          aliases:
            - Living Room Lights
        light.kajplats_e26_ws_globe_1600lm_2:
          expose: true
          room: Living Room
          aliases:
            - TV Right
            - Living Room TV Right
        light.kajplats_e26_ws_globe_1600lm_3:
          expose: true
          room: Living Room
          aliases:
            - Couch Left
            - Living Room Couch Left
        light.kajplats_e26_ws_globe_1600lm_4:
          expose: true
          room: Living Room
          aliases:
            - Couch Right
            - Living Room Couch Right
        light.living_room_switch:
          expose: false
        light.master_lights:
          expose: true
          room: Master Bedroom
          aliases:
            - Master Bedroom Lights
        light.kajplats_e26_ws_globe_1600lm:
          expose: true
          room: Master Bedroom
          aliases:
            - Bed Left
            - Master Bedroom Bed Left
        light.kajplats_e26_ws_globe_1600lm_5:
          expose: true
          room: Master Bedroom
          aliases:
            - Bed Right
            - Master Bedroom Bed Right
        light.master_switch:
          expose: false
        light.bedroom_lights:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sebby Bedroom Lights
        light.standing_lamp:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Standing Lamp
            - Sebby Bedroom Standing Lamp
        light.kajplats_e26_ws_globe_1600lm_6:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sofa Left
            - Sebby Bedroom Sofa Left
        light.kajplats_e26_ws_globe_1600lm_7:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sofa Right
            - Sebby Bedroom Sofa Right
        light.kajplats_e26_ws_globe_1600lm_8:
          expose: false
        light.kajplats_e26_ws_globe_1600lm_9:
          expose: false
        light.smart_wi_fi_dimmer_switch:
          expose: false
        light.dining_room_lights:
          expose: true
          room: Dining Room
          aliases:
            - Dining Room Lights
            - Dining Room Light
        light.dining_room_fan:
          expose: true
          room: Dining Room
          aliases:
            - Dining Room Fan
            - Dining Room Ceiling Light
        light.fan_1:
          expose: false
        light.fan_2:
          expose: false
        light.fan_3:
          expose: false
        light.desk_lamp:
          expose: true
          room: Dining Room
          aliases:
            - Dining Room Desk Lamp
        button.dining_room_button:
          expose: false
          room: Dining Room
          aliases:
            - Dining Room Button
            - Dining Room Lights Button
        script.group_living_room_speakers:
          expose: true
          room: Living Room
          aliases:
            - Group Living Room Speakers
            - Group Living Room and Patio
        script.stop_living_room_music:
          expose: true
          room: Living Room
          aliases:
            - Stop Living Room Music
        script.kqed_radio_living_room:
          expose: true
          room: Living Room
          aliases:
            - Living Room KQED
            - KQED Living Room
        script.kqed_radio_kitchen:
          expose: true
          room: Kitchen
          aliases:
            - Kitchen KQED
            - KQED Kitchen
        script.kqed_radio_dining_room:
          expose: true
          room: Dining Room
          aliases:
            - Dining Room KQED
            - KQED Dining Room
        script.kqed_radio_master_bedroom:
          expose: true
          room: Master Bedroom
          aliases:
            - Master Bedroom KQED
            - KQED Master Bedroom
        script.group_sebby_bedroom_speakers:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Group Sebby Bedroom Speakers
            - Group Sebby's Speakers
        script.kqed_radio_sebby_bedroom:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sebby Bedroom KQED
            - KQED Sebby Bedroom
        script.sebby_sleep_music:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sebby Sleep Music
            - Sleep Music
        script.sebby_white_noise:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Sebby White Noise
            - White Noise
            - Sleep Noise
        script.stop_sebby_music:
          expose: true
          room: Sebby Bedroom
          aliases:
            - Stop Sebby Music
        script.stop_all_music:
          expose: true
          aliases:
            - Stop All Music

    # Adaptive Lighting itself is installed and updated by HACS. Keep only the
    # desired room/profile configuration here so behavior is reproducible.
    adaptive_lighting:
      - name: living_room
        lights:
          - light.kajplats_e26_ws_globe_1600lm_2
          - light.kajplats_e26_ws_globe_1600lm_3
          - light.kajplats_e26_ws_globe_1600lm_4
        prefer_rgb_color: false
        transition: 5
        initial_transition: 1
        take_over_control: true
        detect_non_ha_changes: false
      - name: master
        lights:
          - light.kajplats_e26_ws_globe_1600lm
          - light.kajplats_e26_ws_globe_1600lm_5
        prefer_rgb_color: false
        transition: 5
        initial_transition: 1
        take_over_control: true
        detect_non_ha_changes: false
      - name: bedroom
        lights:
          - light.bedroom_lights
        prefer_rgb_color: false
        transition: 5
        initial_transition: 1
        take_over_control: true
        detect_non_ha_changes: false
      - name: dining_room
        lights:
          - light.dining_room_lights
        prefer_rgb_color: false
        transition: 5
        initial_transition: 1
        take_over_control: true
        detect_non_ha_changes: false

    template:
      - button:
          - name: Dining Room Button
            unique_id: dining_room_button
            icon: mdi:gesture-tap-button
            press:
              action: light.toggle
              target:
                entity_id: light.dining_room_lights
      - light:
          - name: Living Room Lights
            unique_id: living_room_lights_group
            state: >-
              {{ is_state('light.kajplats_e26_ws_globe_1600lm_2', 'on')
                 or is_state('light.kajplats_e26_ws_globe_1600lm_3', 'on')
                 or is_state('light.kajplats_e26_ws_globe_1600lm_4', 'on') }}
            level: >-
              {{ [
                state_attr('light.kajplats_e26_ws_globe_1600lm_2', 'brightness') | int(0),
                state_attr('light.kajplats_e26_ws_globe_1600lm_3', 'brightness') | int(0),
                state_attr('light.kajplats_e26_ws_globe_1600lm_4', 'brightness') | int(0)
              ] | max }}
            turn_on:
              action: light.turn_on
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm_2
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
              data:
                brightness: "{{ brightness | default(none) }}"
                transition: "{{ transition | default(0, true) | float }}"
            set_level:
              action: light.turn_on
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm_2
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
              data:
                brightness: "{{ brightness }}"
                transition: "{{ transition | default(0, true) | float }}"
            turn_off:
              action: light.turn_off
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm_2
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
              data:
                transition: "{{ transition | default(0, true) | float }}"
          - name: Master Bedroom Lights
            unique_id: master_lights_group
            state: >-
              {{ is_state('light.kajplats_e26_ws_globe_1600lm', 'on')
                 or is_state('light.kajplats_e26_ws_globe_1600lm_5', 'on') }}
            level: >-
              {{ [
                state_attr('light.kajplats_e26_ws_globe_1600lm', 'brightness') | int(0),
                state_attr('light.kajplats_e26_ws_globe_1600lm_5', 'brightness') | int(0)
              ] | max }}
            turn_on:
              action: light.turn_on
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm
                  - light.kajplats_e26_ws_globe_1600lm_5
              data:
                brightness: "{{ brightness | default(none) }}"
                transition: "{{ transition | default(0, true) | float }}"
            set_level:
              action: light.turn_on
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm
                  - light.kajplats_e26_ws_globe_1600lm_5
              data:
                brightness: "{{ brightness }}"
                transition: "{{ transition | default(0, true) | float }}"
            turn_off:
              action: light.turn_off
              target:
                entity_id:
                  - light.kajplats_e26_ws_globe_1600lm
                  - light.kajplats_e26_ws_globe_1600lm_5
              data:
                transition: "{{ transition | default(0, true) | float }}"

    light:
      - platform: group
        unique_id: couch_group
        name: Living Room Couch Lights
        entities:
          - light.kajplats_e26_ws_globe_1600lm_3
          - light.kajplats_e26_ws_globe_1600lm_4
      - platform: group
        unique_id: sofa_group
        name: Sebby Bedroom Sofa Lights
        entities:
          - light.kajplats_e26_ws_globe_1600lm_6
          - light.kajplats_e26_ws_globe_1600lm_7
      - platform: group
        unique_id: standing_lamp_group
        name: Sebby Bedroom Standing Lamp
        entities:
          - light.kajplats_e26_ws_globe_1600lm_8
          - light.kajplats_e26_ws_globe_1600lm_9
      - platform: group
        unique_id: bedroom_lights_group
        name: Sebby Bedroom Lights
        entities:
          - light.kajplats_e26_ws_globe_1600lm_6
          - light.kajplats_e26_ws_globe_1600lm_7
          - light.standing_lamp
      - platform: group
        unique_id: dining_room_fan_group
        name: Dining Room Fan
        entities:
          - light.fan_1
          - light.fan_2
          - light.fan_3
      - platform: group
        unique_id: dining_room_lights_group
        name: Dining Room Lights
        entities:
          - light.fan_1
          - light.fan_2
          - light.fan_3
          - light.desk_lamp
