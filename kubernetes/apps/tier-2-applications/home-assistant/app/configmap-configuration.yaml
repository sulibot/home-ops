                  'event.bilresa_scroll_wheel_button_6_8',
                  'event.bilresa_scroll_wheel_button_9_8'
                ]
              } %}
              {% set ns = namespace(count=0) %}
              {% for name, events in buttons.items() %}
                {% set button = namespace(latest=0, available=false) %}
                {% for entity_id in events %}
                  {% set st = states[entity_id] %}
                  {% if st is not none and st.state not in ['unavailable', 'unknown'] %}
                    {% set button.available = true %}
                    {% set updated = as_timestamp(st.last_updated, 0) %}
                    {% if updated > button.latest %}
                      {% set button.latest = updated %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if not button.available or button.latest == 0 or (as_timestamp(now()) - button.latest) > max_age %}
