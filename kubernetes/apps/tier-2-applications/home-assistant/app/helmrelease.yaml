---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.13-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.1@sha256:067e54e2e107892a584936f064147f8bf47c0120eed34e272cf6eb6c8520b0de
            env:
              TZ: America/Los_Angeles
              # Required when Home Assistant is behind Gateway/API proxies.
              HASS_HTTP_USE_X_FORWARDED_FOR: "true"
              HASS_HTTP_TRUSTED_PROXY_1: fd00:69::/64
              HASS_HTTP_TRUSTED_PROXY_2: fd00:42::/64
              # Current cluster proxy source range observed in HA logs.
              HASS_HTTP_TRUSTED_PROXY_3: fd00:101:224::/60
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      # nodeSelector:
      #   usb-zigbee: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.251/24", "fd00:31::251/64"]
            }
          ]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      home-assistant: {}
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
    route:
      app:
        hostnames:
          - hass.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8123
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      configuration-file:
        enabled: true
        type: configMap
        identifier: configuration
        advancedMounts:
          home-assistant:
            app:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
      automations-file:
        enabled: true
        type: configMap
        identifier: automations
        advancedMounts:
          home-assistant:
            app:
              - path: /config/automations.yaml
                subPath: automations.yaml
      config-cache:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config-cache"
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
    configMaps:
      configuration:
        enabled: true
        data:
          configuration.yaml: |
            # Loads default set of integrations. Do not remove.
            default_config:

            # Load frontend themes from the themes folder
            frontend:
              themes: !include_dir_merge_named themes

            automation: !include automations.yaml
            script: !include scripts.yaml
            scene: !include scenes.yaml

            http:
              use_x_forwarded_for: true
              ip_ban_enabled: false
              login_attempts_threshold: 5
              trusted_proxies:
                - fd00:69::/64
                - fd00:42::/64
                - fd00:101:224::/60

            homeassistant:
              auth_providers:
                - type: trusted_networks
                  trusted_networks:
                    - fd00:30::/64
                    - fd00:31::/64
                    - 10.30.0.0/24
                    - 10.31.0.0/24
                  allow_bypass_login: true
                - type: homeassistant
              customize:
                light.smart_wi_fi_dimmer_switch_3:
                  friendly_name: Living Room Wall Dimmer
                  icon: mdi:light-switch

            google_assistant:
              project_id: sulibot-home-assistant
              service_account: !include SERVICE_ACCOUNT.json
              report_state: true
              expose_by_default: false

            light:
              - platform: group
                unique_id: living_room_lights_group
                name: Living Room Lights
                entities:
                  - light.essentials_a19_a60
                  - light.essentials_a19_a60_2
                  - light.essentials_a19_a60_3
      automations:
        enabled: true
        data:
          automations.yaml: |
            - id: living_room_dimmer_mirrors_nanoleaf_bulbs
              alias: Living Room Dimmer Mirrors Nanoleaf Bulbs
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch_3
              condition:
                - condition: template
                  value_template: "{{ trigger.to_state is not none }}"
              action:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: light.smart_wi_fi_dimmer_switch_3
                          state: "off"
                      sequence:
                        - service: light.turn_off
                          target:
                            entity_id: light.living_room_lights
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: light.living_room_lights
                      data:
                        brightness: "{{ state_attr('light.smart_wi_fi_dimmer_switch_3', 'brightness') }}"
      # usb-zigbee:
      #   enabled: true
      #   type: hostPath
      #   hostPath: /dev/ttyACM0
      #   hostPathType: CharDevice
      #   globalMounts:
      #     - path: /dev/ttyACM0
