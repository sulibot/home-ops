---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.13-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              readOnlyRootFilesystem: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.1@sha256:067e54e2e107892a584936f064147f8bf47c0120eed34e272cf6eb6c8520b0de
            env:
              TZ: America/Los_Angeles
              # Required when Home Assistant is behind Gateway/API proxies.
              HASS_HTTP_USE_X_FORWARDED_FOR: "true"
              HASS_HTTP_TRUSTED_PROXY_1: fd00:69::/64
              HASS_HTTP_TRUSTED_PROXY_2: fd00:42::/64
              # Current cluster proxy source range observed in HA logs.
              HASS_HTTP_TRUSTED_PROXY_3: fd00:101:224::/60
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              privileged: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      # nodeSelector:
      #   usb-zigbee: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan30",
              "namespace": "kube-system",
              "ips": ["10.30.0.251/24", "fd00:30::251/64"]
            },
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.251/24", "fd00:31::251/64"]
            }
          ]
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
          - hass.sulibot.com
          - home-assistant-app.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: authentik-outpost
                port: 9000
      google:
        hostnames:
          - ha-google.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8123
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      config-cache:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config-cache"
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
      # usb-zigbee:
      #   enabled: true
      #   type: hostPath
      #   hostPath: /dev/ttyACM0
      #   hostPathType: CharDevice
      #   globalMounts:
      #     - path: /dev/ttyACM0
