---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-aidot:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tarfile
                import tempfile
                import urllib.request

                commit = "08c30aa6c0eaf0f97ecb6011aaed096c914fd83f"
                target = "/config/custom_components/aidot"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == "1.2.0":
                        print("AiDot custom component already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "aidot.tar.gz")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/sulibot/hass-AiDot/archive/{commit}.tar.gz",
                        archive,
                    )
                    with tarfile.open(archive, mode="r:gz") as tarred:
                        tarred.extractall(extract_dir)

                    source = os.path.join(
                        extract_dir,
                        f"hass-AiDot-{commit}",
                        "custom_components",
                        "aidot",
                    )
                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(source, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tarfile
                import tempfile
                import urllib.request

                # renovate: datasource=github-releases depName=christiaangoossens/hass-oidc-auth
                version = "v0.6.5-alpha"
                target = "/config/custom_components/auth_oidc"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version.removeprefix("v"):
                        print(f"auth_oidc {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "auth_oidc.tar.gz")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/christiaangoossens/hass-oidc-auth/archive/refs/tags/{version}.tar.gz",
                        archive,
                    )
                    with tarfile.open(archive, mode="r:gz") as tarred:
                        tarred.extractall(extract_dir)

                    source = os.path.join(
                        extract_dir,
                        f"hass-oidc-auth-{version.removeprefix('v')}",
                        "custom_components",
                        "auth_oidc",
                    )
                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(source, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          patch-auth-oidc-finish:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                from pathlib import Path

                template = Path("/config/custom_components/auth_oidc/views/templates/finish.html")
                endpoint = Path("/config/custom_components/auth_oidc/endpoints/finish.py")
                patch_marker = "auth-oidc-autosubmit-patch"
                redirect_marker = "/lovelace?storeToken=true"

                if not template.exists():
                    raise SystemExit("auth_oidc finish.html not found")
                if not endpoint.exists():
                    raise SystemExit("auth_oidc finish.py not found")

                content = template.read_text(encoding="utf-8")
                if patch_marker not in content:
                    replacement = "\n".join([
                        "        </form>",
                        "        <script>",
                        '            window.addEventListener("load", () => {',
                        '                const form = document.querySelector("form[method=\'post\']");',
                        "                if (form) {",
                        "                    form.requestSubmit();",
                        "                }",
                        "            });",
                        "        </script>",
                        "        <!-- auth-oidc-autosubmit-patch -->",
                        "    </div>",
                    ])

                    content = content.replace("        </form>\n    </div>", replacement)
                    template.write_text(content, encoding="utf-8")
                    print("auth_oidc finish template patched")
                else:
                    print("auth_oidc finish template already patched")

                endpoint_content = endpoint.read_text(encoding="utf-8")
                endpoint_content = endpoint_content.replace(
                    'location="/?storeToken=true",',
                    'location="/lovelace?storeToken=true",',
                )
                endpoint.write_text(endpoint_content, encoding="utf-8")
                print("auth_oidc finish endpoint patched")
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc-deps:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import os
                import subprocess
                import sys

                # renovate: datasource=pypi depName=joserfc
                version = "1.6.3"
                venv = "/config/.venv"
                python_bin = os.path.join(venv, "bin", "python")
                pip_bin = os.path.join(venv, "bin", "pip")

                if not os.path.exists(python_bin):
                    subprocess.check_call([sys.executable, "-m", "venv", venv])

                installed = ""
                try:
                    installed = subprocess.check_output(
                        [python_bin, "-c", "import joserfc; print(joserfc.__version__)"],
                        text=True,
                    ).strip()
                except subprocess.CalledProcessError:
                    installed = ""

                if installed == version:
                    print(f"joserfc {version} already installed")
                    raise SystemExit(0)

                subprocess.check_call(
                    [python_bin, "-m", "pip", "install", f"joserfc=={version}"]
                )
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.1
            env:
              TZ: America/Los_Angeles
              PYTHONPATH: /config/.venv/lib/python3.14/site-packages
              # Required when Home Assistant is behind Gateway/API proxies.
              HASS_HTTP_USE_X_FORWARDED_FOR: "true"
              HASS_HTTP_TRUSTED_PROXY_1: fd00:69::/64
              HASS_HTTP_TRUSTED_PROXY_2: fd00:42::/64
              HASS_HTTP_TRUSTED_PROXY_3: fd00:101:224:3::/64
              # Cilium Gateway/Envoy forwards from the cluster pod CIDRs.
              HASS_HTTP_TRUSTED_PROXY_4: fd00:101:224::/60
              HASS_HTTP_TRUSTED_PROXY_5: 10.101.224.0/20
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      # nodeSelector:
      #   usb-zigbee: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.251/24", "fd00:31::251/64"]
            }
          ]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      home-assistant: {}
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
      direct:
        controller: home-assistant
        ports:
          http:
            port: 8123
    route:
      browser:
        hostnames:
          - hass.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /auth/oidc/redirect
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      app:
        hostnames:
          - hass-app.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      local:
        hostnames:
          - hass-local.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      configuration-file:
        enabled: true
        type: configMap
        identifier: configuration
        advancedMounts:
          home-assistant:
            app:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
      automations-file:
        enabled: true
        type: configMap
        identifier: automations
        advancedMounts:
          home-assistant:
            app:
              - path: /config/automations.yaml
                subPath: automations.yaml
      config-cache:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config-cache"
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
    configMaps:
      configuration:
        enabled: true
        data:
          configuration.yaml: |
            # Loads default set of integrations. Do not remove.
            default_config:

            # Load frontend themes from the themes folder
            frontend:
              themes: !include_dir_merge_named themes

            automation: !include automations.yaml
            script: !include scripts.yaml
            scene: !include scenes.yaml

            input_boolean:
              bedroom_lights_locked:
                name: Bedroom Lights Locked
                icon: mdi:lock
              bedroom_lights_override:
                name: Bedroom Lights Override
                icon: mdi:gesture-tap-button

            counter:
              bedroom_lights_press_count:
                name: Bedroom Lights Press Count
                initial: 0
                step: 1

            timer:
              bedroom_lights_press_window:
                name: Bedroom Lights Press Window
                duration: "00:00:05"
              bedroom_lights_override:
                name: Bedroom Lights Override
                duration: "00:30:00"

            http:
              use_x_forwarded_for: true
              ip_ban_enabled: false
              login_attempts_threshold: 5
              trusted_proxies:
                - fd00:69::/64
                - fd00:42::/64
                - fd00:101:224:3::/64
                - fd00:101:224::/60
                - 10.101.224.0/20

            homeassistant:
              internal_url: https://hass-app.sulibot.com
              external_url: https://hass-app.sulibot.com
              auth_providers:
                - type: homeassistant
              customize:
                light.smart_wi_fi_dimmer_switch_3:
                  friendly_name: Living Room Wall Dimmer
                  icon: mdi:light-switch
                light.living_room_lights:
                  icon: mdi:ceiling-light-multiple
                light.smart_wi_fi_dimmer_switch_2:
                  friendly_name: Master Wall Dimmer
                  icon: mdi:light-switch
                light.master_lights:
                  icon: mdi:ceiling-light-multiple
                light.smart_wi_fi_dimmer_switch:
                  friendly_name: Bedroom Wall Dimmer
                  icon: mdi:light-switch
                light.bedroom_lights:
                  icon: mdi:ceiling-light-multiple
                light.standing_lamp:
                  icon: mdi:floor-lamp

            auth_oidc:
              client_id: homeassistant-app
              discovery_url: https://auth.sulibot.com/application/o/home-assistant-app/.well-known/openid-configuration
              display_name: Authentik
              claims:
                username: email
              features:
                automatic_user_linking: true
                force_https: true

            google_assistant:
              project_id: sulibot-home-assistant
              service_account: !include SERVICE_ACCOUNT.json
              report_state: true
              expose_by_default: false
              entity_config:
                light.living_room_lights:
                  expose: true
                  room: Living Room
                  aliases:
                    - Living Room
                light.essentials_a19_a60:
                  expose: true
                  room: Living Room
                light.essentials_a19_a60_2:
                  expose: true
                  room: Living Room
                light.essentials_a19_a60_3:
                  expose: true
                  room: Living Room
                light.smart_wi_fi_dimmer_switch_3:
                  expose: false
                light.master_lights:
                  expose: true
                  room: Master
                  aliases:
                    - Master Lights
                    - Master Bedroom Lights
                light.essentials_a19_a60_4:
                  expose: true
                  room: Master
                light.essentials_a19_a60_5:
                  expose: true
                  room: Master
                light.smart_wi_fi_dimmer_switch_2:
                  expose: false
                light.bedroom_lights:
                  expose: true
                  room: Bedroom
                  aliases:
                    - Bedroom Lights
                light.standing_lamp:
                  expose: true
                  room: Bedroom
                  aliases:
                    - Standing Lamp
                light.essentials_a19_a60_6:
                  expose: true
                  room: Bedroom
                light.essentials_a19_a60_7:
                  expose: true
                  room: Bedroom
                light.essentials_a19_a60_8:
                  expose: false
                light.essentials_a19_a60_9:
                  expose: false
                light.smart_wi_fi_dimmer_switch:
                  expose: false

            adaptive_lighting:
              - name: living_room
                lights:
                  - light.living_room_lights
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false
              - name: master
                lights:
                  - light.master_lights
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false
              - name: bedroom
                lights:
                  - light.bedroom_lights
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false

            light:
              - platform: group
                unique_id: living_room_lights_group
                name: Living Room Lights
                entities:
                  - light.essentials_a19_a60
                  - light.essentials_a19_a60_2
                  - light.essentials_a19_a60_3
              - platform: group
                unique_id: master_lights_group
                name: Master Lights
                entities:
                  - light.essentials_a19_a60_4
                  - light.essentials_a19_a60_5
              - platform: group
                unique_id: standing_lamp_group
                name: Standing Lamp
                entities:
                  - light.essentials_a19_a60_8
                  - light.essentials_a19_a60_9
              - platform: group
                unique_id: bedroom_lights_group
                name: Bedroom Lights
                entities:
                  - light.essentials_a19_a60_6
                  - light.essentials_a19_a60_7
                  - light.standing_lamp
      automations:
        enabled: true
        data:
          automations.yaml: |
            - id: living_room_dimmer_mirrors_nanoleaf_bulbs
              alias: Living Room Dimmer Mirrors Nanoleaf Bulbs
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch_3
              condition:
                - condition: template
                  value_template: "{{ `{{ trigger.to_state is not none }}` }}"
              action:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: light.smart_wi_fi_dimmer_switch_3
                          state: "off"
                      sequence:
                        - service: light.turn_off
                          target:
                            entity_id: light.living_room_lights
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: light.living_room_lights
                      data:
                        brightness: "{{ `{{ state_attr('light.smart_wi_fi_dimmer_switch_3', 'brightness') | int(0) }}` }}"
            - id: master_dimmer_mirrors_nanoleaf_bulbs
              alias: Master Dimmer Mirrors Nanoleaf Bulbs
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch_2
              condition:
                - condition: template
                  value_template: "{{ `{{ trigger.to_state is not none }}` }}"
              action:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: light.smart_wi_fi_dimmer_switch_2
                          state: "off"
                      sequence:
                        - service: light.turn_off
                          target:
                            entity_id: light.master_lights
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: light.master_lights
                      data:
                        brightness: "{{ `{{ state_attr('light.smart_wi_fi_dimmer_switch_2', 'brightness') | int(0) }}` }}"
            - id: bedroom_dimmer_mirrors_nanoleaf_bulbs
              alias: Bedroom Dimmer Mirrors Bulbs
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
              condition:
                - condition: template
                  value_template: "{{ `{{ trigger.to_state is not none }}` }}"
                - condition: or
                  conditions:
                    - condition: state
                      entity_id: input_boolean.bedroom_lights_locked
                      state: "off"
                    - condition: state
                      entity_id: input_boolean.bedroom_lights_override
                      state: "on"
              action:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: light.smart_wi_fi_dimmer_switch
                          state: "off"
                      sequence:
                        - service: light.turn_off
                          target:
                            entity_id: light.bedroom_lights
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: light.bedroom_lights
                      data:
                        brightness: "{{ `{{ state_attr('light.smart_wi_fi_dimmer_switch', 'brightness') | int(0) }}` }}"
            - id: bedroom_lights_lock_enable
              alias: Bedroom Lights Lock Enable
              trigger:
                - platform: time
                  at: "19:30:00"
              action:
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.bedroom_lights_locked
              mode: single
            - id: bedroom_lights_lock_disable
              alias: Bedroom Lights Lock Disable
              trigger:
                - platform: time
                  at: "04:00:00"
              action:
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_locked
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_override
                - service: timer.cancel
                  target:
                    entity_id:
                      - timer.bedroom_lights_press_window
                      - timer.bedroom_lights_override
                - service: counter.reset
                  target:
                    entity_id: counter.bedroom_lights_press_count
              mode: single
            - id: bedroom_lights_lock_override_detect_triple_press
              alias: Bedroom Lights Lock Override Detect Triple Press
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
                  to: "on"
              condition:
                - condition: state
                  entity_id: input_boolean.bedroom_lights_locked
                  state: "on"
                - condition: state
                  entity_id: input_boolean.bedroom_lights_override
                  state: "off"
              action:
                - variables:
                    press_window_active: "{{ `{{ is_state('timer.bedroom_lights_press_window', 'active') }}` }}"
                    next_press_count: "{{ `{{ states('counter.bedroom_lights_press_count') | int(0) + 1 if is_state('timer.bedroom_lights_press_window', 'active') else 1 }}` }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ `{{ press_window_active }}` }}"
                      sequence:
                        - service: counter.increment
                          target:
                            entity_id: counter.bedroom_lights_press_count
                  default:
                    - service: counter.reset
                      target:
                        entity_id: counter.bedroom_lights_press_count
                    - service: counter.increment
                      target:
                        entity_id: counter.bedroom_lights_press_count
                    - service: timer.start
                      target:
                        entity_id: timer.bedroom_lights_press_window
                      data:
                        duration: "00:00:05"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ `{{ next_press_count >= 3 }}` }}"
                      sequence:
                        - service: input_boolean.turn_on
                          target:
                            entity_id: input_boolean.bedroom_lights_override
                        - service: timer.start
                          target:
                            entity_id: timer.bedroom_lights_override
                          data:
                            duration: "00:30:00"
                        - service: timer.cancel
                          target:
                            entity_id: timer.bedroom_lights_press_window
                        - service: counter.reset
                          target:
                            entity_id: counter.bedroom_lights_press_count
                        - service: light.turn_on
                          target:
                            entity_id:
                              - light.smart_wi_fi_dimmer_switch
                              - light.bedroom_lights
                          data:
                            brightness: "{{ `{{ state_attr('light.smart_wi_fi_dimmer_switch', 'brightness') | int(0) }}` }}"
            - id: bedroom_lights_lock_override_reset_press_window
              alias: Bedroom Lights Lock Override Reset Press Window
              mode: single
              trigger:
                - platform: event
                  event_type: timer.finished
                  event_data:
                    entity_id: timer.bedroom_lights_press_window
              action:
                - service: counter.reset
                  target:
                    entity_id: counter.bedroom_lights_press_count
            - id: bedroom_lights_lock_override_disable
              alias: Bedroom Lights Lock Override Disable
              mode: single
              trigger:
                - platform: event
                  event_type: timer.finished
                  event_data:
                    entity_id: timer.bedroom_lights_override
              action:
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_override
            - id: bedroom_lights_lock_enforce_from_dimmer
              alias: Bedroom Lights Lock Enforce From Dimmer
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
                  to: "on"
              condition:
                - condition: state
                  entity_id: input_boolean.bedroom_lights_locked
                  state: "on"
                - condition: state
                  entity_id: input_boolean.bedroom_lights_override
                  state: "off"
              action:
                - service: light.turn_off
                  target:
                    entity_id:
                      - light.smart_wi_fi_dimmer_switch
                      - light.bedroom_lights
            - id: adaptive_lighting_disable_brightness_after_start
              alias: Adaptive Lighting Disable Brightness After Start
              mode: single
              trigger:
                - platform: homeassistant
                  event: start
              action:
                - delay: "00:00:20"
                - service: switch.turn_off
                  target:
                    entity_id:
                      - switch.adaptive_lighting_adapt_brightness_living_room
                      - switch.adaptive_lighting_adapt_brightness_master
                      - switch.adaptive_lighting_adapt_brightness_bedroom
            - id: bedroom_morning_green_to_white_fade
              alias: Bedroom Morning Green To White Fade
              mode: single
              trigger:
                - platform: time
                  at: "07:00:00"
              condition:
                - condition: time
                  weekday:
                    - mon
                    - tue
                    - wed
                    - thu
                    - fri
              action:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    rgb_color: [0, 255, 0]
                    brightness_pct: 1
                    transition: 1
                - delay: "00:00:01"
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    color_temp_kelvin: 4000
                    brightness_pct: 80
                    transition: 1800
            - id: bedroom_morning_adaptive_lighting_handoff
              alias: Bedroom Morning Adaptive Lighting Handoff
              mode: single
              trigger:
                - platform: time
                  at: "07:30:00"
              condition:
                - condition: time
                  weekday:
                    - mon
                    - tue
                    - wed
                    - thu
                    - fri
              action:
                - service: adaptive_lighting.set_manual_control
                  data:
                    entity_id: switch.adaptive_lighting_bedroom
                    lights:
                      - light.bedroom_lights
                    manual_control: false
                - service: adaptive_lighting.apply
                  data:
                    entity_id: switch.adaptive_lighting_bedroom
                    lights:
                      - light.bedroom_lights
                    adapt_brightness: false
                    adapt_color: true
                    turn_on_lights: true
                    transition: 5
