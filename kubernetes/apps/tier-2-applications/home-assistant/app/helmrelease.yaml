          bootstrap-auth-oidc-deps:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import os
                import subprocess
                import sys

                # renovate: datasource=pypi depName=joserfc
                version = "1.6.3"
                packages = [
                    "aiofiles",
                    "jinja2",
                    "bcrypt",
                    f"joserfc=={version}",
                ]
                venv = "/config/.venv"
                python_bin = os.path.join(venv, "bin", "python")

                if not os.path.exists(python_bin):
                    subprocess.check_call([sys.executable, "-m", "venv", venv])

                try:
                    subprocess.check_call(
                        [
                            python_bin,
                            "-c",
                            (
                                "import aiofiles, jinja2, bcrypt, joserfc; "
                                f"assert joserfc.__version__ == {version!r}"
                            ),
                        ]
                    )
                    print("auth_oidc Python dependencies already installed")
                    raise SystemExit(0)
                except subprocess.CalledProcessError:
                    pass

                subprocess.check_call(
                    [python_bin, "-m", "pip", "install", *packages]
                )
                PY
