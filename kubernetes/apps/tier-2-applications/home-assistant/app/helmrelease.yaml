---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                # renovate: datasource=github-releases depName=hacs/integration
                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tarfile
                import tempfile
                import urllib.request

                # renovate: datasource=github-releases depName=christiaangoossens/hass-oidc-auth
                version = "v1.1.1"
                target = "/config/custom_components/auth_oidc"
                manifest_path = os.path.join(target, "manifest.json")

                def ensure_style_css():
                    static_dir = os.path.join(target, "static")
                    os.makedirs(static_dir, exist_ok=True)
                    with open(os.path.join(static_dir, "style.css"), "w", encoding="utf-8") as handle:
                        handle.write("""\
                html,
                body {
                  min-height: 100%;
                  margin: 0;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #111827;
                  color: #111827;
                }
                body {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 24px;
                }
                .bg-white {
                  width: min(100%, 420px);
                  background: #ffffff;
                  border-radius: 12px;
                  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
                  padding: 28px;
                }
                .text-center { text-align: center; }
                #login-button {
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  min-height: 44px;
                  width: 100%;
                  box-sizing: border-box;
                  border-radius: 999px;
                  background: #03a9d6;
                  color: #ffffff;
                  font-weight: 650;
                  text-decoration: none;
                  padding: 10px 18px;
                }
                #login-button:focus,
                #login-button:hover {
                  background: #0289b0;
                }
                #alternative-sign-in-link {
                  color: #4b5563;
                  text-decoration: none;
                }
                #alternative-sign-in-link:hover { text-decoration: underline; }
                .mt-4 { margin-top: 1rem; }
                .text-sm { font-size: 0.875rem; }
                .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
                .font-bold { font-weight: 700; }
                .tracking-wide { letter-spacing: 0.025em; }
                .bg-gray-100 { background: #f3f4f6; }
                .border { border: 1px solid #d1d5db; }
                .rounded-lg { border-radius: 0.5rem; }
                .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
                .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
                .inline-block { display: inline-block; }
                .text-gray-600 { color: #4b5563; }
                """)

                def ensure_google_host_skips_oidc():
                    injected_page_path = os.path.join(target, "endpoints", "injected_auth_page.py")
                    with open(injected_page_path, "r", encoding="utf-8") as handle:
                        content = handle.read()

                    marker = '        if req.host.split(":")[0] == "ha-google.sulibot.com":\n            return False\n\n'
                    if marker in content:
                        return

                    needle = '        if req.query.get("skip_oidc_redirect") == "true":\n            return False\n\n'
                    replacement = needle + marker
                    if needle not in content:
                        raise RuntimeError("Could not find OIDC redirect bypass insertion point")

                    with open(injected_page_path, "w", encoding="utf-8") as handle:
                        handle.write(content.replace(needle, replacement, 1))

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version.removeprefix("v"):
                        ensure_style_css()
                        ensure_google_host_skips_oidc()
                        print(f"auth_oidc {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "auth_oidc.tar.gz")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/christiaangoossens/hass-oidc-auth/archive/refs/tags/{version}.tar.gz",
                        archive,
                    )
                    with tarfile.open(archive, mode="r:gz") as tarred:
                        tarred.extractall(extract_dir)

                    source = os.path.join(
                        extract_dir,
                        f"hass-oidc-auth-{version.removeprefix('v')}",
                        "custom_components",
                        "auth_oidc",
                    )
                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(source, target)
                    with open(os.path.join(target, "manifest.json"), "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    manifest["requirements"] = []
                    with open(os.path.join(target, "manifest.json"), "w", encoding="utf-8") as handle:
                        json.dump(manifest, handle, indent=2)
                        handle.write("\n")
                    ensure_style_css()
                    ensure_google_host_skips_oidc()
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-matter-dimmer-bridge:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                from pathlib import Path
                import textwrap

                target = Path("/config/custom_components/matter_dimmer_bridge")
                os.makedirs(target, exist_ok=True)

                (target / "manifest.json").write_text(
                    json.dumps(
                        {
                            "domain": "matter_dimmer_bridge",
                            "name": "Matter Dimmer Bridge",
                            "version": "0.1.0",
                            "documentation": "https://github.com/sulibot/home-ops",
                            "dependencies": ["matter"],
                            "codeowners": ["@sulibot"],
                            "iot_class": "local_push",
                        },
                        indent=2,
                    )
                    + "\n",
                    encoding="utf-8",
                )

                (target / "__init__.py").write_text(
                    textwrap.dedent(
                        '''\
                        """Bridge Matter dimmer attribute updates directly to target bulbs."""

                        from __future__ import annotations

                        import asyncio
                        import logging
                        import time
                        from dataclasses import dataclass

                        import voluptuous as vol
                        from chip.clusters import Objects as clusters

                        from homeassistant.components.matter.const import DOMAIN as MATTER_DOMAIN
                        from homeassistant.components.matter.helpers import get_matter
                        from homeassistant.const import CONF_ENTITY_ID, CONF_NAME, EVENT_HOMEASSISTANT_STARTED
                        from homeassistant.core import Event, HomeAssistant, callback
                        from homeassistant.helpers import config_validation as cv
                        from matter_server.common.helpers.util import create_attribute_path
                        from matter_server.common.models import EventType

                        DOMAIN = "matter_dimmer_bridge"
                        CONF_NODE_ID = "node_id"
                        CONF_SWITCH_ENTITY_ID = "switch_entity_id"
                        CONF_TARGET_ENTITY_IDS = "target_entity_ids"
                        RETRY_DELAY_SECONDS = 5

                        LOGGER = logging.getLogger(__name__)

                        BRIDGE_SCHEMA = vol.Schema(
                            {
                                vol.Required(CONF_NAME): cv.string,
                                vol.Required(CONF_NODE_ID): vol.Coerce(int),
                                vol.Required(CONF_SWITCH_ENTITY_ID): cv.entity_id,
                                vol.Required(CONF_TARGET_ENTITY_IDS): vol.All(
                                    cv.ensure_list, [cv.entity_id]
                                ),
                            }
                        )

                        CONFIG_SCHEMA = vol.Schema(
                            {DOMAIN: vol.All(cv.ensure_list, [BRIDGE_SCHEMA])},
                            extra=vol.ALLOW_EXTRA,
                        )


                        @dataclass
                        class BridgeState:
                            """In-memory state for one mirrored dimmer."""

                            name: str
                            node_id: int
                            switch_entity_id: str
                            target_entity_ids: list[str]
                            is_on: bool | None = None
                            brightness: int = 255
                            suppress_level_until: float = 0.0


                        def _matter_to_ha_brightness(level: int | None) -> int:
                            """Convert Matter currentLevel to HA brightness scale."""
                            if level is None:
                                return 255
                            value = max(1, min(254, int(level)))
                            return round((value - 1) * 255 / 253)


                        async def _async_turn_on(
                            hass: HomeAssistant, state: BridgeState, *, brightness: int | None = None
                        ) -> None:
                            """Mirror dimmer on/brightness to target bulbs."""
                            service_data: dict[str, object] = {"entity_id": state.target_entity_ids}
                            if brightness is not None:
                                service_data["brightness"] = max(1, min(255, brightness))
                            t0 = time.monotonic()
                            LOGGER.warning("%s TIMING: svc_start ON brightness=%s", state.name, brightness)
                            try:
                                await hass.services.async_call(
                                    "light", "turn_on", service_data, blocking=True
                                )
                                LOGGER.warning("%s TIMING: svc_done +%.3fs", state.name, time.monotonic() - t0)
                            except Exception:
                                LOGGER.warning("%s TIMING: svc_error +%.3fs", state.name, time.monotonic() - t0, exc_info=True)


                        async def _async_turn_off(hass: HomeAssistant, state: BridgeState) -> None:
                            """Mirror dimmer off to target bulbs."""
                            t0 = time.monotonic()
                            LOGGER.warning("%s TIMING: svc_start OFF", state.name)
                            try:
                                await hass.services.async_call(
                                    "light",
                                    "turn_off",
                                    {"entity_id": state.target_entity_ids},
                                    blocking=True,
                                )
                                LOGGER.warning("%s TIMING: svc_done +%.3fs", state.name, time.monotonic() - t0)
                            except Exception:
                                LOGGER.warning("%s TIMING: svc_error +%.3fs", state.name, time.monotonic() - t0, exc_info=True)


                        def _load_initial_state(hass: HomeAssistant, state: BridgeState) -> None:
                            """Prime cached switch state from Matter node data."""
                            matter = get_matter(hass)
                            node = matter.matter_client.get_node(state.node_id)
                            endpoint = node.endpoints[1]
                            onoff_cluster = endpoint.get_cluster(clusters.OnOff)
                            level_cluster = endpoint.get_cluster(clusters.LevelControl)
                            if onoff_cluster is not None:
                                state.is_on = bool(getattr(onoff_cluster, "onOff", False))
                            if level_cluster is not None:
                                level = getattr(level_cluster, "currentLevel", None)
                                if isinstance(level, int):
                                    state.brightness = _matter_to_ha_brightness(level)


                        def _setup_bridge(hass: HomeAssistant, state: BridgeState) -> list[callable]:
                            """Subscribe to Matter attribute updates for one dimmer."""
                            matter = get_matter(hass)
                            matter_client = matter.matter_client
                            _load_initial_state(hass, state)

                            @callback
                            def onoff_updated(event: EventType, value: object) -> None:
                                if not isinstance(value, bool):
                                    return
                                state.is_on = value
                                LOGGER.warning("%s TIMING: callback on/off=%s", state.name, value)
                                if value:
                                    # Let adaptive_lighting choose the initial turn-on state.
                                    state.suppress_level_until = time.monotonic() + 0.3
                                    hass.async_create_task(
                                        _async_turn_on(hass, state)
                                    )
                                else:
                                    hass.async_create_task(_async_turn_off(hass, state))

                            @callback
                            def level_updated(event: EventType, value: object) -> None:
                                if not isinstance(value, int):
                                    return
                                state.brightness = _matter_to_ha_brightness(value)
                                LOGGER.warning("%s TIMING: callback level=%s brightness=%s", state.name, value, state.brightness)
                                if time.monotonic() < state.suppress_level_until:
                                    LOGGER.debug(
                                        "%s ignoring immediate level update to preserve adaptive_lighting",
                                        state.name,
                                    )
                                    return
                                if state.is_on is not False:
                                    hass.async_create_task(
                                        _async_turn_on(hass, state, brightness=state.brightness)
                                    )

                            return [
                                matter_client.subscribe_events(
                                    callback=onoff_updated,
                                    event_filter=EventType.ATTRIBUTE_UPDATED,
                                    node_filter=state.node_id,
                                    attr_path_filter=create_attribute_path(
                                        1,
                                        clusters.OnOff.Attributes.OnOff.cluster_id,
                                        clusters.OnOff.Attributes.OnOff.attribute_id,
                                    ),
                                ),
                                matter_client.subscribe_events(
                                    callback=level_updated,
                                    event_filter=EventType.ATTRIBUTE_UPDATED,
                                    node_filter=state.node_id,
                                    attr_path_filter=create_attribute_path(
                                        1,
                                        clusters.LevelControl.Attributes.CurrentLevel.cluster_id,
                                        clusters.LevelControl.Attributes.CurrentLevel.attribute_id,
                                    ),
                                ),
                            ]


                        async def async_setup(hass: HomeAssistant, config: dict) -> bool:
                            """Set up the Matter dimmer bridge."""
                            entries = config.get(DOMAIN, [])
                            if not entries:
                                return True

                            domain_data = hass.data.setdefault(DOMAIN, {})
                            domain_data["started"] = False
                            domain_data["unsubs"] = []
                            domain_data["matter_client"] = None

                            states = [
                                BridgeState(
                                    name=entry[CONF_NAME],
                                    node_id=entry[CONF_NODE_ID],
                                    switch_entity_id=entry[CONF_SWITCH_ENTITY_ID],
                                    target_entity_ids=list(entry[CONF_TARGET_ENTITY_IDS]),
                                )
                                for entry in entries
                            ]

                            async def _async_start(_: Event | None = None) -> None:
                                if MATTER_DOMAIN not in hass.data or not hass.data[MATTER_DOMAIN]:
                                    LOGGER.info("Matter not ready for dimmer bridge; retrying")
                                    async def _retry(_: object) -> None:
                                        await _async_start()
                                    hass.loop.call_later(
                                        RETRY_DELAY_SECONDS,
                                        lambda: hass.async_create_task(_retry(None)),
                                    )
                                    return
                                matter = get_matter(hass)
                                matter_client = matter.matter_client
                                if domain_data["started"] and domain_data["matter_client"] is matter_client:
                                    return
                                if domain_data["started"]:
                                    LOGGER.warning("Matter dimmer bridge rebinding to new Matter client")
                                    for unsub in domain_data["unsubs"]:
                                        try:
                                            unsub()
                                        except Exception:
                                            LOGGER.debug("Failed to unsubscribe Matter dimmer callback", exc_info=True)
                                    domain_data["started"] = False
                                    domain_data["unsubs"] = []
                                    domain_data["matter_client"] = None
                                try:
                                    unsubs: list[callable] = []
                                    for state in states:
                                        unsubs.extend(_setup_bridge(hass, state))
                                    domain_data["unsubs"] = unsubs
                                    domain_data["matter_client"] = matter_client
                                    domain_data["started"] = True
                                    LOGGER.warning(
                                        "Started Matter dimmer bridge for %s",
                                        ", ".join(state.name for state in states),
                                    )
                                except Exception:
                                    LOGGER.exception("Failed to start Matter dimmer bridge")
                                    async def _retry(_: object) -> None:
                                        await _async_start()
                                    hass.loop.call_later(
                                        RETRY_DELAY_SECONDS,
                                        lambda: hass.async_create_task(_retry(None)),
                                    )

                            async def _async_watch_matter_client() -> None:
                                while True:
                                    await asyncio.sleep(RETRY_DELAY_SECONDS)
                                    await _async_start()

                            if hass.is_running:
                                hass.async_create_task(_async_start())
                            else:
                                hass.bus.async_listen_once(EVENT_HOMEASSISTANT_STARTED, _async_start)
                            hass.async_create_background_task(
                                _async_watch_matter_client(),
                                "matter_dimmer_bridge_matter_client_watch",
                            )

                            return True
                        '''
                    ),
                    encoding="utf-8",
                )
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc-deps:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import os
                import subprocess
                import sys

                # renovate: datasource=pypi depName=joserfc
                version = "1.6.3"
                packages = ["aiofiles", "jinja2", f"joserfc=={version}"]
                venv = "/config/.venv"
                python_bin = os.path.join(venv, "bin", "python")

                if not os.path.exists(python_bin):
                    subprocess.check_call([sys.executable, "-m", "venv", venv])

                try:
                    subprocess.check_call(
                        [
                            python_bin,
                            "-c",
                            (
                                "import aiofiles, jinja2, joserfc; "
                                f"assert joserfc.__version__ == {version!r}"
                            ),
                        ]
                    )
                    print("auth_oidc Python dependencies already installed")
                    raise SystemExit(0)
                except subprocess.CalledProcessError:
                    pass

                subprocess.check_call(
                    [python_bin, "-m", "pip", "install", "--no-deps", *packages]
                )
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.1
            env:
              TZ: America/Los_Angeles
              PYTHONPATH: /config/.venv/lib/python3.14/site-packages
              # Required when Home Assistant is behind Gateway/API proxies.
              HASS_HTTP_USE_X_FORWARDED_FOR: "true"
              HASS_HTTP_TRUSTED_PROXY_1: fd00:69::/64
              HASS_HTTP_TRUSTED_PROXY_2: fd00:42::/64
              HASS_HTTP_TRUSTED_PROXY_3: fd00:101:224:3::/64
              # Cilium Gateway/Envoy forwards from the cluster pod CIDRs.
              HASS_HTTP_TRUSTED_PROXY_4: fd00:101:224::/60
              HASS_HTTP_TRUSTED_PROXY_5: 10.101.224.0/20
              HASS_HTTP_TRUSTED_PROXY_6: fd00:104:224::/60
              HASS_HTTP_TRUSTED_PROXY_7: 10.104.224.0/20
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      # nodeSelector:
      #   usb-zigbee: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.251/24", "fd00:31::251/64"]
            }
          ]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      home-assistant: {}
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
      direct:
        controller: home-assistant
        ports:
          http:
            port: 8123
    route:
      browser:
        hostnames:
          - hass.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      app:
        hostnames:
          - hass-app.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      get-token:
        hostnames:
          - hass-get-token.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /auth/oidc/welcome
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      local:
        hostnames:
          - hass-local.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      debug:
        hostnames:
          - hass-debug.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      configuration-file:
        enabled: true
        type: configMap
        name: home-assistant-configuration
        advancedMounts:
          home-assistant:
            app:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
      automations-file:
        enabled: true
        type: configMap
        name: home-assistant-automations
        advancedMounts:
          home-assistant:
            app:
              - path: /config/automations.yaml
                subPath: automations.yaml
      scripts-file:
        enabled: true
        type: configMap
        name: home-assistant-scripts
        advancedMounts:
          home-assistant:
            app:
              - path: /config/scripts.yaml
                subPath: scripts.yaml
      config-cache:
        type: emptyDir
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
      # usb-zigbee:
      #   enabled: true
      #   type: hostPath
      #   hostPath: /dev/ttyACM0
      #   hostPathType: CharDevice
      #   globalMounts:
      #     - path: /dev/ttyACM0
