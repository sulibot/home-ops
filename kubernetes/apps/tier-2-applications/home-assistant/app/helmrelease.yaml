---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tarfile
                import tempfile
                import urllib.request

                # renovate: datasource=github-releases depName=christiaangoossens/hass-oidc-auth
                version = "v0.6.5-alpha"
                target = "/config/custom_components/auth_oidc"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version.removeprefix("v"):
                        print(f"auth_oidc {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "auth_oidc.tar.gz")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/christiaangoossens/hass-oidc-auth/archive/refs/tags/{version}.tar.gz",
                        archive,
                    )
                    with tarfile.open(archive, mode="r:gz") as tarred:
                        tarred.extractall(extract_dir)

                    source = os.path.join(
                        extract_dir,
                        f"hass-oidc-auth-{version.removeprefix('v')}",
                        "custom_components",
                        "auth_oidc",
                    )
                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(source, target)
                    with open(os.path.join(target, "manifest.json"), "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    manifest["requirements"] = []
                    with open(os.path.join(target, "manifest.json"), "w", encoding="utf-8") as handle:
                        json.dump(manifest, handle, indent=2)
                        handle.write("\n")
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-matter-dimmer-bridge:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                from pathlib import Path
                import textwrap

                target = Path("/config/custom_components/matter_dimmer_bridge")
                os.makedirs(target, exist_ok=True)

                (target / "manifest.json").write_text(
                    json.dumps(
                        {
                            "domain": "matter_dimmer_bridge",
                            "name": "Matter Dimmer Bridge",
                            "version": "0.1.0",
                            "documentation": "https://github.com/sulibot/home-ops",
                            "dependencies": ["matter"],
                            "codeowners": ["@sulibot"],
                            "iot_class": "local_push",
                        },
                        indent=2,
                    )
                    + "\n",
                    encoding="utf-8",
                )

                (target / "__init__.py").write_text(
                    textwrap.dedent(
                        '''\
                        """Bridge Matter dimmer attribute updates directly to target bulbs."""

                        from __future__ import annotations

                        import logging
                        import time
                        from dataclasses import dataclass

                        import voluptuous as vol
                        from chip.clusters import Objects as clusters

                        from homeassistant.components.matter.const import DOMAIN as MATTER_DOMAIN
                        from homeassistant.components.matter.helpers import get_matter
                        from homeassistant.const import CONF_ENTITY_ID, CONF_NAME, EVENT_HOMEASSISTANT_STARTED
                        from homeassistant.core import Event, HomeAssistant, callback
                        from homeassistant.helpers import config_validation as cv
                        from matter_server.common.helpers.util import create_attribute_path
                        from matter_server.common.models import EventType

                        DOMAIN = "matter_dimmer_bridge"
                        CONF_NODE_ID = "node_id"
                        CONF_SWITCH_ENTITY_ID = "switch_entity_id"
                        CONF_TARGET_ENTITY_IDS = "target_entity_ids"
                        RETRY_DELAY_SECONDS = 5

                        LOGGER = logging.getLogger(__name__)

                        BRIDGE_SCHEMA = vol.Schema(
                            {
                                vol.Required(CONF_NAME): cv.string,
                                vol.Required(CONF_NODE_ID): vol.Coerce(int),
                                vol.Required(CONF_SWITCH_ENTITY_ID): cv.entity_id,
                                vol.Required(CONF_TARGET_ENTITY_IDS): vol.All(
                                    cv.ensure_list, [cv.entity_id]
                                ),
                            }
                        )

                        CONFIG_SCHEMA = vol.Schema(
                            {DOMAIN: vol.All(cv.ensure_list, [BRIDGE_SCHEMA])},
                            extra=vol.ALLOW_EXTRA,
                        )


                        @dataclass
                        class BridgeState:
                            """In-memory state for one mirrored dimmer."""

                            name: str
                            node_id: int
                            switch_entity_id: str
                            target_entity_ids: list[str]
                            is_on: bool | None = None
                            brightness: int = 255
                            suppress_level_until: float = 0.0


                        def _matter_to_ha_brightness(level: int | None) -> int:
                            """Convert Matter currentLevel to HA brightness scale."""
                            if level is None:
                                return 255
                            value = max(1, min(254, int(level)))
                            return round((value - 1) * 255 / 253)


                        async def _async_turn_on(
                            hass: HomeAssistant, state: BridgeState, *, brightness: int | None = None
                        ) -> None:
                            """Mirror dimmer on/brightness to target bulbs."""
                            service_data: dict[str, object] = {"entity_id": state.target_entity_ids}
                            if brightness is not None:
                                service_data["brightness"] = max(1, min(255, brightness))
                            try:
                                await hass.services.async_call(
                                    "light", "turn_on", service_data, blocking=True
                                )
                            except Exception:
                                LOGGER.warning("%s turn_on failed", state.name, exc_info=True)


                        async def _async_turn_off(hass: HomeAssistant, state: BridgeState) -> None:
                            """Mirror dimmer off to target bulbs."""
                            try:
                                await hass.services.async_call(
                                    "light",
                                    "turn_off",
                                    {"entity_id": state.target_entity_ids},
                                    blocking=True,
                                )
                            except Exception:
                                LOGGER.warning("%s turn_off failed", state.name, exc_info=True)


                        def _load_initial_state(hass: HomeAssistant, state: BridgeState) -> None:
                            """Prime cached switch state from Matter node data."""
                            matter = get_matter(hass)
                            node = matter.matter_client.get_node(state.node_id)
                            endpoint = node.endpoints[1]
                            onoff_cluster = endpoint.get_cluster(clusters.OnOff)
                            level_cluster = endpoint.get_cluster(clusters.LevelControl)
                            if onoff_cluster is not None:
                                state.is_on = bool(getattr(onoff_cluster, "onOff", False))
                            if level_cluster is not None:
                                level = getattr(level_cluster, "currentLevel", None)
                                if isinstance(level, int):
                                    state.brightness = _matter_to_ha_brightness(level)


                        def _setup_bridge(hass: HomeAssistant, state: BridgeState) -> list[callable]:
                            """Subscribe to Matter attribute updates for one dimmer."""
                            matter = get_matter(hass)
                            matter_client = matter.matter_client
                            _load_initial_state(hass, state)

                            @callback
                            def onoff_updated(event: EventType, value: object) -> None:
                                if not isinstance(value, bool):
                                    return
                                state.is_on = value
                                LOGGER.info("%s on/off -> %s", state.name, value)
                                if value:
                                    # Let adaptive_lighting choose the initial turn-on state.
                                    state.suppress_level_until = time.monotonic() + 2.0
                                    hass.async_create_task(
                                        _async_turn_on(hass, state)
                                    )
                                else:
                                    hass.async_create_task(_async_turn_off(hass, state))

                            @callback
                            def level_updated(event: EventType, value: object) -> None:
                                if not isinstance(value, int):
                                    return
                                state.brightness = _matter_to_ha_brightness(value)
                                LOGGER.info("%s brightness -> %s", state.name, state.brightness)
                                if time.monotonic() < state.suppress_level_until:
                                    LOGGER.debug(
                                        "%s ignoring immediate level update to preserve adaptive_lighting",
                                        state.name,
                                    )
                                    return
                                if state.is_on is not False:
                                    hass.async_create_task(
                                        _async_turn_on(hass, state, brightness=state.brightness)
                                    )

                            return [
                                matter_client.subscribe_events(
                                    callback=onoff_updated,
                                    event_filter=EventType.ATTRIBUTE_UPDATED,
                                    node_filter=state.node_id,
                                    attr_path_filter=create_attribute_path(
                                        1,
                                        clusters.OnOff.Attributes.OnOff.cluster_id,
                                        clusters.OnOff.Attributes.OnOff.attribute_id,
                                    ),
                                ),
                                matter_client.subscribe_events(
                                    callback=level_updated,
                                    event_filter=EventType.ATTRIBUTE_UPDATED,
                                    node_filter=state.node_id,
                                    attr_path_filter=create_attribute_path(
                                        1,
                                        clusters.LevelControl.Attributes.CurrentLevel.cluster_id,
                                        clusters.LevelControl.Attributes.CurrentLevel.attribute_id,
                                    ),
                                ),
                            ]


                        async def async_setup(hass: HomeAssistant, config: dict) -> bool:
                            """Set up the Matter dimmer bridge."""
                            entries = config.get(DOMAIN, [])
                            if not entries:
                                return True

                            domain_data = hass.data.setdefault(DOMAIN, {})
                            domain_data["started"] = False
                            domain_data["unsubs"] = []

                            states = [
                                BridgeState(
                                    name=entry[CONF_NAME],
                                    node_id=entry[CONF_NODE_ID],
                                    switch_entity_id=entry[CONF_SWITCH_ENTITY_ID],
                                    target_entity_ids=list(entry[CONF_TARGET_ENTITY_IDS]),
                                )
                                for entry in entries
                            ]

                            async def _async_start(_: Event | None = None) -> None:
                                if domain_data["started"]:
                                    return
                                if MATTER_DOMAIN not in hass.data or not hass.data[MATTER_DOMAIN]:
                                    LOGGER.info("Matter not ready for dimmer bridge; retrying")
                                    async def _retry(_: object) -> None:
                                        await _async_start()
                                    hass.loop.call_later(
                                        RETRY_DELAY_SECONDS,
                                        lambda: hass.async_create_task(_retry(None)),
                                    )
                                    return
                                try:
                                    unsubs: list[callable] = []
                                    for state in states:
                                        unsubs.extend(_setup_bridge(hass, state))
                                    domain_data["unsubs"] = unsubs
                                    domain_data["started"] = True
                                    LOGGER.warning(
                                        "Started Matter dimmer bridge for %s",
                                        ", ".join(state.name for state in states),
                                    )
                                except Exception:
                                    LOGGER.exception("Failed to start Matter dimmer bridge")
                                    async def _retry(_: object) -> None:
                                        await _async_start()
                                    hass.loop.call_later(
                                        RETRY_DELAY_SECONDS,
                                        lambda: hass.async_create_task(_retry(None)),
                                    )

                            if hass.is_running:
                                hass.async_create_task(_async_start())
                            else:
                                hass.bus.async_listen_once(EVENT_HOMEASSISTANT_STARTED, _async_start)

                            return True
                        '''
                    ),
                    encoding="utf-8",
                )
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          patch-auth-oidc-finish:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                from pathlib import Path
                import textwrap

                template = Path("/config/custom_components/auth_oidc/views/templates/finish.html")
                endpoint = Path("/config/custom_components/auth_oidc/endpoints/finish.py")
                callback_file = Path("/config/custom_components/auth_oidc/endpoints/callback.py")
                redirect_file = Path("/config/custom_components/auth_oidc/endpoints/redirect.py")
                init_file = Path("/config/custom_components/auth_oidc/__init__.py")

                if not template.exists():
                    raise SystemExit("auth_oidc finish.html not found")
                if not endpoint.exists():
                    raise SystemExit("auth_oidc finish.py not found")
                if not callback_file.exists():
                    raise SystemExit("auth_oidc callback.py not found")
                if not redirect_file.exists():
                    raise SystemExit("auth_oidc redirect.py not found")
                if not init_file.exists():
                    raise SystemExit("auth_oidc __init__.py not found")

                template.write_text(
                    textwrap.dedent(
                        """\
                        {% extends "base.html" %}
                        {% block title %}Logged in!{% endblock %}
                        {% block head %}
                        {{ super() }}
                        {% endblock %}
                        {% block content %}
                        <div class="text-center">
                            {% if show_browser_login %}
                            <div class="my-6">
                                <h2 class="text-xl font-semibold mb-6 text-gray-800">I want to login to this browser</h2>
                                <form method="post">
                                    <input type="hidden" name="code" value="{{ browser_code }}">
                                    <button type="submit"
                                        class="w-full py-2 px-4 bg-blue-500 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75">
                                        Login to Home Assistant in this browser
                                    </button>
                                </form>
                                {% if auto_submit %}
                                <script>
                                    window.addEventListener("load", () => {
                                        const form = document.querySelector("form[method='post']");
                                        if (form) {
                                            form.requestSubmit();
                                        }
                                    });
                                </script>
                                {% endif %}
                            </div>

                            <hr class="my-12">
                            {% endif %}

                            <div class="my-6">
                                <h2 class="text-xl font-semibold mb-4 text-gray-800">I am on a mobile device</h2>
                                <p class="mb-4">Your one-time code is: <b class="text-blue-600 text-xl">{{ mobile_code }}</b></p>
                                <p class="mb-4 text-sm">You have 5 minutes to use this code on any device.<br />The code can only
                                    be used once.</p>
                                <p class="mb-4 text-sm">{{ mobile_instructions }}</p>
                            </div>
                        </div>
                        {% endblock %}
                        """
                    ),
                    encoding="utf-8",
                )
                print("auth_oidc finish template patched")

                endpoint.write_text(
                    textwrap.dedent(
                        '''\
                        """Finish route to allow the user to view their code."""

                        from aiohttp import web
                        from homeassistant.components.http import HomeAssistantView

                        from ..helpers import get_view

                        PATH = "/auth/oidc/finish"
                        TOKEN_HOST = "hass-get-token.sulibot.com"


                        class OIDCFinishView(HomeAssistantView):
                            """OIDC Plugin Finish View."""

                            requires_auth = False
                            url = PATH
                            name = "auth:oidc:finish"

                            async def get(self, request: web.Request) -> web.Response:
                                """Show the finish screen to allow the user to view their code."""
                                code = request.query.get("code")

                                if not code:
                                    view_html = await get_view(
                                        "error",
                                        {"error": "Missing code to show the finish screen."},
                                    )
                                    return web.Response(text=view_html, content_type="text/html")

                                host = (request.host or "").split(":")[0]
                                is_token_host = host == TOKEN_HOST
                                browser_code = code
                                mobile_code = code
                                show_browser_login = True
                                auto_submit = not is_token_host
                                mobile_instructions = (
                                    "Please type the code into your app manually. If you don't see a code input, select "
                                    "'Login with OpenID Connect (SSO)' first."
                                )

                                if is_token_host:
                                    show_browser_login = False

                                view_html = await get_view(
                                    "finish",
                                    {
                                        "auto_submit": auto_submit,
                                        "browser_code": browser_code,
                                        "mobile_code": mobile_code,
                                        "mobile_instructions": mobile_instructions,
                                        "show_browser_login": show_browser_login,
                                    },
                                )
                                return web.Response(text=view_html, content_type="text/html")

                            async def post(self, request: web.Request) -> web.Response:
                                """Receive response."""
                                data = await request.post()
                                code = data.get("code")

                                if not code:
                                    return web.Response(text="No code received", status=500)

                                return web.HTTPFound(
                                    location="/lovelace?storeToken=true",
                                    headers={
                                        "set-cookie": "auth_oidc_code="
                                        + code
                                        + "; Path=/auth/login_flow; SameSite=Strict; HttpOnly; Max-Age=5",
                                    },
                                )
                        '''
                    ),
                    encoding="utf-8",
                )
                print("auth_oidc finish endpoint patched")

                callback_file.write_text(
                    textwrap.dedent(
                        '''\
                        """Callback route to return the user to after external OIDC interaction."""

                        import urllib.parse

                        from aiohttp import web
                        from homeassistant.components.auth import create_auth_code
                        from homeassistant.components.http import KEY_HASS, HomeAssistantView

                        from ..helpers import get_url, get_view
                        from ..oidc_client import OIDCClient
                        from ..provider import OpenIDAuthProvider

                        PATH = "/auth/oidc/callback"
                        APP_HOST = "hass-app.sulibot.com"
                        DEFAULT_APP_CLIENT_ID = "https://home-assistant.io/iOS"
                        DEFAULT_APP_REDIRECT_URI = "homeassistant://auth-callback"


                        class OIDCCallbackView(HomeAssistantView):
                            """OIDC Plugin Callback View."""

                            requires_auth = False
                            url = PATH
                            name = "auth:oidc:callback"

                            def __init__(
                                self,
                                oidc_client: OIDCClient,
                                oidc_provider: OpenIDAuthProvider,
                                force_https: bool,
                            ) -> None:
                                self.oidc_client = oidc_client
                                self.oidc_provider = oidc_provider
                                self.force_https = force_https

                            async def get(self, request: web.Request) -> web.Response:
                                """Receive response."""

                                params = request.rel_url.query
                                oidc_code = params.get("code")
                                state = params.get("state")

                                if not (oidc_code and state):
                                    view_html = await get_view(
                                        "error",
                                        {
                                            "error": "Missing code or state parameter.",
                                        },
                                    )
                                    return web.Response(text=view_html, content_type="text/html")

                                flow = self.oidc_client.flows.get(state, {})
                                ha_client_id = flow.get("ha_client_id")
                                ha_redirect_uri = flow.get("ha_redirect_uri")

                                request_host = (request.host or "").split(":")[0]
                                if request_host == APP_HOST:
                                    ha_client_id = ha_client_id or DEFAULT_APP_CLIENT_ID
                                    ha_redirect_uri = ha_redirect_uri or DEFAULT_APP_REDIRECT_URI

                                redirect_uri = get_url("/auth/oidc/callback", self.force_https)
                                user_details = await self.oidc_client.async_complete_token_flow(
                                    redirect_uri, oidc_code, state
                                )
                                if user_details is None:
                                    view_html = await get_view(
                                        "error",
                                        {
                                            "error": "Failed to get user details, "
                                            + "see Home Assistant logs for more information.",
                                        },
                                    )
                                    return web.Response(text=view_html, content_type="text/html")

                                if user_details.get("role") == "invalid":
                                    view_html = await get_view(
                                        "error",
                                        {
                                            "error": "User is not in the correct group to access Home Assistant, "
                                            + "contact your administrator!",
                                        },
                                    )
                                    return web.Response(text=view_html, content_type="text/html")

                                if ha_client_id and ha_redirect_uri and ha_redirect_uri.startswith("homeassistant"):
                                    self.oidc_provider._user_meta[user_details["sub"]] = user_details
                                    credentials = await self.oidc_provider.async_get_or_create_credentials(
                                        {"sub": user_details["sub"]}
                                    )
                                    auth_code = create_auth_code(
                                        request.app[KEY_HASS], ha_client_id, credentials
                                    )
                                    query = urllib.parse.urlencode({"code": auth_code})
                                    separator = "&" if "?" in ha_redirect_uri else "?"
                                    return web.HTTPFound(f"{ha_redirect_uri}{separator}{query}")

                                login_code = await self.oidc_provider.async_save_user_info(user_details)
                                return web.HTTPFound(
                                    get_url("/auth/oidc/finish?code=" + login_code, self.force_https)
                                )
                        '''
                    ),
                    encoding="utf-8",
                )
                print("auth_oidc callback endpoint patched")

                redirect_file.write_text(
                    textwrap.dedent(
                        '''\
                        """Redirect route to redirect the user to the external OIDC server,
                        can either be linked to directly or accessed through the welcome page."""

                        import urllib.parse

                        from aiohttp import web
                        from homeassistant.components.http import HomeAssistantView

                        from ..helpers import get_url, get_view
                        from ..oidc_client import OIDCClient

                        PATH = "/auth/oidc/redirect"
                        APP_HOST = "hass-app.sulibot.com"
                        DEFAULT_APP_CLIENT_ID = "https://home-assistant.io/iOS"
                        DEFAULT_APP_REDIRECT_URI = "homeassistant://auth-callback"


                        class OIDCRedirectView(HomeAssistantView):
                            """OIDC Plugin Redirect View."""

                            requires_auth = False
                            url = PATH
                            name = "auth:oidc:redirect"

                            def __init__(self, oidc_client: OIDCClient, force_https: bool) -> None:
                                self.oidc_client = oidc_client
                                self.force_https = force_https

                            async def get(self, request: web.Request) -> web.Response:
                                """Receive response."""

                                try:
                                    redirect_uri = get_url("/auth/oidc/callback", self.force_https)
                                    auth_url = await self.oidc_client.async_get_authorization_url(redirect_uri)

                                    if auth_url:
                                        request_host = (request.host or "").split(":")[0]
                                        ha_client_id = request.query.get("client_id")
                                        ha_redirect_uri = request.query.get("redirect_uri")

                                        if request_host == APP_HOST:
                                            ha_client_id = ha_client_id or DEFAULT_APP_CLIENT_ID
                                            ha_redirect_uri = ha_redirect_uri or DEFAULT_APP_REDIRECT_URI

                                        if ha_client_id or ha_redirect_uri:
                                            parsed = urllib.parse.urlparse(auth_url)
                                            state = urllib.parse.parse_qs(parsed.query).get("state", [None])[0]
                                            if state and state in self.oidc_client.flows:
                                                flow = self.oidc_client.flows[state]
                                                if ha_client_id:
