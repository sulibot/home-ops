      configuration:
        enabled: true
        data:
          configuration.yaml: |
            # Loads default set of integrations. Do not remove.
            default_config:

            # Load frontend themes from the themes folder
            frontend:
              themes: !include_dir_merge_named themes

            automation: !include automations.yaml
            script: !include scripts.yaml
            scene: !include scenes.yaml

            logger:
              default: warning
              logs:
                custom_components.matter_dimmer_bridge: info
                homeassistant.components.matter: debug
                homeassistant.components.thread: debug
                homeassistant.components.websocket_api: info

            input_boolean:
              bedroom_lights_locked:
                name: Bedroom Lights Locked
                icon: mdi:lock
              bedroom_lights_override:
                name: Bedroom Lights Override
                icon: mdi:gesture-tap-button

            input_text:
              bilresa_hold_state_master_green_1:
                name: Bilresa Hold State Master Green 1
                initial: cooler,cooler,cooler
                max: 32
              bilresa_hold_state_living_white_2:
                name: Bilresa Hold State Living White 2
                initial: cooler,cooler,cooler
                max: 32

            counter:
              bedroom_lights_press_count:
                name: Bedroom Lights Press Count
                initial: 0
                step: 1

            timer:
              bedroom_lights_press_window:
                name: Bedroom Lights Press Window
                duration: "00:00:05"
              bedroom_lights_override:
                name: Bedroom Lights Override
                duration: "00:30:00"

            http:
              use_x_forwarded_for: true
              ip_ban_enabled: false
              login_attempts_threshold: 5
              trusted_proxies:
                - fd00:69::/64
                - fd00:42::/64
                - fd00:101:224:3::/64
                - fd00:101:224:5::/64
                - fd00:101:224::/60
                - fd00:101:224::/56
                - 10.101.224.0/20

            homeassistant:
              # The iOS/mobile app persists HA's advertised internal/external URLs from
              # discovery/onboarding. Keep both on the unified app/discovery hostname so
              # the client does not pivot from local split-DNS onto the legacy browser host.
              internal_url: https://hass-app.sulibot.com
              external_url: https://hass-app.sulibot.com
              auth_providers:
                - type: homeassistant
              customize:
                light.living_room_switch:
                  friendly_name: Living room switch
                  icon: mdi:light-switch
                light.living_room_lights:
                  icon: mdi:ceiling-light-multiple
                light.couch:
                  icon: mdi:sofa
                light.master_switch:
                  friendly_name: Master Switch
                  icon: mdi:light-switch
                light.master_lights:
                  icon: mdi:ceiling-light-multiple
                light.bedroom_switch:
                  friendly_name: Bedroom Switch
                  icon: mdi:light-switch
                light.smart_wi_fi_dimmer_switch:
                  friendly_name: Bedroom Wall Dimmer
                  icon: mdi:light-switch
                light.bedroom_lights:
                  icon: mdi:ceiling-light-multiple
                light.sofa:
                  icon: mdi:sofa
                light.standing_lamp:
                  icon: mdi:floor-lamp
                light.dining_room_fan:
                  icon: mdi:ceiling-fan-light
                light.dining_room_lights:
                  icon: mdi:chandelier

            auth_oidc:
              additional_scopes:
                - email
              client_id: homeassistant-app
              discovery_url: https://auth.sulibot.com/application/o/home-assistant-app/.well-known/openid-configuration
              display_name: Authentik SSO
              claims:
                username: email
              features:
                automatic_user_linking: true
                force_https: true

            matter_dimmer_bridge:
              - name: Living room switch
                node_id: 7
                switch_entity_id: light.living_room_switch
                target_entity_ids:
                  - light.kajplats_e26_ws_globe_1600lm_2
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
              - name: Master Switch
                node_id: 6
                switch_entity_id: light.master_switch
                target_entity_ids:
                  - light.kajplats_e26_ws_globe_1600lm
                  - light.kajplats_e26_ws_globe_1600lm_5
              - name: Bedroom Switch
                node_id: 28
                switch_entity_id: light.bedroom_switch
                target_entity_ids:
                  - light.kajplats_e26_ws_globe_1600lm_6
                  - light.kajplats_e26_ws_globe_1600lm_7
                  - light.kajplats_e26_ws_globe_1600lm_8
                  - light.kajplats_e26_ws_globe_1600lm_9

            google_assistant:
              project_id: sulibot-home-assistant
              service_account: !include SERVICE_ACCOUNT.json
              report_state: true
              expose_by_default: false
              entity_config:
                light.living_room_lights:
                  expose: true
                  room: Living Room
                  aliases:
                    - Living Room
                light.couch:
                  expose: true
                  room: Living Room
                  aliases:
                    - Couch
                light.kajplats_e26_ws_globe_1600lm_2:
                  expose: true
                  room: Living Room
                light.kajplats_e26_ws_globe_1600lm_3:
                  expose: true
                  room: Living Room
                light.kajplats_e26_ws_globe_1600lm_4:
                  expose: true
                  room: Living Room
                light.living_room_switch:
                  expose: false
                light.master_lights:
                  expose: true
                  room: Master
                  aliases:
                    - Master Lights
                    - Master Bedroom Lights
                light.kajplats_e26_ws_globe_1600lm:
                  expose: true
                  room: Master
                light.kajplats_e26_ws_globe_1600lm_5:
                  expose: true
                  room: Master
                light.master_switch:
                  expose: false
                light.bedroom_switch:
                  expose: false
                light.bedroom_lights:
                  expose: true
                  room: Bedroom
                  aliases:
                    - Bedroom Lights
                light.sofa:
                  expose: true
                  room: Bedroom
                  aliases:
                    - Sofa
                light.standing_lamp:
                  expose: true
                  room: Bedroom
                  aliases:
                    - Standing Lamp
                light.smart_wi_fi_dimmer_switch:
                  expose: false
                light.dining_room_lights:
                  expose: true
                  room: Dining Room
                  aliases:
                    - Dining Room Lights
                    - Dining Room Light
                light.dining_room_fan:
                  expose: true
                  room: Dining Room
                  aliases:
                    - Dining Room Fan
                    - Dining Room Ceiling Light
                light.fan_1:
                  expose: false
                light.fan_2:
                  expose: false
                light.fan_3:
                  expose: false
                light.desk_lamp:
                  expose: true
                  room: Dining Room
                  aliases:
                    - Dining Room Desk Lamp
                button.dining_room_button:
                  expose: true
                  room: Dining Room
                  aliases:
                    - Dining Room Button
                    - Dining Room Lights Button

            adaptive_lighting:
              - name: living_room
                lights:
                  - light.kajplats_e26_ws_globe_1600lm_2
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false
              - name: master
                lights:
                  - light.kajplats_e26_ws_globe_1600lm
                  - light.kajplats_e26_ws_globe_1600lm_5
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false
              - name: bedroom
                lights:
                  - light.bedroom_lights
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false
              - name: dining_room
                lights:
                  - light.dining_room_lights
                prefer_rgb_color: false
                transition: 5
                initial_transition: 1
                take_over_control: true
                detect_non_ha_changes: false

            template:
              - button:
                  - name: Dining Room Button
                    unique_id: dining_room_button
                    icon: mdi:gesture-tap-button
                    press:
                      action: light.toggle
                      target:
                        entity_id: light.dining_room_lights
              - light:
                  - name: Living Room Lights
                    unique_id: living_room_lights_group
                    state: >-
                      {{ is_state('light.kajplats_e26_ws_globe_1600lm_2', 'on')
                         or is_state('light.kajplats_e26_ws_globe_1600lm_3', 'on')
                         or is_state('light.kajplats_e26_ws_globe_1600lm_4', 'on') }}
                    level: >-
                      {{ [
                        state_attr('light.kajplats_e26_ws_globe_1600lm_2', 'brightness') | int(0),
                        state_attr('light.kajplats_e26_ws_globe_1600lm_3', 'brightness') | int(0),
                        state_attr('light.kajplats_e26_ws_globe_1600lm_4', 'brightness') | int(0)
                      ] | max }}
                    turn_on:
                      action: light.turn_on
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm_2
                          - light.kajplats_e26_ws_globe_1600lm_3
                          - light.kajplats_e26_ws_globe_1600lm_4
                      data:
                        brightness: >-
                          {{ brightness | int if brightness is defined and brightness is not none else none }}
                        transition: >-
                          {{ transition | float if transition is defined and transition is not none else none }}
                    set_level:
                      action: light.turn_on
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm_2
                          - light.kajplats_e26_ws_globe_1600lm_3
                          - light.kajplats_e26_ws_globe_1600lm_4
                      data:
                        brightness: >-
                          {{ brightness | int if brightness is defined and brightness is not none else none }}
                        transition: >-
                          {{ transition | float if transition is defined and transition is not none else none }}
                    turn_off:
                      action: light.turn_off
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm_2
                          - light.kajplats_e26_ws_globe_1600lm_3
                          - light.kajplats_e26_ws_globe_1600lm_4
                      data:
                        transition: >-
                          {{ transition | float if transition is defined and transition is not none else none }}
                  - name: Master Lights
                    unique_id: master_lights_group
                    state: >-
                      {{ is_state('light.kajplats_e26_ws_globe_1600lm', 'on')
                         or is_state('light.kajplats_e26_ws_globe_1600lm_5', 'on') }}
                    level: >-
                      {{ [
                        state_attr('light.kajplats_e26_ws_globe_1600lm', 'brightness') | int(0),
                        state_attr('light.kajplats_e26_ws_globe_1600lm_5', 'brightness') | int(0)
                      ] | max }}
                    turn_on:
                      action: light.turn_on
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm
                          - light.kajplats_e26_ws_globe_1600lm_5
                      data:
                        brightness: "{{ brightness | default(none) }}"
                        transition: "{{ transition | default(none) }}"
                    set_level:
                      action: light.turn_on
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm
                          - light.kajplats_e26_ws_globe_1600lm_5
                      data:
                        brightness: "{{ brightness }}"
                        transition: "{{ transition | default(none) }}"
                    turn_off:
                      action: light.turn_off
                      target:
                        entity_id:
                          - light.kajplats_e26_ws_globe_1600lm
                          - light.kajplats_e26_ws_globe_1600lm_5
                      data:
                        transition: "{{ transition | default(none) }}"

            light:
              - platform: group
                unique_id: living_room_couch_group
                name: Couch
                entities:
                  - light.kajplats_e26_ws_globe_1600lm_3
                  - light.kajplats_e26_ws_globe_1600lm_4
              - platform: group
                unique_id: bedroom_sofa_group
                name: Sofa
                entities:
                  - light.kajplats_e26_ws_globe_1600lm_6
                  - light.kajplats_e26_ws_globe_1600lm_7
              - platform: group
                unique_id: bedroom_fan_group
                name: Fan
                entities:
                  - light.kajplats_e26_ws_globe_1600lm_9
              - platform: group
                unique_id: standing_lamp_group
                name: Standing Lamp
                entities:
                  - light.kajplats_e26_ws_globe_1600lm_8
                  - light.kajplats_e26_ws_globe_1600lm_9
              - platform: group
                unique_id: bedroom_lights_group
                name: Bedroom Lights
                entities:
                  - light.fan
                  - light.sofa
                  - light.standing_lamp
              - platform: group
                unique_id: dining_room_fan_group
                name: Dining Room Fan
                entities:
                  - light.fan_1
                  - light.fan_2
                  - light.fan_3
              - platform: group
                unique_id: dining_room_lights_group
                name: Dining Room Lights
                entities:
                  - light.fan_1
                  - light.fan_2
                  - light.fan_3
                  - light.desk_lamp
      automations:
        enabled: true
        data:
          automations.yaml: |
            - id: bedroom_dimmer_mirrors_nanoleaf_bulbs
              alias: Bedroom Dimmer Mirrors Bulbs
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
              condition:
                - condition: template
                  value_template: "{{ `{{ trigger.to_state is not none }}` }}"
                - condition: or
                  conditions:
                    - condition: state
                      entity_id: input_boolean.bedroom_lights_locked
                      state: "off"
                    - condition: state
                      entity_id: input_boolean.bedroom_lights_override
                      state: "on"
              action:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ `{{ trigger.to_state.state == 'off' }}` }}"
                      sequence:
                        - service: light.turn_off
                          target:
                            entity_id: light.bedroom_lights
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: light.bedroom_lights
                      data:
                        brightness: "{{ `{{ trigger.to_state.attributes.brightness | int(0) }}` }}"
            - id: bedroom_lights_lock_enable
              alias: Bedroom Lights Lock Enable
              trigger:
                - platform: time
                  at: "19:30:00"
              action:
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.bedroom_lights_locked
              mode: single
            - id: bedroom_lights_lock_disable
              alias: Bedroom Lights Lock Disable
              trigger:
                - platform: time
                  at: "04:00:00"
              action:
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_locked
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_override
                - service: timer.cancel
                  target:
                    entity_id:
                      - timer.bedroom_lights_press_window
                      - timer.bedroom_lights_override
                - service: counter.reset
                  target:
                    entity_id: counter.bedroom_lights_press_count
              mode: single
            - id: bedroom_lights_lock_override_detect_triple_press
              alias: Bedroom Lights Lock Override Detect Triple Press
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
                  to: "on"
              condition:
                - condition: state
                  entity_id: input_boolean.bedroom_lights_locked
                  state: "on"
                - condition: state
                  entity_id: input_boolean.bedroom_lights_override
                  state: "off"
              action:
                - variables:
                    press_window_active: "{{ `{{ is_state('timer.bedroom_lights_press_window', 'active') }}` }}"
                    next_press_count: "{{ `{{ states('counter.bedroom_lights_press_count') | int(0) + 1 if is_state('timer.bedroom_lights_press_window', 'active') else 1 }}` }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ `{{ press_window_active }}` }}"
                      sequence:
                        - service: counter.increment
                          target:
                            entity_id: counter.bedroom_lights_press_count
                  default:
                    - service: counter.reset
                      target:
                        entity_id: counter.bedroom_lights_press_count
                    - service: counter.increment
                      target:
                        entity_id: counter.bedroom_lights_press_count
                    - service: timer.start
                      target:
                        entity_id: timer.bedroom_lights_press_window
                      data:
                        duration: "00:00:05"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ `{{ next_press_count >= 3 }}` }}"
                      sequence:
                        - service: input_boolean.turn_on
                          target:
                            entity_id: input_boolean.bedroom_lights_override
                        - service: timer.start
                          target:
                            entity_id: timer.bedroom_lights_override
                          data:
                            duration: "00:30:00"
                        - service: timer.cancel
                          target:
                            entity_id: timer.bedroom_lights_press_window
                        - service: counter.reset
                          target:
                            entity_id: counter.bedroom_lights_press_count
                        - service: light.turn_on
                          target:
                            entity_id: light.bedroom_lights
                          data:
                            brightness: "{{ `{{ trigger.to_state.attributes.brightness | int(0) }}` }}"
            - id: bedroom_lights_lock_override_reset_press_window
              alias: Bedroom Lights Lock Override Reset Press Window
              mode: single
              trigger:
                - platform: event
                  event_type: timer.finished
                  event_data:
                    entity_id: timer.bedroom_lights_press_window
              action:
                - service: counter.reset
                  target:
                    entity_id: counter.bedroom_lights_press_count
            - id: bedroom_lights_lock_override_disable
              alias: Bedroom Lights Lock Override Disable
              mode: single
              trigger:
                - platform: event
                  event_type: timer.finished
                  event_data:
                    entity_id: timer.bedroom_lights_override
              action:
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_lights_override
            - id: bedroom_lights_lock_enforce_from_dimmer
              alias: Bedroom Lights Lock Enforce From Dimmer
              mode: restart
              trigger:
                - platform: state
                  entity_id: light.smart_wi_fi_dimmer_switch
                  to: "on"
              condition:
                - condition: state
                  entity_id: input_boolean.bedroom_lights_locked
                  state: "on"
                - condition: state
                  entity_id: input_boolean.bedroom_lights_override
                  state: "off"
              action:
                - service: light.turn_off
                  target:
                    entity_id: light.bedroom_lights
            - id: adaptive_lighting_disable_brightness_after_start
              alias: Adaptive Lighting Disable Brightness After Start
              mode: single
              trigger:
                - platform: homeassistant
                  event: start
              action:
                - delay: "00:00:20"
                - service: switch.turn_off
                  target:
                    entity_id:
                      - switch.adaptive_lighting_adapt_brightness_living_room
                      - switch.adaptive_lighting_adapt_brightness_master
                      - switch.adaptive_lighting_adapt_brightness_bedroom
                      - switch.adaptive_lighting_adapt_brightness_dining_room
            - id: bedroom_morning_green_to_white_fade
              alias: Bedroom Morning Green To White Fade
              mode: single
              trigger:
                - platform: time
                  at: "07:00:00"
              condition:
                - condition: time
                  weekday:
                    - mon
                    - tue
                    - wed
                    - thu
                    - fri
              action:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    rgb_color: [0, 255, 0]
                    brightness_pct: 1
                    transition: 1
                - delay: "00:00:01"
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    color_temp_kelvin: 4000
                    brightness_pct: 80
                    transition: 1800
            - id: bedroom_morning_adaptive_lighting_handoff
              alias: Bedroom Morning Adaptive Lighting Handoff
              mode: single
              trigger:
                - platform: time
                  at: "07:30:00"
              condition:
                - condition: time
                  weekday:
                    - mon
                    - tue
                    - wed
                    - thu
                    - fri
              action:
                - service: adaptive_lighting.set_manual_control
                  data:
                    entity_id: switch.adaptive_lighting_bedroom
                    lights:
                      - light.bedroom_lights
                    manual_control: false
                - service: adaptive_lighting.apply
                  data:
                    entity_id: switch.adaptive_lighting_bedroom
                    lights:
                      - light.bedroom_lights
                    adapt_brightness: false
                    adapt_color: true
                    turn_on_lights: true
                    transition: 5
