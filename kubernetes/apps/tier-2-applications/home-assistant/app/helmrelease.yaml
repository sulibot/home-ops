            app:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
      automations-file:
        enabled: true
        type: configMap
        identifier: automations
        advancedMounts:
          home-assistant:
            app:
              - path: /config/automations.yaml
                subPath: automations.yaml
      config-cache:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config-cache"
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
      authorize-page:
