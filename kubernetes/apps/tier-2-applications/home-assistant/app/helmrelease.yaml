---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-hacs:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tempfile
                import urllib.request
                import zipfile

                # renovate: datasource=github-releases depName=hacs/integration
                version = "2.0.5"
                target = "/config/custom_components/hacs"
                manifest_path = os.path.join(target, "manifest.json")

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version:
                        print(f"HACS {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "hacs.zip")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/hacs/integration/releases/download/{version}/hacs.zip",
                        archive,
                    )
                    with zipfile.ZipFile(archive) as zipped:
                        zipped.extractall(extract_dir)

                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(extract_dir, target)
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import json
                import os
                import shutil
                import tarfile
                import tempfile
                import urllib.request

                # renovate: datasource=github-releases depName=christiaangoossens/hass-oidc-auth
                version = "v1.1.1"
                target = "/config/custom_components/auth_oidc"
                manifest_path = os.path.join(target, "manifest.json")

                def ensure_style_css():
                    static_dir = os.path.join(target, "static")
                    os.makedirs(static_dir, exist_ok=True)
                    with open(os.path.join(static_dir, "style.css"), "w", encoding="utf-8") as handle:
                        handle.write("""\
                html,
                body {
                  min-height: 100%;
                  margin: 0;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #111827;
                  color: #111827;
                }
                body {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 24px;
                }
                .bg-white {
                  width: min(100%, 420px);
                  background: #ffffff;
                  border-radius: 12px;
                  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
                  padding: 28px;
                }
                .text-center { text-align: center; }
                #login-button {
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  min-height: 44px;
                  width: 100%;
                  box-sizing: border-box;
                  border-radius: 999px;
                  background: #03a9d6;
                  color: #ffffff;
                  font-weight: 650;
                  text-decoration: none;
                  padding: 10px 18px;
                }
                #login-button:focus,
                #login-button:hover {
                  background: #0289b0;
                }
                #alternative-sign-in-link {
                  color: #4b5563;
                  text-decoration: none;
                }
                #alternative-sign-in-link:hover { text-decoration: underline; }
                .mt-4 { margin-top: 1rem; }
                .text-sm { font-size: 0.875rem; }
                .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
                .font-bold { font-weight: 700; }
                .tracking-wide { letter-spacing: 0.025em; }
                .bg-gray-100 { background: #f3f4f6; }
                .border { border: 1px solid #d1d5db; }
                .rounded-lg { border-radius: 0.5rem; }
                .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
                .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
                .inline-block { display: inline-block; }
                .text-gray-600 { color: #4b5563; }
                """)

                def ensure_google_host_skips_oidc():
                    injected_page_path = os.path.join(target, "endpoints", "injected_auth_page.py")
                    with open(injected_page_path, "r", encoding="utf-8") as handle:
                        content = handle.read()

                    marker = '        if req.host.split(":")[0] == "ha-google.sulibot.com":\n            return False\n\n'
                    if marker in content:
                        return

                    needle = '        if req.query.get("skip_oidc_redirect") == "true":\n            return False\n\n'
                    replacement = needle + marker
                    if needle not in content:
                        raise RuntimeError("Could not find OIDC redirect bypass insertion point")

                    with open(injected_page_path, "w", encoding="utf-8") as handle:
                        handle.write(content.replace(needle, replacement, 1))

                if os.path.exists(manifest_path):
                    with open(manifest_path, "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    if manifest.get("version") == version.removeprefix("v"):
                        ensure_style_css()
                        ensure_google_host_skips_oidc()
                        print(f"auth_oidc {version} already installed")
                        raise SystemExit(0)

                os.makedirs("/config/custom_components", exist_ok=True)

                with tempfile.TemporaryDirectory() as tmpdir:
                    archive = os.path.join(tmpdir, "auth_oidc.tar.gz")
                    extract_dir = os.path.join(tmpdir, "extract")
                    urllib.request.urlretrieve(
                        f"https://github.com/christiaangoossens/hass-oidc-auth/archive/refs/tags/{version}.tar.gz",
                        archive,
                    )
                    with tarfile.open(archive, mode="r:gz") as tarred:
                        tarred.extractall(extract_dir)

                    source = os.path.join(
                        extract_dir,
                        f"hass-oidc-auth-{version.removeprefix('v')}",
                        "custom_components",
                        "auth_oidc",
                    )
                    shutil.rmtree(target, ignore_errors=True)
                    shutil.copytree(source, target)
                    with open(os.path.join(target, "manifest.json"), "r", encoding="utf-8") as handle:
                        manifest = json.load(handle)
                    manifest["requirements"] = []
                    with open(os.path.join(target, "manifest.json"), "w", encoding="utf-8") as handle:
                        json.dump(manifest, handle, indent=2)
                        handle.write("\n")
                    ensure_style_css()
                    ensure_google_host_skips_oidc()
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
          bootstrap-auth-oidc-deps:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                python - <<'PY'
                import os
                import subprocess
                import sys

                # renovate: datasource=pypi depName=joserfc
                version = "1.6.3"
                packages = ["aiofiles", "jinja2", f"joserfc=={version}"]
                venv = "/config/.venv"
                python_bin = os.path.join(venv, "bin", "python")

                if not os.path.exists(python_bin):
                    subprocess.check_call([sys.executable, "-m", "venv", venv])

                try:
                    subprocess.check_call(
                        [
                            python_bin,
                            "-c",
                            (
                                "import aiofiles, jinja2, joserfc; "
                                f"assert joserfc.__version__ == {version!r}"
                            ),
                        ]
                    )
                    print("auth_oidc Python dependencies already installed")
                    raise SystemExit(0)
                except subprocess.CalledProcessError:
                    pass

                subprocess.check_call(
                    [python_bin, "-m", "pip", "install", "--no-deps", *packages]
                )
                PY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.7.2@sha256:547d0fcb67ceb2c2d3adf22db37c7ea79d9ff9e91f3e3c536c6aebd998083f0f
            env:
              TZ: America/Los_Angeles
              PYTHONPATH: /config/.venv/lib/python3.14/site-packages
              # Required when Home Assistant is behind Gateway/API proxies.
              HASS_HTTP_USE_X_FORWARDED_FOR: "true"
              HASS_HTTP_TRUSTED_PROXY_1: fd00:69::/64
              HASS_HTTP_TRUSTED_PROXY_2: fd00:42::/64
              HASS_HTTP_TRUSTED_PROXY_3: fd00:101:224:3::/64
              # Cilium Gateway/Envoy forwards from the cluster pod CIDRs.
              HASS_HTTP_TRUSTED_PROXY_4: fd00:101:224::/60
              HASS_HTTP_TRUSTED_PROXY_5: 10.101.224.0/20
              HASS_HTTP_TRUSTED_PROXY_6: fd00:104:224::/60
              HASS_HTTP_TRUSTED_PROXY_7: 10.104.224.0/20
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      # nodeSelector:
      #   usb-zigbee: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.251/24", "fd00:31::251/64"]
            }
          ]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      home-assistant: {}
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
      direct:
        controller: home-assistant
        ports:
          http:
            port: 8123
    route:
      browser:
        hostnames:
          - hass.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      app:
        hostnames:
          - hass-app.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      get-token:
        hostnames:
          - hass-get-token.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /auth/oidc/welcome
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      local:
        hostnames:
          - hass-local.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
      debug:
        hostnames:
          - hass-debug.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: home-assistant-direct
                port: 8123
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      configuration-file:
        enabled: true
        type: configMap
        name: home-assistant-configuration
        advancedMounts:
          home-assistant:
            app:
              - path: /config/configuration.yaml
                subPath: configuration.yaml
      automations-file:
        enabled: true
        type: configMap
        name: home-assistant-automations
        advancedMounts:
          home-assistant:
            app:
              - path: /config/automations.yaml
                subPath: automations.yaml
      scripts-file:
        enabled: true
        type: configMap
        name: home-assistant-scripts
        advancedMounts:
          home-assistant:
            app:
              - path: /config/scripts.yaml
                subPath: scripts.yaml
      config-cache:
        type: emptyDir
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
      # usb-zigbee:
      #   enabled: true
      #   type: hostPath
      #   hostPath: /dev/ttyACM0
      #   hostPathType: CharDevice
      #   globalMounts:
      #     - path: /dev/ttyACM0
