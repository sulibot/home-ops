---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-automations
  namespace: default
data:
  automations.yaml: |
    ---
    - id: wall_switches_mirror_room_lights
      alias: Wall Switches Mirror Room Lights
      mode: restart
      trigger:
      - platform: state
        entity_id:
        - light.living_room_switch
        - light.master_switch
        - light.bedroom_switch
      condition:
      - condition: template
        value_template: >-
          {{ trigger.from_state is not none and trigger.to_state is not none
             and trigger.from_state.state in ['on', 'off']
             and trigger.to_state.state in ['on', 'off']
             and trigger.from_state.state != trigger.to_state.state }}
      action:
      - variables:
          target_lights: >-
            {{ {
              'light.living_room_switch': [
                'light.kajplats_e26_ws_globe_1600lm_2',
                'light.kajplats_e26_ws_globe_1600lm_3',
                'light.kajplats_e26_ws_globe_1600lm_4'
              ],
              'light.master_switch': [
                'light.kajplats_e26_ws_globe_1600lm',
                'light.kajplats_e26_ws_globe_1600lm_5'
              ],
              'light.bedroom_switch': [
                'light.kajplats_e26_ws_globe_1600lm_6',
                'light.kajplats_e26_ws_globe_1600lm_7',
                'light.kajplats_e26_ws_globe_1600lm_8',
                'light.kajplats_e26_ws_globe_1600lm_9'
              ]
            }.get(trigger.entity_id, []) }}
          available_target_lights: >-
            {{ target_lights
               | reject('is_state', 'unavailable')
               | reject('is_state', 'unknown')
               | list }}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' and available_target_lights | count > 0 }}"
          sequence:
          - repeat:
              for_each: "{{ available_target_lights }}"
              sequence:
              - service: light.turn_off
                target:
                  entity_id: "{{ repeat.item }}"
                continue_on_error: true
        - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'on' and available_target_lights | count > 0 }}"
          sequence:
          - repeat:
              for_each: "{{ available_target_lights }}"
              sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ repeat.item }}"
                data:
                  brightness: 255
                continue_on_error: true
    - id: wall_switches_mirror_room_brightness
      alias: Wall Switches Mirror Room Brightness
      mode: restart
      trigger:
      - platform: state
        entity_id:
        - light.living_room_switch
        - light.master_switch
        - light.bedroom_switch
        attribute: brightness
      condition:
      - condition: template
        value_template: >-
          {{ trigger.to_state is not none
             and trigger.to_state.state == 'on'
             and trigger.to_state.attributes.get('brightness') is not none
             and (
               trigger.from_state is none
               or trigger.from_state.attributes.get('brightness') != trigger.to_state.attributes.get('brightness')
             ) }}
      action:
      - variables:
          target_lights: >-
            {{ {
              'light.living_room_switch': [
                'light.kajplats_e26_ws_globe_1600lm_2',
                'light.kajplats_e26_ws_globe_1600lm_3',
                'light.kajplats_e26_ws_globe_1600lm_4'
              ],
              'light.master_switch': [
                'light.kajplats_e26_ws_globe_1600lm',
                'light.kajplats_e26_ws_globe_1600lm_5'
              ],
              'light.bedroom_switch': [
                'light.kajplats_e26_ws_globe_1600lm_6',
                'light.kajplats_e26_ws_globe_1600lm_7',
                'light.kajplats_e26_ws_globe_1600lm_8',
                'light.kajplats_e26_ws_globe_1600lm_9'
              ]
            }.get(trigger.entity_id, []) }}
          target_brightness: "{{ trigger.to_state.attributes.get('brightness') | int }}"
          available_target_lights: >-
            {{ target_lights
               | reject('is_state', 'unavailable')
               | reject('is_state', 'unknown')
               | list }}
      - condition: template
        value_template: "{{ target_brightness > 0 and available_target_lights | count > 0 }}"
      - repeat:
          for_each: "{{ available_target_lights }}"
          sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ repeat.item }}"
            data:
              brightness: "{{ target_brightness }}"
            continue_on_error: true
    - id: wall_switches_monitor_room_light_follow
      alias: Wall Switches Monitor Room Light Follow
      mode: parallel
      max: 10
      trigger:
      - platform: state
        entity_id:
        - light.living_room_switch
        - light.master_switch
        - light.bedroom_switch
      condition:
      - condition: template
        value_template: >-
          {{ trigger.from_state is not none and trigger.to_state is not none
             and trigger.from_state.state in ['on', 'off']
             and trigger.to_state.state in ['on', 'off']
             and trigger.from_state.state != trigger.to_state.state }}
      action:
      - variables:
          target_lights: >-
            {{ {
              'light.living_room_switch': [
                'light.kajplats_e26_ws_globe_1600lm_2',
                'light.kajplats_e26_ws_globe_1600lm_3',
                'light.kajplats_e26_ws_globe_1600lm_4'
              ],
              'light.master_switch': [
                'light.kajplats_e26_ws_globe_1600lm',
                'light.kajplats_e26_ws_globe_1600lm_5'
              ],
              'light.bedroom_switch': [
                'light.kajplats_e26_ws_globe_1600lm_6',
                'light.kajplats_e26_ws_globe_1600lm_7',
                'light.kajplats_e26_ws_globe_1600lm_8',
                'light.kajplats_e26_ws_globe_1600lm_9'
              ]
            }.get(trigger.entity_id, []) }}
          available_target_lights: >-
            {{ target_lights
               | reject('is_state', 'unavailable')
               | reject('is_state', 'unknown')
               | list }}
          unavailable_target_lights: >-
            {{ target_lights
               | select('is_state', 'unavailable')
               | list }}
          room_name: >-
            {{ {
              'light.living_room_switch': 'Living Room',
              'light.master_switch': 'Master Bedroom',
              'light.bedroom_switch': 'Sebby Bedroom'
            }.get(trigger.entity_id, trigger.entity_id) }}
          notification_id: >-
            {{ {
              'light.living_room_switch': 'wall_switch_living_room_follow_failed',
              'light.master_switch': 'wall_switch_master_bedroom_follow_failed',
              'light.bedroom_switch': 'wall_switch_sebby_bedroom_follow_failed'
            }.get(trigger.entity_id, 'wall_switch_follow_failed') }}
          room_failure_counter: >-
            {{ {
              'light.living_room_switch': 'counter.wall_switch_living_room_follow_failures',
              'light.master_switch': 'counter.wall_switch_master_bedroom_follow_failures',
              'light.bedroom_switch': 'counter.wall_switch_sebby_bedroom_follow_failures'
            }.get(trigger.entity_id, 'counter.wall_switch_follow_failures') }}
      - wait_template: >-
          {{ available_target_lights | count > 0
             and expand(available_target_lights)
               | selectattr('state', 'eq', trigger.to_state.state)
               | list
               | count == available_target_lights | count }}
        timeout: "00:00:15"
        continue_on_timeout: true
      - variables:
          mismatched_lights: >-
            {{ available_target_lights
               | reject('is_state', trigger.to_state.state)
               | list }}
          mismatched_names: >-
            {% set ns = namespace(names=[]) %}
            {% for entity_id in mismatched_lights %}
              {% set ns.names = ns.names + [state_attr(entity_id, 'friendly_name') or entity_id] %}
            {% endfor %}
            {{ ns.names | join(', ') }}
          unavailable_names: >-
            {% set ns = namespace(names=[]) %}
            {% for entity_id in unavailable_target_lights %}
              {% set ns.names = ns.names + [state_attr(entity_id, 'friendly_name') or entity_id] %}
            {% endfor %}
            {{ ns.names | join(', ') }}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ available_target_lights | count == 0 }}"
          sequence:
          - service: counter.increment
            target:
              entity_id: counter.wall_switch_follow_failures
          - service: counter.increment
            target:
              entity_id: "{{ room_failure_counter }}"
          - service: persistent_notification.create
            data:
              notification_id: "{{ notification_id }}"
              title: "{{ room_name }} wall switch has no reachable target lights"
              message: >-
                {{ trigger.entity_id }} changed to {{ trigger.to_state.state }},
                but all configured target Matter lights are unavailable:
                {{ unavailable_names }}.
          - service: system_log.write
            data:
              level: warning
              message: >-
                {{ room_name }} wall switch follow check failed: no reachable
                target Matter lights. Unavailable: {{ unavailable_target_lights | join(', ') }}.
        - conditions:
          - condition: template
            value_template: "{{ not wait.completed }}"
          sequence:
          - service: counter.increment
            target:
              entity_id: counter.wall_switch_follow_failures
          - service: counter.increment
            target:
              entity_id: "{{ room_failure_counter }}"
          - service: persistent_notification.create
            data:
              notification_id: "{{ notification_id }}"
              title: "{{ room_name }} wall switch did not control lights"
              message: >-
                {{ trigger.entity_id }} changed to {{ trigger.to_state.state }},
                but these reachable Matter lights did not follow within 15
                seconds: {{ mismatched_names }}. Unavailable targets were
                ignored: {{ unavailable_names }}.
          - service: system_log.write
            data:
              level: warning
              message: >-
                {{ room_name }} wall switch follow check failed:
                {{ trigger.entity_id }}={{ trigger.to_state.state }}.
                Mismatched: {{ mismatched_lights | join(', ') }}.
                Unavailable: {{ unavailable_target_lights | join(', ') }}.
        default:
        - service: persistent_notification.dismiss
          data:
            notification_id: "{{ notification_id }}"
    - id: wall_switch_controlled_lights_availability_monitor
      alias: Wall Switch Controlled Lights Availability Monitor
      mode: restart
      trigger:
      - platform: state
        entity_id:
        - light.kajplats_e26_ws_globe_1600lm
        - light.kajplats_e26_ws_globe_1600lm_2
        - light.kajplats_e26_ws_globe_1600lm_3
        - light.kajplats_e26_ws_globe_1600lm_4
        - light.kajplats_e26_ws_globe_1600lm_5
        - light.kajplats_e26_ws_globe_1600lm_6
        - light.kajplats_e26_ws_globe_1600lm_7
        - light.kajplats_e26_ws_globe_1600lm_8
        - light.kajplats_e26_ws_globe_1600lm_9
        to: unavailable
        for: "00:02:00"
      - platform: state
        entity_id:
        - light.kajplats_e26_ws_globe_1600lm
        - light.kajplats_e26_ws_globe_1600lm_2
        - light.kajplats_e26_ws_globe_1600lm_3
        - light.kajplats_e26_ws_globe_1600lm_4
        - light.kajplats_e26_ws_globe_1600lm_5
        - light.kajplats_e26_ws_globe_1600lm_6
        - light.kajplats_e26_ws_globe_1600lm_7
        - light.kajplats_e26_ws_globe_1600lm_8
        - light.kajplats_e26_ws_globe_1600lm_9
        from: unavailable
        for: "00:00:30"
      - platform: time_pattern
        minutes: "/10"
      - platform: homeassistant
        event: start
      action:
      - variables:
          controlled_lights:
          - light.kajplats_e26_ws_globe_1600lm
          - light.kajplats_e26_ws_globe_1600lm_2
          - light.kajplats_e26_ws_globe_1600lm_3
          - light.kajplats_e26_ws_globe_1600lm_4
          - light.kajplats_e26_ws_globe_1600lm_5
          - light.kajplats_e26_ws_globe_1600lm_6
          - light.kajplats_e26_ws_globe_1600lm_7
          - light.kajplats_e26_ws_globe_1600lm_8
          - light.kajplats_e26_ws_globe_1600lm_9
          unavailable_lights: "{{ controlled_lights | select('is_state', 'unavailable') | list }}"
          unavailable_names: >-
            {% set ns = namespace(names=[]) %}
            {% for entity_id in unavailable_lights %}
              {% set ns.names = ns.names + [state_attr(entity_id, 'friendly_name') or entity_id] %}
            {% endfor %}
            {{ ns.names | join(', ') }}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ unavailable_lights | count > 0 }}"
          sequence:
          - service: persistent_notification.create
            data:
              notification_id: wall_switch_controlled_lights_unavailable
              title: Wall switch controlled lights unavailable
              message: >-
                These Matter lights are unavailable and may not follow wall
                switch automations: {{ unavailable_names }}.
          - service: system_log.write
            data:
              level: warning
              message: >-
                Wall switch controlled Matter lights unavailable:
                {{ unavailable_lights | join(', ') }}.
        default:
        - service: persistent_notification.dismiss
          data:
            notification_id: wall_switch_controlled_lights_unavailable
    - id: bedroom_dimmer_mirrors_nanoleaf_bulbs
      alias: Bedroom Dimmer Mirrors Bulbs
      mode: restart
      trigger:
      - platform: state
        entity_id: light.smart_wi_fi_dimmer_switch
      condition:
      - condition: template
        value_template: "{{ trigger.to_state is not none }}"
      - condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.bedroom_lights_locked
          state: 'off'
        - condition: state
          entity_id: input_boolean.bedroom_lights_override
          state: 'on'
      action:
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' }}"
          sequence:
          - service: light.turn_off
            target:
              entity_id: light.bedroom_lights
        default:
        - service: light.turn_on
          target:
            entity_id: light.bedroom_lights
          data:
            brightness: "{{ trigger.to_state.attributes.brightness | int(0) }}"
    - id: bedroom_lights_lock_enable
      alias: Bedroom Lights Lock Enable
      trigger:
      - platform: time
        at: '19:30:00'
      action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.bedroom_lights_locked
      mode: single
    - id: bedroom_lights_lock_disable
      alias: Bedroom Lights Lock Disable
      trigger:
      - platform: time
        at: '04:00:00'
      action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bedroom_lights_locked
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bedroom_lights_override
      - service: timer.cancel
        target:
          entity_id:
          - timer.bedroom_lights_press_window
          - timer.bedroom_lights_override
      - service: counter.reset
        target:
          entity_id: counter.bedroom_lights_press_count
      mode: single
    - id: bedroom_lights_lock_override_detect_triple_press
      alias: Bedroom Lights Lock Override Detect Triple Press
      mode: restart
      trigger:
      - platform: state
        entity_id: light.smart_wi_fi_dimmer_switch
        to: 'on'
      condition:
      - condition: state
        entity_id: input_boolean.bedroom_lights_locked
        state: 'on'
      - condition: state
        entity_id: input_boolean.bedroom_lights_override
        state: 'off'
      action:
      - variables:
          press_window_active: "{{ is_state('timer.bedroom_lights_press_window', 'active') }}"
          next_press_count: "{{ states('counter.bedroom_lights_press_count') | int(0) + 1 if is_state('timer.bedroom_lights_press_window', 'active') else 1 }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ press_window_active }}"
          sequence:
          - service: counter.increment
            target:
              entity_id: counter.bedroom_lights_press_count
        default:
        - service: counter.reset
          target:
            entity_id: counter.bedroom_lights_press_count
        - service: counter.increment
          target:
            entity_id: counter.bedroom_lights_press_count
        - service: timer.start
          target:
            entity_id: timer.bedroom_lights_press_window
          data:
            duration: '00:00:05'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ next_press_count >= 3 }}"
          sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.bedroom_lights_override
          - service: timer.start
            target:
              entity_id: timer.bedroom_lights_override
            data:
              duration: '00:30:00'
          - service: timer.cancel
            target:
              entity_id: timer.bedroom_lights_press_window
          - service: counter.reset
            target:
              entity_id: counter.bedroom_lights_press_count
          - service: light.turn_on
            target:
              entity_id: light.bedroom_lights
            data:
              brightness: "{{ trigger.to_state.attributes.brightness | int(0) }}"
    - id: bedroom_lights_lock_override_reset_press_window
      alias: Bedroom Lights Lock Override Reset Press Window
      mode: single
      trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.bedroom_lights_press_window
      action:
      - service: counter.reset
        target:
          entity_id: counter.bedroom_lights_press_count
    - id: bedroom_lights_lock_override_disable
      alias: Bedroom Lights Lock Override Disable
      mode: single
      trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.bedroom_lights_override
      action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bedroom_lights_override
    - id: bedroom_lights_lock_enforce_from_dimmer
      alias: Bedroom Lights Lock Enforce From Dimmer
      mode: restart
      trigger:
      - platform: state
        entity_id: light.smart_wi_fi_dimmer_switch
        to: 'on'
      condition:
      - condition: state
        entity_id: input_boolean.bedroom_lights_locked
        state: 'on'
      - condition: state
        entity_id: input_boolean.bedroom_lights_override
        state: 'off'
      action:
      - service: light.turn_off
        target:
          entity_id: light.bedroom_lights
    - id: adaptive_lighting_disable_brightness_after_start
      alias: Adaptive Lighting Disable Brightness After Start
      mode: single
      trigger:
      - platform: homeassistant
        event: start
      action:
      - delay: '00:00:20'
      - service: switch.turn_off
        target:
          entity_id:
          - switch.adaptive_lighting_adapt_brightness_living_room
          - switch.adaptive_lighting_adapt_brightness_master
          - switch.adaptive_lighting_adapt_brightness_bedroom
          - switch.adaptive_lighting_adapt_brightness_dining_room
          - switch.adaptive_lighting_adapt_color_dining_room
    - id: bedroom_morning_green_to_white_fade
      alias: Bedroom Morning Green To White Fade
      mode: single
      trigger:
      - platform: time
        at: '07:00:00'
      condition:
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
      action:
      - service: light.turn_on
        target:
          entity_id: light.bedroom_lights
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 1
          transition: 1
      - delay: '00:00:01'
      - service: light.turn_on
        target:
          entity_id: light.bedroom_lights
        data:
          color_temp_kelvin: 4000
          brightness_pct: 80
          transition: 1800
    - id: bedroom_morning_adaptive_lighting_handoff
      alias: Bedroom Morning Adaptive Lighting Handoff
      mode: single
      trigger:
      - platform: time
        at: '07:30:00'
      condition:
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
      action:
      - service: adaptive_lighting.set_manual_control
        data:
          entity_id: switch.adaptive_lighting_bedroom
          lights:
          - light.bedroom_lights
          manual_control: false
      - service: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_bedroom
          lights:
          - light.bedroom_lights
          adapt_brightness: false
          adapt_color: true
    - id: button_green_1_master
      alias: Master Bedroom Green Button
      use_blueprint:
        path: sulibot/bilresa_multi_target_fast.yaml
        input:
          button_ch1_entity: event.bilresa_scroll_wheel_button_3_8
          button_ch2_entity: event.bilresa_scroll_wheel_button_6_8
          button_ch3_entity: event.bilresa_scroll_wheel_button_9_8
          scroll_up_ch1_entity: sensor.bilresa_scroll_wheel_current_switch_position_1_8
          scroll_down_ch1_entity: sensor.bilresa_scroll_wheel_current_switch_position_2_8
          scroll_up_ch2_entity: sensor.bilresa_scroll_wheel_current_switch_position_5_8
          scroll_down_ch2_entity: sensor.bilresa_scroll_wheel_current_switch_position_4_8
          scroll_up_ch3_entity: sensor.bilresa_scroll_wheel_current_switch_position_7_8
          scroll_down_ch3_entity: sensor.bilresa_scroll_wheel_current_switch_position_8_8
          hold_state_helper: input_text.bilresa_green_1_hold_state
          channel_1_target:
            - light.kajplats_e26_ws_globe_1600lm
            - light.kajplats_e26_ws_globe_1600lm_5
          channel_2_target:
            - light.kajplats_e26_ws_globe_1600lm
          channel_3_target:
            - light.kajplats_e26_ws_globe_1600lm_5
          brightness_step_pct: 10
          enforce_min_brightness_on_scroll_down: true
          min_brightness_pct: 5
          flash_on_max_brightness: true
          max_flash_rgb_color: [255, 255, 255]
          max_flash_ms: 220
          scroll_debounce_ms: 100
          press_debounce_ms: 150
          hold_repeat_ms: 150
    - id: button_orange_1_master
      alias: Master Bedroom Orange Button
      use_blueprint:
        path: sulibot/bilresa_multi_target_fast.yaml
        input:
          button_ch1_entity: event.bilresa_scroll_wheel_button_3_2
          button_ch2_entity: event.bilresa_scroll_wheel_button_6_2
          button_ch3_entity: event.bilresa_scroll_wheel_button_9_2
          scroll_up_ch1_entity: sensor.bilresa_scroll_wheel_current_switch_position_1_2
          scroll_down_ch1_entity: sensor.bilresa_scroll_wheel_current_switch_position_2_2
          scroll_up_ch2_entity: sensor.bilresa_scroll_wheel_current_switch_position_5_2
          scroll_down_ch2_entity: sensor.bilresa_scroll_wheel_current_switch_position_4_2
          scroll_up_ch3_entity: sensor.bilresa_scroll_wheel_current_switch_position_7_2
          scroll_down_ch3_entity: sensor.bilresa_scroll_wheel_current_switch_position_8_2
          hold_state_helper: input_text.bilresa_orange_1_hold_state
          channel_1_target:
            - light.kajplats_e26_ws_globe_1600lm
            - light.kajplats_e26_ws_globe_1600lm_5
          channel_2_target:
            - light.kajplats_e26_ws_globe_1600lm
          channel_3_target:
            - light.kajplats_e26_ws_globe_1600lm_5
          brightness_step_pct: 10
          enforce_min_brightness_on_scroll_down: true
          min_brightness_pct: 5
          flash_on_max_brightness: true
          max_flash_rgb_color: [255, 255, 255]
          max_flash_ms: 220
          scroll_debounce_ms: 100
          press_debounce_ms: 150
          hold_repeat_ms: 150
    - id: button_white_1_bedroom
      alias: Sebby Bedroom White Button
      use_blueprint:
        path: sulibot/bilresa_multi_target_fast.yaml
        input:
          button_ch1_entity: event.bilresa_scroll_wheel_button_3_3
