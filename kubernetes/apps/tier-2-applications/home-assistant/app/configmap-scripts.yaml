---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-scripts
  namespace: default
data:
  scripts.yaml: |
    light_color_temp_helper:
      alias: Light Color Temp Helper
      mode: queued
      fields:
        mode:
          required: true
        min_color_temp:
          required: true
        max_color_temp:
          required: true
        color_temp_step:
          required: true
        target_light:
          required: true
        light_transition_duration:
          required: false
      sequence:
        - variables:
            current_color_temp: >-
              {{ state_attr(target_light, 'color_temp_kelvin') | int(min_color_temp | int(2200)) }}
            min_temp: "{{ min_color_temp | int(2200) }}"
            max_temp: "{{ max_color_temp | int(4000) }}"
            step: "{{ color_temp_step | int(100) }}"
            next_color_temp: >-
              {% if mode == 'down' %}
                {{ [current_color_temp - step, min_temp] | max }}
              {% else %}
                {{ [current_color_temp + step, max_temp] | min }}
              {% endif %}
        - action: light.turn_on
          target:
            entity_id: "{{ target_light }}"
          data:
            color_temp_kelvin: "{{ next_color_temp | int }}"
            transition: "{{ light_transition_duration | default(0.5) | float }}"

    light_color_hs_helper:
      alias: Light Color HS Helper
      mode: queued
      fields:
        target_light:
          required: true
        light_transition_duration:
          required: false
        color_hue_step:
          required: true
        color_saturation:
          required: true
        mode:
          required: true
      sequence:
        - variables:
            current_hs: "{{ state_attr(target_light, 'hs_color') or [0, color_saturation | float(100)] }}"
            current_hue: "{{ current_hs[0] | float(0) }}"
            next_hue: >-
              {% if mode == 'down' %}
                {{ (current_hue - (color_hue_step | float(6))) % 360 }}
              {% else %}
                {{ (current_hue + (color_hue_step | float(6))) % 360 }}
              {% endif %}
        - action: light.turn_on
          target:
            entity_id: "{{ target_light }}"
          data:
            hs_color:
              - "{{ next_hue | float }}"
              - "{{ color_saturation | float(100) }}"
            transition: "{{ light_transition_duration | default(0.5) | float }}"

    group_living_room_speakers:
      alias: Group Living Room Speakers
      mode: single
      sequence:
        - action: media_player.join
          target:
            entity_id: media_player.living_room
          data:
            group_members:
              - media_player.patio

    stop_living_room_music:
      alias: Stop Living Room Music
      mode: single
      sequence:
        - action: media_player.media_stop
          target:
            entity_id:
              - media_player.living_room
              - media_player.patio

    kqed_radio_living_room:
      alias: Living Room KQED
      mode: single
      sequence:
        - action: script.group_living_room_speakers
        - delay: "00:00:02"
        - action: media_player.play_media
          target:
            entity_id: media_player.living_room
          data:
            media_content_id: KQED 128 AAC
            media_content_type: radio

    kqed_radio_kitchen:
      alias: Kitchen KQED
      mode: single
      sequence:
        - action: media_player.play_media
          target:
            entity_id: media_player.kitchen_2
          data:
            media_content_id: KQED 128 AAC
            media_content_type: radio

    kqed_radio_dining_room:
      alias: Dining Room KQED
      mode: single
      sequence:
        - action: media_player.play_media
          target:
            entity_id: media_player.dining_room
          data:
            media_content_id: KQED 128 AAC
            media_content_type: radio

    kqed_radio_master_bedroom:
      alias: Master Bedroom KQED
      mode: single
      sequence:
        - action: media_player.play_media
          target:
            entity_id: media_player.master_bedroom
          data:
            media_content_id: KQED 128 AAC
            media_content_type: radio

    group_sebby_bedroom_speakers:
      alias: Group Sebby Bedroom Speakers
      mode: single
      sequence:
        - action: media_player.join
          target:
            entity_id: media_player.sebby_bedroom
          data:
            group_members:
              - media_player.sebby_bedroom_rear

    kqed_radio_sebby_bedroom:
      alias: Sebby Bedroom KQED
      mode: single
      sequence:
        - action: script.group_sebby_bedroom_speakers
        - delay: "00:00:02"
        - action: media_player.play_media
          target:
            entity_id: media_player.sebby_bedroom
          data:
            media_content_id: KQED 128 AAC
            media_content_type: radio

    sebby_sleep_music:
      alias: Sebby Sleep Music
      mode: single
      sequence:
        - action: script.group_sebby_bedroom_speakers
        - delay: "00:00:02"
        - action: media_player.repeat_set
          target:
            entity_id: media_player.sebby_bedroom
          data:
            repeat: all
        - action: media_player.play_media
          target:
            entity_id: media_player.sebby_bedroom
          data:
            media_content_id: Sebby Sleep Music
            media_content_type: playlist

    sebby_white_noise:
      alias: Sebby White Noise
      mode: single
      sequence:
        - action: script.group_sebby_bedroom_speakers
        - delay: "00:00:02"
        - action: media_player.repeat_set
          target:
            entity_id: media_player.sebby_bedroom
          data:
            repeat: all
        - action: media_player.play_media
          target:
            entity_id: media_player.sebby_bedroom
          data:
            media_content_id: Sebby White Noise
            media_content_type: playlist

    stop_sebby_music:
      alias: Stop Sebby Music
      mode: single
      sequence:
        - action: media_player.media_stop
          target:
            entity_id:
              - media_player.sebby_bedroom
              - media_player.sebby_bedroom_rear

    stop_all_music:
      alias: Stop All Music
      mode: single
      sequence:
        - action: media_player.media_stop
          target:
            entity_id:
              - media_player.dining_room
              - media_player.kitchen_2
              - media_player.living_room
              - media_player.master_bedroom
              - media_player.patio
              - media_player.sebby_bedroom
              - media_player.sebby_bedroom_rear
