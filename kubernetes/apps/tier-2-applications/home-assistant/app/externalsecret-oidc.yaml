---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-oidc
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: home-assistant-oidc-config
    creationPolicy: Owner
    template:
      data:
        # Seeded into /config/configuration.yaml by init container to keep OIDC auth declarative.
        configuration.yaml: |
          # Loads default set of integrations. Do not remove.
          default_config:

          # Load frontend themes from the themes folder
          frontend:
            themes: !include_dir_merge_named themes

          automation: !include automations.yaml
          script: !include scripts.yaml
          scene: !include scenes.yaml

          http:
            use_x_forwarded_for: true
            trusted_proxies:
              - fd00:69::/64
              - fd00:42::/64
              - fd00:101:224::/60

          homeassistant:
            auth_providers:
              # Keep LAN convenience on trusted internal source range.
              - type: trusted_networks
                trusted_networks:
                  - fd00:42::/64
                allow_bypass_login: true
              # Native OIDC via hass-oidc-auth.
              - type: custom
                module: hass_oidc_auth.auth
                # Optionally override via 1Password item "authentik":
                # HOME_ASSISTANT_OIDC_CLIENT_ID / HOME_ASSISTANT_OIDC_CLIENT_SECRET
                client_id: '{{ index . "HOME_ASSISTANT_OIDC_CLIENT_ID" | default "home-assistant" }}'
                client_secret: '{{ index . "HOME_ASSISTANT_OIDC_CLIENT_SECRET" | default (printf "%s-home-assistant-oidc" (index . "SECRET_KEY" | default "sulibot-default-secret")) | sha256sum }}'
                discovery_url: "https://auth.sulibot.com/application/o/home-assistant/.well-known/openid-configuration"
                scope: "openid profile email"
                claims:
                  username: preferred_username
                  name: name
                  groups: groups
                id_token_signing_alg: RS256
                automatic_user_linking: true
              # Keep local fallback for break-glass/admin recovery.
              - type: homeassistant
  dataFrom:
    - extract:
        key: authentik
