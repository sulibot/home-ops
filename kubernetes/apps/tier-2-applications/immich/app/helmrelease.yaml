---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: default
  interval: 1h0m0s
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  # clientId and clientSecret come from the immich-oidc Secret (created by ExternalSecret)
  valuesFrom:
    - kind: Secret
      name: immich-oidc
  values:
    immich:
      persistence:
        library:
          existingClaim: csi-cephfs-content-pvc
      configuration:
        storageTemplate:
          enabled: true
          template: '{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}'
        trash:
          days: 30
          enabled: false
        oauth:
          enabled: true
          issuerUrl: "https://auth.sulibot.com/application/o/immich/"
          scope: "openid email profile"
          signingAlgorithm: RS256
          storageLabelClaim: preferred_username
          autoRegister: true
          autoLaunch: true
          buttonText: "Login with Authentik"
        passwordLogin:
          enabled: false
        server:
          loginPageMessage: "Login"
      metrics:
        enabled: false

    server:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                tag: v2.5.6
              env:
                # Use the chart-managed primary service so writes follow sentinel failover.
                REDIS_HOSTNAME: valkey-primary.default.svc.cluster.local
                REDIS_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: valkey
                      key: VALKEY_PASSWORD
                IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.default.svc.cluster.local:3003
                DB_HOSTNAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-vectorchord-app
                      key: host
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-vectorchord-app
                      key: user
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-vectorchord-app
                      key: password
                DB_DATABASE_NAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-vectorchord-app
                      key: dbname
      route:
        main:
          hostnames:
            - immich.sulibot.com
            - immich-app.sulibot.com
          parentRefs:
            - name: gateway-tunnel
              namespace: network
          rules:
            - backendRefs:
                - identifier: main

    valkey:
      enabled: false

    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                tag: v2.5.6
      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: immich-config
