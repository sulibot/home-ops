---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
spec:
  suspend: true
  chartRef:
    kind: OCIRepository
    name: calibre-web-automated
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          configure-oidc:
            image:
              repository: docker.io/crocodilestick/calibre-web-automated
              tag: v4.0.6
            envFrom:
              - secretRef:
                  name: calibre-web-automated-oidc
                  optional: false
            command:
              - /bin/bash
              - -ec
              - |
                set -euo pipefail

                DB_PATH="/config/app.db"

                if [[ ! -f "$DB_PATH" ]]; then
                  cp /app/calibre-web-automated/empty_library/app.db "$DB_PATH"
                fi

                sqlite3 "$DB_PATH" <<'SQL'
                INSERT INTO oauthProvider(provider_name, active)
                SELECT 'generic', 0
                WHERE NOT EXISTS (SELECT 1 FROM oauthProvider WHERE provider_name='generic');
                SQL

                sqlite3 "$DB_PATH" <<SQL
                UPDATE oauthProvider
                SET oauth_client_id='$${OAUTH_CLIENT_ID}',
                    oauth_client_secret='$${OAUTH_CLIENT_SECRET}',
                    metadata_url='https://auth.sulibot.com/application/o/calibre-web-automated/.well-known/openid-configuration',
                    scope='openid profile email',
                    username_mapper='preferred_username',
                    email_mapper='email',
                    login_button='Login with Authentik',
                    active=1
                WHERE provider_name='generic';

                UPDATE settings
                SET config_oauth_redirect_host='https://calibre-web-automated.sulibot.com';
                SQL
        containers:
          app:
            image:
              repository: docker.io/crocodilestick/calibre-web-automated
              tag: v4.0.6
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
            envFrom:
              - secretRef:
                  name: calibre-web-automated-oidc
                  optional: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8083
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 5
                  timeoutSeconds: 1
                  failureThreshold: 90
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      dnsConfig:
        options:
          - name: single-request
          - name: single-request-reopen
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: calibre-web-automated
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
      library:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /calibre-library
            subPath: data/books/calibre
      ingest:
        type: emptyDir
        globalMounts:
          - path: /cwa-book-ingest
      tmp:
        type: emptyDir
