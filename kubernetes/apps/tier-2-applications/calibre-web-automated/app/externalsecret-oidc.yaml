---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calibre-web-automated-oidc
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: calibre-web-automated-oidc
    template:
      data:
        OAUTH_CLIENT_ID: '{{ index . "CALIBRE_WEB_AUTOMATED_OIDC_CLIENT_ID" | default .CLOUDBEAVER_OIDC_CLIENT_ID }}'
        OAUTH_CLIENT_SECRET: '{{ index . "CALIBRE_WEB_AUTOMATED_OIDC_CLIENT_SECRET" | default .CLOUDBEAVER_OIDC_CLIENT_SECRET }}'
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik
