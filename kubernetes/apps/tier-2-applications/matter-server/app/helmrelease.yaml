---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: matter-server
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      matter-server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          enable-ipv6-rio:
            image:
              repository: busybox
              tag: "1.37"
            command:
              - sh
              - -lc
              - |
                for i in $(seq 1 30); do
                  [ -e /proc/sys/net/ipv6/conf/net1/accept_ra_rt_info_max_plen ] && break
                  sleep 1
                done
                echo 64 > /proc/sys/net/ipv6/conf/net1/accept_ra_rt_info_max_plen
                cat /proc/sys/net/ipv6/conf/net1/accept_ra_rt_info_max_plen
                mkdir -p /data /data/credentials/development/paa-root-certs
                chown -R 1000:1000 /data 2>/dev/null || true
            securityContext:
              privileged: true
              allowPrivilegeEscalation: true
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
        containers:
          app:
            image:
              repository: ghcr.io/matter-js/matterjs-server
              # matterjs-server uses its own semver, separate from the HA add-on's 8.2.x numbering.
              # Future stable upgrades should be a tag/digest bump here.
              tag: 0.5.7@sha256:e717ccaa60577c0d7aba1be835ddcaa48fb72d86aa2146280b13e773d8e3e02b
            env:
              TZ: America/Los_Angeles
              PORT: &port 5580
              LOG_LEVEL: debug
              PRIMARY_INTERFACE: net1
              STORAGE_PATH: /data
            args:
              - --storage-path=/data
              - --port=5580
              - --primary-interface=net1
              - --log-level=debug
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.6/24", "fd00:31::6/64"]
            },
            {
              "name": "vlan30",
              "namespace": "kube-system",
              "ips": ["10.30.0.6/24", "fd00:30::6/64"]
            }
          ]
      hostUsers: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [34]
    service:
      app:
        primary: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv6, IPv4]
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - &host "matter-server.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
