---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: baserow
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: baserow-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_HOST: postgres-vectorchord-rw.default.svc.cluster.local
        DATABASE_NAME: baserow
        DATABASE_PORT: "5432"
        DATABASE_USER: baserow
        DATABASE_PASSWORD: "{{ .BASEROW_DB_PASSWORD }}"
        REDIS_URL: "redis://:{{ .VALKEY_PASSWORD }}@valkey-primary.default.svc.cluster.local:6379/11"
        BASEROW_PUBLIC_URL: https://baserow.sulibot.com
        SECRET_KEY: "{{ .BASEROW_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: baserow
    - extract:
        key: valkey
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: baserow-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: baserow-pg-password
    creationPolicy: Owner
    template:
      data:
        username: baserow
        password: "{{ .BASEROW_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: baserow
