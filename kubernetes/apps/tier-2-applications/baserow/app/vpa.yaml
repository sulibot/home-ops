---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: baserow
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baserow
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: app
        minAllowed:
          cpu: 250m
          memory: 1Gi
        maxAllowed:
          cpu: 2
          memory: 6Gi
        controlledResources: [cpu, memory]
