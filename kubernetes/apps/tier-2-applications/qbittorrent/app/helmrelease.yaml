---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          volume-permissions:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: 1.37.0
            command:
              - sh
              - -c
              - |
                set -eux
                set_pref() {
                  key="$1"
                  value="$2"
                  if grep -Fq "$key=" /config/qBittorrent/qBittorrent.conf 2>/dev/null; then
                    awk -v key="$key" -v value="$value" '
                      BEGIN { replaced = 0 }
                      index($0, key "=") == 1 {
                        if (!replaced) {
                          print key "=" value
                          replaced = 1
                        }
                        next
                      }
                      { print }
                      END {
                        if (!replaced) {
                          print key "=" value
                        }
                      }
                    ' /config/qBittorrent/qBittorrent.conf > /config/qBittorrent/qBittorrent.conf.tmp
                    mv /config/qBittorrent/qBittorrent.conf.tmp /config/qBittorrent/qBittorrent.conf
                  else
                    printf '%s=%s\n' "$key" "$value" >> /config/qBittorrent/qBittorrent.conf
                  fi
                }
                mkdir -p /config/qBittorrent/logs
                mkdir -p /tmp/gluetun
                mkdir -p /data/torrents/movies
                mkdir -p /data/torrents/movies-4k
                mkdir -p /data/torrents/tv
                mkdir -p /data/torrents/tv-4k
                mkdir -p /data/torrents/music
                mkdir -p /data/torrents/books
                mkdir -p /data/torrents/audiobooks
                mkdir -p /data/torrents/courses
                mkdir -p /data/torrents/sports
                mkdir -p /data/torrents/cross-seed
                mkdir -p /data/torrents/flaresolverr
                cat > /config/qBittorrent/categories.json <<'EOF'
                {
                    "audiobooks": {
                        "save_path": "audiobooks"
                    },
                    "books": {
                        "save_path": "books"
                    },
                    "courses": {
                        "save_path": "courses"
                    },
                    "cross-seed": {
                        "save_path": "cross-seed"
                    },
                    "flaresolverr": {
                        "save_path": "flaresolverr"
                    },
                    "movies": {
                        "save_path": "movies"
                    },
                    "movies-4k": {
                        "save_path": "movies-4k"
                    },
                    "music": {
                        "save_path": "music"
                    },
                    "sports": {
                        "save_path": "sports"
                    },
                    "tv": {
                        "save_path": "tv"
                    },
                    "tv-4k": {
                        "save_path": "tv-4k"
                    }
                }
                EOF
                set_pref 'Session\DefaultSavePath' '/data/torrents'
                set_pref 'Session\DisableAutoTMMByDefault' 'false'
                set_pref 'Session\DisableAutoTMMTriggers\CategorySavePathChanged' 'false'
                set_pref 'Session\DisableAutoTMMTriggers\DefaultSavePathChanged' 'false'
                set_pref 'Session\GlobalMaxSeedingMinutes' '20160'
                set_pref 'Session\ShareLimitAction' 'Remove'
                set_pref 'General\DeleteTorrentsFilesAsDefault' 'true'
                chown -R 1000:1000 /config
                chown -R 1000:1000 /data/torrents
                chown -R 1000:1000 /tmp/gluetun
            securityContext:
              runAsUser: 0
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              HEALTH_SERVER_ADDRESS: :9999
            envFrom:
              - secretRef:
                  name: qbittorrent-nordvpn-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                drop: ["ALL"]
                add: ["NET_ADMIN"]
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4@sha256:bb82ad6668f8eda1d0fcce6c1341498bfa879155bb1295cd9d314a2c35c07a01
            env:
              TZ: America/Los_Angeles
              QBT_WEBUI_PORT: &port 8080
              QBT_TORRENTING_PORT: 50469
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
#              limits:
#                memory: 4Gi
          proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.0.3
            args:
              - TCP6-LISTEN:8081,ipv6only=0,fork,reuseaddr
              - TCP6:[::1]:8080
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: 80
            targetPort: 8081
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    configMaps:
      config:
        enabled: true
        data:
          .qbt.toml: |
            # qBittorrent configuration
    persistence:
      dev-net-tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /dev/net/tun
      config:
        enabled: true
        existingClaim: qbittorrent-config-rbd
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
            volume-permissions:
              - path: /config
      config-file:
        enabled: true
        type: configMap
        identifier: config
        advancedMounts:
          qbittorrent:
            app:
              - path: /config/.qbt.toml
                subPath: .qbt.toml
      content:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data
            subPath: data
      tmp:
        type: emptyDir
