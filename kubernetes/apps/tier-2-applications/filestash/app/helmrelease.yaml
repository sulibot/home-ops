---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filestash
spec:
  chartRef:
    kind: OCIRepository
    name: filestash
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m

  values:
    controllers:
      filestash:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-config:
            image:
              repository: docker.io/library/python
              tag: "3.12-alpine"
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                BOOTSTRAP_CONFIG="/bootstrap-config/config.json"
                LIVE_DIR="/app/data/state/config"
                LIVE_CONFIG="$LIVE_DIR/config.json"
                TEMPLATE_DIR="/app/data/state/config-templates"
                TEMPLATE_CONFIG="$TEMPLATE_DIR/config.json.gitops"

                mkdir -p "$LIVE_DIR" "$TEMPLATE_DIR"

                # Keep a GitOps-rendered copy on the writable volume for reference/recovery.
                cp -f "$BOOTSTRAP_CONFIG" "$TEMPLATE_CONFIG"
                chmod 0640 "$TEMPLATE_CONFIG" || true

                # Seed the live config once so Filestash can mutate it at runtime.
                if [ ! -s "$LIVE_CONFIG" ]; then
                  cp -f "$BOOTSTRAP_CONFIG" "$LIVE_CONFIG"
                  chmod 0640 "$LIVE_CONFIG" || true
                fi

                # Self-heal the common drift case where Filestash rewrites the local
                # connection and drops params.path, which causes the "Admin Password / Path"
                # prompt instead of using the preconfigured /data backend.
                python3 - <<'PY'
                import json
                from pathlib import Path

                live_path = Path("/app/data/state/config/config.json")
                tmpl_path = Path("/app/data/state/config-templates/config.json.gitops")

                live = json.loads(live_path.read_text())
                tmpl = json.loads(tmpl_path.read_text())

                def desired_path(template):
                    for conn in template.get("connections", []):
                        if conn.get("type") == "local":
                            params = conn.get("params") or {}
                            if params.get("path"):
                                return params["path"]
                    return "/data"

                target_path = desired_path(tmpl)
                changed = False

                for conn in live.get("connections", []):
                    if conn.get("type") != "local":
                        continue
                    params = conn.get("params")
                    if not isinstance(params, dict):
                        params = {}
                        conn["params"] = params
                    if not params.get("path"):
                        params["path"] = target_path
                        changed = True

                if changed:
                    live_path.write_text(json.dumps(live, separators=(",", ":")))
                PY

        containers:
          app:
            image:
              repository: docker.io/machines/filestash
              tag: latest

            env:
              TZ: America/Los_Angeles

              # Filestash expects the hostname here (no scheme).
              APPLICATION_URL: "filestash.sulibot.com"

              CANARY: "true"

              # ------------------------------------------------------------
              # Native backends (S3 / NFS) - FUTURE USE
              #
              # For "native backend" usage, you do NOT mount NFS into the pod.
              # Filestash connects directly to S3/NFS as *storage backends*
              # configured inside Filestash (typically via UI or config.json).
              #
              # If you want to GitOps this, you’d put the S3/NFS connection
              # definitions into your Filestash config.json secret.
              #
              # Optionally, you can pass secrets as env vars and reference
              # them from config.json if your config supports it.
              #
              # S3_ENDPOINT: "https://minio.example.com"
              # S3_REGION: "us-west-1"
              # S3_BUCKET: "my-bucket"
              # S3_ACCESS_KEY_ID:
              #   valueFrom:
              #     secretKeyRef:
              #       name: filestash-s3
              #       key: accessKey
              # S3_SECRET_ACCESS_KEY:
              #   valueFrom:
              #     secretKeyRef:
              #       name: filestash-s3
              #       key: secretKey
              #
              # NFS_SERVER: "10.0.0.50"
              # NFS_EXPORT: "/exports/share"
              # NFS_VERSION: "4"
              # ------------------------------------------------------------

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8334
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false # filestash runs as root
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames:
          - filestash.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    persistence:
      # Mount the GitOps-rendered config secret at a bootstrap path. An init container
      # copies it into the writable Filestash state volume on first boot so Filestash
      # can update /app/data/state/config at runtime.
      config-json:
        type: secret
        name: "{{ .Release.Name }}-secret"
        defaultMode: 0440
        globalMounts:
          - path: /bootstrap-config
            readOnly: true

      # Your CephFS PVC:
      # - /data is what you want to share out (local filesystem path)
      # - /app/data/state is Filestash state (keep persistent)
      content:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data
            subPath: data
          - path: /app/data/state
            subPath: filestash-state

      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp

      # ------------------------------------------------------------
      # NFS *mount* style (NOT used for "native backend") - FUTURE USE
      #
      # If you ever want K8s to mount NFS into the pod instead of Filestash
      # connecting directly, you would add something like this (chart-dependent):
      #
      # nfs-share:
      #   type: nfs
      #   server: 10.0.0.50
      #   path: /exports/share
      #   globalMounts:
      #     - path: /srv/nfs
      # ------------------------------------------------------------
