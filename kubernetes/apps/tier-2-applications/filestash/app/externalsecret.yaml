---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filestash-secret
    template:
      data:
        # Full app config — rendered to a Secret, then copied into the writable
        # Filestash state volume by the init container on first boot.
        # ADMIN_PASSWORD: bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
        # SECRET_KEY: random string used for session encryption
        # Middleware plugin settings (OIDC, proxy auth, attribute mapping, etc.) are often
        # stored by Filestash as encrypted blobs tied to SECRET_KEY. Configure in the UI,
        # then export/template the generated values if you want them back in GitOps/1Password.
        config.json: |-
          {
            "general": {
              "host": "filestash.sulibot.com",
              "secret_key": "{{ .SECRET_KEY }}"
            },
            "auth": {
              "admin": "{{ .ADMIN_PASSWORD }}"
            },
            "connections": [
              {
                "label": "Data",
                "type": "local",
                "params": {
                  "path": "/data"
                }
              }
            ]
          }
  dataFrom:
    - extract:
        key: filestash
