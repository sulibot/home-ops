---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filestash-secret
    template:
      data:
        # Full app config — mounted at /app/data/state/config/config.json
        # ADMIN_PASSWORD: bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
        # SECRET_KEY: random string used for session encryption
        # FILESTASH_OIDC_CLIENT_ID / FILESTASH_OIDC_CLIENT_SECRET are reserved for OIDC/OpenID
        # plugin configuration. The exact config.json plugin key structure is not yet expressed
        # here; keep these fields in the 1Password item so the secret is ready when the
        # Filestash OIDC plugin config block is added.
        config.json: |-
          {
            "general": {
              "host": "filestash.sulibot.com",
              "secret_key": "{{ .SECRET_KEY }}"
            },
            "auth": {
              "admin": "{{ .ADMIN_PASSWORD }}"
            },
            "connections": [
              {
                "label": "Data",
                "type": "local",
                "params": {
                  "path": "/srv/data"
                }
              }
            ]
          }
  dataFrom:
    - extract:
        key: filestash
