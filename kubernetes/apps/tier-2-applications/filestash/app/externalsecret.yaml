---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filestash-secret
    template:
      data:
        # Full app config — mounted at /app/data/state/config/config.json
        # ADMIN_PASSWORD: bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
        # SECRET_KEY: random string used for session encryption
        config.json: |-
          {
            "general": {
              "host": "filestash.sulibot.com",
              "secret_key": "{{ .SECRET_KEY }}"
            },
            "auth": {
              "admin": "{{ .ADMIN_PASSWORD }}"
            },
            "connections": [
              {
                "label": "Data",
                "type": "local",
                "params": {
                  "path": "/srv/data"
                }
              }
            ]
          }
  dataFrom:
    - extract:
        key: filestash
