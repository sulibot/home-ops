---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filestash-secret
    template:
      data:
        # Full app config — rendered to a Secret, then copied into the writable
        # Filestash state volume by the init container on first boot.
        # ADMIN_PASSWORD: bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
        # SECRET_KEY: random string used for session encryption
        # NOTE: middleware.*.params values below are Filestash-encrypted blobs produced by the
        # UI and depend on the configured secret_key remaining stable. If SECRET_KEY changes,
        # reconfigure OIDC in the Filestash UI and re-export/update these values.
        config.json: |-
          {
            "general": {
              "host": "filestash.sulibot.com",
              "secret_key": "{{ .SECRET_KEY }}"
            },
            "auth": {
              "admin": "{{ .ADMIN_PASSWORD }}"
            },
            "middleware": {
              "identity_provider": {
                "type": "openid",
                "params": "W-gMyIrK7e1EbD6IDjYDpHnEZLDDL54DKXX4OenuIh1HQjXxNcfP0Ir8dqCzcl4OSZRV_hgTUjZSwlWLr_Mj-EV234LABTdIiJqV0PEvruU5ZB3st2jKCZsu24Y="
              },
              "attribute_mapping": {
                "related_backend": "",
                "params": "W-gMyIrK7e1EbD6JAQJb6fO47c8hNndP7ZEiOceTDtV9PAzO7aG0mAae"
              }
            },
            "connections": [
              {
                "label": "Data",
                "type": "local",
                "params": {
                  "path": "/srv/data"
                }
              }
            ]
          }
  dataFrom:
    - extract:
        key: filestash
