---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filestash-secret
    template:
      data:
        # Full app config — rendered to a Secret, then copied into the writable
        # Filestash state volume by the init container on first boot.
        # ADMIN_PASSWORD: bcrypt hash — generate with: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n'
        # SECRET_KEY: random string used for session encryption
        # OIDC middleware params are Filestash-encrypted blobs produced by the UI and stored
        # in the 1Password `filestash` item (recommended fields):
        # - OIDC_IDENTITY_PROVIDER_PARAMS
        # - OIDC_ATTRIBUTE_MAPPING_PARAMS
        # They depend on the configured secret_key remaining stable. If SECRET_KEY changes,
        # reconfigure OIDC in the Filestash UI and update these 1Password fields.
        config.json: |-
          {
            "general": {
              "host": "filestash.sulibot.com",
              "secret_key": "{{ .SECRET_KEY }}"
            },
            "auth": {
              "admin": "{{ .ADMIN_PASSWORD }}"
            },
            "middleware": {
              "identity_provider": {
                "type": "openid",
                "params": "{{ .OIDC_IDENTITY_PROVIDER_PARAMS }}"
              },
              "attribute_mapping": {
                "related_backend": "",
                "params": "{{ .OIDC_ATTRIBUTE_MAPPING_PARAMS }}"
              }
            },
            "connections": [
              {
                "label": "Data",
                "type": "local",
                "params": {
                  "path": "/data"
                }
              }
            ]
          }
  dataFrom:
    - extract:
        key: filestash
