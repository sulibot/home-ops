---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-frame
spec:
  chartRef:
    kind: OCIRepository
    name: immich-frame
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      immich-frame:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immichframe/immichframe
              tag: v1.0.32.0@sha256:a0b54ee307d5746cd59518bd3ff60d80bf133b5dbe3202585f8c788d9ce3f2a8
            env:
              ApiKey:
                valueFrom:
                  secretKeyRef:
                    name: immich-frame-secret
                    key: IMMICH_API_KEY
              ClockFormat: "HH:mm"
              ImmichServerUrl:
                valueFrom:
                  secretKeyRef:
                    name: immich-frame-secret
                    key: IMMICH_URL
              PhotoDateFormat: "yyyy-MM-dd"
              Tags: ""
              TZ: America/Los_Angeles
              UnitSystem: metric
              WeatherLatLong: "37.773972,-122.431297"
            envFrom:
              - secretRef:
                  name: immich-frame-keys
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 15m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "vlan31",
              "namespace": "kube-system",
              "ips": ["10.31.0.7/24", "fd00:31::7/64"]
            }
          ]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: immich-frame
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - immich-frame.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
