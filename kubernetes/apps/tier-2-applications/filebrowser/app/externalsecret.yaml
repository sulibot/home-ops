---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filebrowser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filebrowser-secret
    creationPolicy: Owner
    template:
      data:
        # Set these fields in 1Password item `filebrowser`:
        # - FILEBROWSER_ADMIN_EMAIL (ex: admin@sulibot.com)
        # - FILEBROWSER_ADMIN_PASSWORD
        # Backward-compatible fallback for existing item keys:
        # - FB_USERNAME
        # - FB_PASSWORD
        FB_USERNAME: '{{ index . "FILEBROWSER_ADMIN_EMAIL" | default (index . "FB_USERNAME") }}'
        FB_PASSWORD: '{{ index . "FILEBROWSER_ADMIN_PASSWORD" | default (index . "FB_PASSWORD") }}'
  dataFrom:
    - extract:
        key: filebrowser
