apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  interval: 30m
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  chartRef:
    kind: OCIRepository
    name: filebrowser
  values:
    controllers:
      filebrowser:
        type: deployment
        replicas: 1
        initContainers:
          seed-config:
            image:
              repository: docker.io/library/busybox
              tag: "1.36.1"
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                BOOTSTRAP_CONFIG="/bootstrap-config/config.yaml"
                LIVE_DIR="/config"
                LIVE_CONFIG="$LIVE_DIR/config.yaml"
                TEMPLATE_CONFIG="$LIVE_DIR/config.yaml.gitops"

                mkdir -p "$LIVE_DIR"

                # Keep the rendered GitOps config on the PVC for reference/recovery.
                cp -f "$BOOTSTRAP_CONFIG" "$TEMPLATE_CONFIG"
                chmod 0644 "$TEMPLATE_CONFIG" || true

                # Seed the live config once so the app can update it if needed.
                if [ ! -s "$LIVE_CONFIG" ]; then
                  cp -f "$BOOTSTRAP_CONFIG" "$LIVE_CONFIG"
                  chmod 0644 "$LIVE_CONFIG" || true
                fi
        containers:
          app:
            image:
              repository: docker.io/gtstef/filebrowser
              tag: 1.2.0-experimental-sql-indexing
              digest: "sha256:9042507f491b80c56f8525262ac5405c64ce6ddbe3d9ea07e48e3d917ea5159e"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false  # must be writable for DB/cache
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: FILEBROWSER_ADDRESS
                value: "::"  # listen on IPv4/IPv6
              - name: FILEBROWSER_ROOT
                value: /data
              - name: FILEBROWSER_CONFIG
                value: "/config/config.yaml"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: filebrowser
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: 80

    route:
      app:
        hostnames:
          - filebrowser.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
        rules:
          - backendRefs:
              - name: filebrowser
                port: 80

    persistence:
      # PVC that will hold database.db (and optionally config.yaml later)
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config

      # Your CephFS content
      content:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data
            subPath: data

      run:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /run

      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp

      config-yaml:
        type: secret
        name: filebrowser-oidc-config
        defaultMode: 0644
        globalMounts:
          - path: /bootstrap-config
            readOnly: true
