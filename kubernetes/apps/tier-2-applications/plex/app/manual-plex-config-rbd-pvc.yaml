apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-rbd
  namespace: default
  labels:
    app.kubernetes.io/name: plex
    app.kubernetes.io/instance: plex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: csi-rbd-rbd-vm-sc
