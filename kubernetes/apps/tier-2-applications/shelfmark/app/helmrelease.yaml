---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  chartRef:
    kind: OCIRepository
    name: shelfmark
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      shelfmark:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap-admin:
            image:
              repository: ghcr.io/calibrain/shelfmark-lite
              tag: v1.2.0@sha256:9db6adf0dc2d1b2459591e497ec8333a840cbfcaeeecd04b48f6e23383177ec9
            envFrom:
              - secretRef:
                  name: shelfmark-secret
            command:
              - /bin/sh
              - -ec
            args:
              - |
                mkdir -p /config/plugins
                python - <<'PY'
                import json
                import os
                from pathlib import Path
                from werkzeug.security import check_password_hash, generate_password_hash

                config_path = Path("/config/plugins/security.json")
                config = {}
                if config_path.exists():
                    try:
                        config = json.loads(config_path.read_text())
                    except Exception:
                        config = {}

                username = (os.getenv("BOOTSTRAP_ADMIN_USERNAME") or "").strip()
                password = os.getenv("BOOTSTRAP_ADMIN_PASSWORD") or ""
                changed = False

                desired = {
                    "AUTH_METHOD": os.getenv("AUTH_METHOD", "none"),
                    "OIDC_DISCOVERY_URL": os.getenv("OIDC_DISCOVERY_URL", ""),
                    "OIDC_CLIENT_ID": os.getenv("OIDC_CLIENT_ID", ""),
                    "OIDC_CLIENT_SECRET": os.getenv("OIDC_CLIENT_SECRET", ""),
                    "OIDC_GROUP_CLAIM": os.getenv("OIDC_GROUP_CLAIM", "groups"),
                    "OIDC_ADMIN_GROUP": os.getenv("OIDC_ADMIN_GROUP", ""),
                    "OIDC_USE_ADMIN_GROUP": os.getenv("OIDC_USE_ADMIN_GROUP", "true").lower() == "true",
                    "OIDC_AUTO_PROVISION": os.getenv("OIDC_AUTO_PROVISION", "true").lower() == "true",
                    "OIDC_BUTTON_LABEL": os.getenv("OIDC_BUTTON_LABEL", ""),
                }
                for key, value in desired.items():
                    if config.get(key) != value:
                        config[key] = value
                        changed = True

                if username and password:
                    existing_hash = config.get("BUILTIN_PASSWORD_HASH", "")
                    if (
                        config.get("BUILTIN_USERNAME") != username
                        or not existing_hash
                        or not check_password_hash(existing_hash, password)
                    ):
                        config["BUILTIN_USERNAME"] = username
                        config["BUILTIN_PASSWORD_HASH"] = generate_password_hash(password)
                        changed = True

                if changed or not config_path.exists():
                    config_path.write_text(json.dumps(config, indent=2) + "\n")
                PY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              repository: ghcr.io/calibrain/shelfmark-lite
              tag: v1.2.0@sha256:9db6adf0dc2d1b2459591e497ec8333a840cbfcaeeecd04b48f6e23383177ec9
            command:
              - gunicorn
            args:
              - --access-logfile=-
              - --error-logfile=-
              - --worker-class=geventwebsocket.gunicorn.workers.GeventWebSocketWorker
              - --workers=1
              - -t
              - "300"
              - -b
              - "[::]:8084"
              - shelfmark.main:app
            env:
              TZ: America/Los_Angeles
              FLASK_PORT: &port 8084

              # Audiobookshelf library URL (for display/linking)
              AUDIOBOOK_LIBRARY_URL: https://bookshelf.sulibot.com

              # Search & download
              SEARCH_MODE: universal
              DEFAULT_RELEASE_SOURCE: prowlarr

              # Download destinations (within csi-cephfs-content-pvc)
              INGEST_DIR: /media/books
              DESTINATION_AUDIOBOOK: /media/audiobooks

              # Authentication
              AUTH_METHOD: oidc
              OIDC_DISCOVERY_URL: https://auth.sulibot.com/application/o/shelfmark/.well-known/openid-configuration
              OIDC_GROUP_CLAIM: groups
              OIDC_ADMIN_GROUP: shelfmark-admins
              OIDC_USE_ADMIN_GROUP: "true"
              OIDC_AUTO_PROVISION: "true"
              OIDC_BUTTON_LABEL: Login with Authentik
              HIDE_LOCAL_AUTH: "false"
              OIDC_AUTO_REDIRECT: "false"

              # Metadata providers
              METADATA_PROVIDER: hardcover
              METADATA_PROVIDER_AUDIOBOOK: hardcover
              HARDCOVER_ENABLED: "true"

              # Prowlarr integration
              PROWLARR_ENABLED: "true"
              PROWLARR_URL: http://prowlarr
              PROWLARR_TORRENT_CLIENT: qbittorrent
              QBITTORRENT_URL: http://qbittorrent

              # Direct Download: Cloudflare bypass
              USE_CF_BYPASS: "true"
              USING_EXTERNAL_BYPASSER: "true"
              EXT_BYPASSER_URL: http://flaresolverr
              EXT_BYPASSER_PATH: /v1
              EXT_BYPASSER_TIMEOUT: "60000"

              # File organization
              FILE_ORGANIZATION_AUDIOBOOK: organize
              TEMPLATE_AUDIOBOOK_ORGANIZE: "{Author}/{Title}/{Author} - {Title} ({PartNumber})"
              HARDLINK_TORRENTS_AUDIOBOOKS: "true"

            envFrom:
              - secretRef:
                  name: shelfmark-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      app:
        controller: shelfmark
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - shelfmark.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /media
            subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /var/log
            subPath: var-log
