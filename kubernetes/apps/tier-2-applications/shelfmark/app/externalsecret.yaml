---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shelfmark
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: shelfmark-secret
    template:
      data:
        HARDCOVER_API_KEY: "{{ .HARDCOVER_API_KEY }}"
        PROWLARR_API_KEY: "{{ .PROWLARR_API_KEY }}"
        OIDC_CLIENT_ID: '{{ index . "SHELFMARK_OIDC_CLIENT_ID" | default "shelfmark" }}'
        OIDC_CLIENT_SECRET: '{{ index . "SHELFMARK_OIDC_CLIENT_SECRET" | default "" }}'
        BOOTSTRAP_ADMIN_USERNAME: '{{ index . "username" | default "" }}'
        BOOTSTRAP_ADMIN_PASSWORD: '{{ index . "password" | default (index . "BOOTSTRAP_ADMIN_PASSWORD" | default "") }}'
        QBITTORRENT_USERNAME: '{{ index . "qbittorrent_username" | default "" }}'
        QBITTORRENT_PASSWORD: '{{ index . "qbittorrent_password" | default "" }}'
        NZBGET_USERNAME: '{{ index . "nzbget_username" | default "" }}'
        NZBGET_PASSWORD: '{{ index . "nzbget_password" | default "" }}'
  dataFrom:
    - extract:
        key: shelfmark
    - extract:
        key: authentik
  data:
    - secretKey: qbittorrent_username
      remoteRef:
        key: qbittorrent
        property: username
    - secretKey: qbittorrent_password
      remoteRef:
        key: qbittorrent
        property: password
    - secretKey: nzbget_username
      remoteRef:
        key: nzbget
        property: username
    - secretKey: nzbget_password
      remoteRef:
        key: nzbget
        property: password
