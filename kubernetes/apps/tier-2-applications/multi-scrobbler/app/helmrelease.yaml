---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-scrobbler
spec:
  chartRef:
    kind: OCIRepository
    name: multi-scrobbler
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      multi-scrobbler:
        containers:
          app:
            image:
              repository: foxxmd/multi-scrobbler
              tag: latest
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              # Navidrome source: ListenBrainz endpoint ingress
              LZE_NAME: Navidrome
              LZE_USERNAME: sulibot
              # Plex source: webhook at /api/webhook
              PLEX_NAME: Plex
              PLEX_URL: http://plex.default.svc.cluster.local:32400
              # Last.fm client
              LASTFM_NAME: LastFM
              LASTFM_REDIRECT_URI: https://multi-scrobbler.sulibot.com/lastfm/callback
              # ListenBrainz client
              LZ_NAME: ListenBrainz
              LZ_URL: https://api.listenbrainz.org
              LZ_USER: sulibot
            envFrom:
              - secretRef:
                  name: multi-scrobbler-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 9078
                  initialDelaySeconds: 180
                  periodSeconds: 60
                  failureThreshold: 3
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        fsGroup: 1000

    service:
      app:
        ports:
          http:
            port: 9078

    route:
      app:
        hostnames:
          - multi-scrobbler.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 9078

    persistence:
      config:
        existingClaim: multi-scrobbler-config
        globalMounts:
          - path: /config
