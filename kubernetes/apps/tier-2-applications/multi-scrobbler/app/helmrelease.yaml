---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-scrobbler
spec:
  chartRef:
    kind: OCIRepository
    name: multi-scrobbler
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      multi-scrobbler:
        initContainers:
          configure:
            image:
              repository: busybox
              tag: latest
            envFrom:
              - secretRef:
                  name: multi-scrobbler-secret
            command:
              - sh
              - -c
              - |
                cat > /config/config.yaml <<EOF
                sources:
                  - name: Navidrome
                    type: subsonic
                    data:
                      url: http://navidrome.default.svc.cluster.local
                      user: "${NAVIDROME_USERNAME}"
                      password: "${NAVIDROME_PASSWORD}"
                clients:
                  - name: ListenBrainz
                    type: listenbrainz
                    data:
                      token: "${LISTENBRAINZ_TOKEN}"
                EOF
        containers:
          app:
            image:
              repository: foxxmd/multi-scrobbler
              tag: latest
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 9078
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        fsGroup: 1000

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - multi-scrobbler.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
