---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: multi-scrobbler
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: multi-scrobbler-secret
    template:
      data:
        # Plex → multi-scrobbler (webhook source)
        PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        # Spotify source (polling)
        SPOTIFY_CLIENT_ID: "{{ .SPOTIFY_CLIENT_ID }}"
        SPOTIFY_CLIENT_SECRET: "{{ .SPOTIFY_CLIENT_SECRET }}"
        # Last.fm client
        LASTFM_API_KEY: "{{ .LASTFM_API_KEY }}"
        LASTFM_SECRET: "{{ .LASTFM_API_SECRET }}"
        # ListenBrainz client
        LZ_TOKEN: "{{ .LZ_API_KEY }}"
  data:
    - secretKey: PLEX_TOKEN
      remoteRef:
        key: plex
        property: PLEX_TOKEN
    - secretKey: SPOTIFY_CLIENT_ID
      remoteRef:
        key: soulsync
        property: SPOTIFY_CLIENT_ID
    - secretKey: SPOTIFY_CLIENT_SECRET
      remoteRef:
        key: soulsync
        property: SPOTIFY_CLIENT_SECRET
    - secretKey: LASTFM_API_KEY
      remoteRef:
        key: last.fm
        property: API_KEY
    - secretKey: LASTFM_API_SECRET
      remoteRef:
        key: last.fm
        property: API_SECRET
    - secretKey: LZ_API_KEY
      remoteRef:
        key: MusicBrainz
        property: API_KEY
