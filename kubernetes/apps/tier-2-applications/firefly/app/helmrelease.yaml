---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly
spec:
  chartRef:
    kind: OCIRepository
    name: firefly
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: fireflyiii/core
              tag: version-6.2.18
            env:
              TZ: America/Los_Angeles
              APP_ENV: local
              APP_URL: https://firefly.sulibot.com
              TRUSTED_PROXIES: "**"
              DEFAULT_LANGUAGE: en_US
              DEFAULT_LOCALE: equal
              # Database (postgres-vectorchord shared cluster)
              DB_CONNECTION: pgsql
              DB_HOST: postgres-vectorchord-rw.default.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE: firefly
              DB_USERNAME: firefly
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: firefly-pg-password
                    key: password
              # Cache / Session
              CACHE_DRIVER: redis
              SESSION_DRIVER: redis
              QUEUE_CONNECTION: redis
              REDIS_CLIENT: phpredis
              REDIS_SCHEME: tcp
              REDIS_HOST: valkey-primary.default.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_DB: "0"
              REDIS_CACHE_DB: "1"
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: valkey
                    key: VALKEY_PASSWORD
              # App secrets
              APP_KEY:
                valueFrom:
                  secretKeyRef:
                    name: firefly-secret
                    key: APP_KEY
              STATIC_CRON_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: firefly-secret
                    key: STATIC_CRON_TOKEN
              # Authentik proxy outpost injects X-Authentik-Email for authenticated requests.
              # Keep email as the stable identity key (best match for Google-backed identities)
              # so Firefly can auto-create/map users consistently on first login.
              AUTHENTICATION_GUARD: remote_user_guard
              AUTHENTICATION_GUARD_HEADER: HTTP_X_AUTHENTIK_EMAIL
              # Mail (log only; configure SMTP here when ready)
              MAIL_MAILER: log
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

      cron:
        type: cronjob
        cronjob:
          schedule: "0 */3 * * *"
          timeZone: America/Los_Angeles
          backoffLimit: 0
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: curlimages/curl
              tag: 8.18.0
            command:
              - /bin/sh
              - -c
              - "curl --silent --show-error --fail --retry 5 --retry-all-errors --retry-delay 2 http://firefly.default.svc.cluster.local:8080/api/v1/cron/$STATIC_CRON_TOKEN"
            env:
              STATIC_CRON_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: firefly-secret
                    key: STATIC_CRON_TOKEN
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]

    service:
      app:
        controller: app
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - firefly.sulibot.com
        parentRefs:
          - name: gateway-tunnel
            namespace: network
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - name: authentik-outpost
                port: 9000

    persistence:
      data:
        existingClaim: firefly-config
        globalMounts:
          - path: /var/www/html/storage/upload
