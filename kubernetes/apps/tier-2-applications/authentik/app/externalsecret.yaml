---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-secret
    template:
      data:
        # Email — AUTHENTIK_ prefix required for Authentik's config reader
        # Routes through smtp-relay (cluster-internal, no auth required)
        AUTHENTIK_EMAIL__HOST: "smtp-relay.default.svc.cluster.local"
        AUTHENTIK_EMAIL__PORT: "25"
        AUTHENTIK_EMAIL__USE_TLS: "false"
        AUTHENTIK_EMAIL__USE_SSL: "false"
        AUTHENTIK_EMAIL__FROM: "{{ .EMAIL__FROM }}"
        # PostgreSQL
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_POSTGRESQL__HOST: "postgres-vectorchord-rw.default.svc.cluster.local"
        AUTHENTIK_POSTGRESQL__USER: "{{ .POSTGRESQL__USER }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .POSTGRESQL__PASSWORD }}"
        # App
        AUTHENTIK_SECRET_KEY: "{{ .SECRET_KEY }}"
        # Google OAuth source (used by blueprint)
        GOOGLE_CLIENT_ID: "{{ .GOOGLE_CLIENT_ID }}"
        GOOGLE_CLIENT_SECRET: "{{ .GOOGLE_CLIENT_SECRET }}"
        # Immich OIDC provider (used by blueprint)
        IMMICH_OIDC_CLIENT_ID: "{{ .IMMICH_OIDC_CLIENT_ID }}"
        IMMICH_OIDC_CLIENT_SECRET: "{{ .IMMICH_OIDC_CLIENT_SECRET }}"
        # Cloudflare Access OIDC provider (used by blueprint)
        # CF_ACCESS_CALLBACK_URL format: https://<team-name>.cloudflareaccess.com/cdn-cgi/access/callback
        CF_ACCESS_CLIENT_ID: "{{ .CF_ACCESS_CLIENT_ID }}"
        CF_ACCESS_CLIENT_SECRET: "{{ .CF_ACCESS_CLIENT_SECRET }}"
        CF_ACCESS_CALLBACK_URL: "{{ .CF_ACCESS_CALLBACK_URL }}"
        # Karakeep OIDC provider (used by blueprint)
        KARAKEEP_OIDC_CLIENT_ID: "{{ .KARAKEEP_OIDC_CLIENT_ID }}"
        KARAKEEP_OIDC_CLIENT_SECRET: "{{ .KARAKEEP_OIDC_CLIENT_SECRET }}"
        # Paperless OIDC provider (used by blueprint)
        PAPERLESS_OIDC_CLIENT_ID: "{{ .PAPERLESS_OIDC_CLIENT_ID }}"
        PAPERLESS_OIDC_CLIENT_SECRET: "{{ .PAPERLESS_OIDC_CLIENT_SECRET }}"
        # Actual Budget OIDC provider (used by blueprint)
        ACTUAL_OIDC_CLIENT_ID: "{{ .ACTUAL_OIDC_CLIENT_ID }}"
        ACTUAL_OIDC_CLIENT_SECRET: "{{ .ACTUAL_OIDC_CLIENT_SECRET }}"
        # Filebrowser OIDC provider (used by blueprint)
        FILEBROWSER_OIDC_CLIENT_ID: "{{ .FILEBROWSER_OIDC_CLIENT_ID }}"
        FILEBROWSER_OIDC_CLIENT_SECRET: "{{ .FILEBROWSER_OIDC_CLIENT_SECRET }}"
        # Filestash OIDC provider (used by blueprint). Keep defaults to avoid blocking secret sync.
        FILESTASH_OIDC_CLIENT_ID: '{{ index . "FILESTASH_OIDC_CLIENT_ID" | default "filestash" }}'
        FILESTASH_OIDC_CLIENT_SECRET: '{{ index . "FILESTASH_OIDC_CLIENT_SECRET" | default (printf "%s-filestash-oidc" (index . "SECRET_KEY" | default "sulibot-default-secret")) | sha256sum }}'
        # Proxy outpost API token (used by blueprint to create token + by outpost deployment)
        OUTPOST_TOKEN: "{{ .OUTPOST_TOKEN }}"
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-pg-password
    template:
      data:
        password: "{{ .POSTGRESQL__PASSWORD }}"
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik
