---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik
    namespace: default
  install:
    remediation:
      retries: 5
    timeout: 30m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
    timeout: 30m
  maxHistory: 3
  values:
    global:
      podAnnotations:
        reloader.stakater.com/auto: "true"
        # OTel SDK auto-injection (Python). Root-caused 2026-07-17: Django
        # instrumentor raced django-tenants' migrate_schemas command
        # autodiscovery, crash-looping gunicorn. Fixed via
        # OTEL_PYTHON_DISABLED_INSTRUMENTATIONS=django in the shared
        # Instrumentation CR (see otel-operator/instrumentation/).
        instrumentation.opentelemetry.io/inject-python: "observability/default"
      deploymentStrategy:
        type: Recreate
      envFrom:
        - secretRef:
            name: authentik-secret
      env:
        # Keep service.name aligned with the Loki `app` label (trace->logs join)
        - name: OTEL_SERVICE_NAME
          value: authentik
    authentik:
      log_level: info
      postgresql:
        port: 5432
        name: ""
        user: ""
        password: ""
      redis:
        host: ""
        password: ""
    postgresql:
      enabled: false
    redis:
      enabled: false
    prometheus:
      rules:
        enabled: true
    blueprints:
      configMaps:
        - authentik-blueprints
    server:
      replicas: 1
      volumeMounts:
        - name: blueprints-cm-authentik-blueprints
          mountPath: /blueprints/mounted/cm-authentik-blueprints
      volumes:
        - name: blueprints-cm-authentik-blueprints
          configMap:
            name: authentik-blueprints
      ingress:
        enabled: false
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    worker:
      replicas: 1
