version: 1
metadata:
  name: FreshRSS OIDC Provider
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_policies_expression.expressionpolicy
    state: present
    identifiers:
      name: policy-access-freshrss
    attrs:
      name: policy-access-freshrss
      expression: |
        user = request.user
        return bool(user and not user.is_anonymous)
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: freshrss
    attrs:
      name: freshrss
      client_id: !Env FRESHRSS_OIDC_CLIENT_ID
      client_secret: !Env FRESHRSS_OIDC_CLIENT_SECRET
      redirect_uris:
        - url: "https://freshrss.sulibot.com:443/i/oidc/"
          matching_mode: strict
      authentication_flow: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      issuer_mode: per_provider
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: freshrss
    attrs:
      name: FreshRSS
      slug: freshrss
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, freshrss]]
      meta_launch_url: "https://freshrss.sulibot.com"
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, policy-access-freshrss]]
      target: !Find [authentik_core.application, [slug, freshrss]]
      order: 0
    attrs:
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, policy-access-freshrss]]
      target: !Find [authentik_core.application, [slug, freshrss]]
      order: 0
      enabled: true
      negate: false
      timeout: 30
