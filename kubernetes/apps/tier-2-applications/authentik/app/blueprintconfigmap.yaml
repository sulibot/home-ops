---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
data:
  host-auth-flows.yaml: |
    version: 1
    metadata:
      name: Host-specific Authentik Login Flows
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Reusable login flow pattern:
      # - CF Access requests use a dedicated Google-button-only flow via provider.authentication_flow.
      # - App/OIDC/outpost requests use identifier-first UX:
      #   @gmail.com -> Google source, non-gmail -> Authentik password.
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: sulibot-google-button-identification
        attrs:
          name: sulibot-google-button-identification
          user_fields: []
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: sulibot-shared-auth-identification
        attrs:
          name: sulibot-shared-auth-identification
          user_fields:
            - email
          password_stage: !Find [authentik_stages_password.passwordstage, [name, default-authentication-password]]
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
          show_source_labels: true
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: sulibot-is-cloudflare-access-request
        attrs:
          name: sulibot-is-cloudflare-access-request
          expression: |
            return False
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: sulibot-is-gmail-identifier
        attrs:
          name: sulibot-is-gmail-identifier
          expression: |
            http_request = getattr(request, "http_request", None)
            query = {}
            if http_request:
                query = getattr(http_request, "GET", {})
            if not query:
                query = getattr(request, "GET", {})
            redirect_uri = (query.get("redirect_uri") or "").strip().lower()
            next_url = (query.get("next") or "").strip().lower()
            client_id = (query.get("client_id") or "").strip().lower()
            identifier = ""
            post = getattr(request, "POST", None)
            if post:
                identifier = (post.get("uid_field") or post.get("identifier") or "").strip().lower()
            if not identifier:
                for key in ("pending_user_identifier", "identifier", "uid_field", "uid", "username", "email"):
                    value = request.context.get(key)
                    if isinstance(value, str) and value.strip():
                        identifier = value.strip().lower()
                        break
            if not identifier:
                prompt_data = request.context.get("prompt_data", {})
                if isinstance(prompt_data, dict):
                    for key in ("uid_field", "identifier", "email", "username"):
                        value = prompt_data.get(key)
                        if isinstance(value, str) and value.strip():
                            identifier = value.strip().lower()
                            break
            return identifier.endswith("@gmail.com")
      - model: authentik_flows.flow
        state: present
        identifiers:
          slug: sulibot-internal-authentication-flow
        attrs:
          name: Sulibot Internal Authentication
          slug: sulibot-internal-authentication-flow
          title: ""
          designation: authentication
      - model: authentik_flows.flow
        state: present
        identifiers:
          slug: sulibot-cf-authentication-flow
        attrs:
          name: Sulibot Cloudflare Authentication
          slug: sulibot-cf-authentication-flow
          title: ""
          designation: authentication
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_identification.identificationstage, [name, sulibot-shared-auth-identification]]
          order: 10
        attrs:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_identification.identificationstage, [name, sulibot-shared-auth-identification]]
          order: 10
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, sulibot-cf-authentication-flow]]
          stage: !Find [authentik_stages_identification.identificationstage, [name, sulibot-google-button-identification]]
          order: 10
        attrs:
          target: !Find [authentik_flows.flow, [slug, sulibot-cf-authentication-flow]]
          stage: !Find [authentik_stages_identification.identificationstage, [name, sulibot-google-button-identification]]
          order: 10
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, sulibot-cf-authentication-flow]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]
          order: 100
        attrs:
          target: !Find [authentik_flows.flow, [slug, sulibot-cf-authentication-flow]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]
          order: 100
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, default-authentication-mfa-validation]]
          order: 40
        attrs:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, default-authentication-mfa-validation]]
          order: 40
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]
          order: 100
        attrs:
          target: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]
          order: 100
      # Host-specific brand:
      # - auth.sulibot.com defaults to app/internal flow (identifier-first routing).
      # - Cloudflare Access uses its provider-level Google-only auth flow.
      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: auth.sulibot.com
        attrs:
          domain: auth.sulibot.com
          branding_title: authentik
          branding_custom_css: |
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
            .pf-c-login,
            .pf-c-login * {
              font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif !important;
            }
            .pf-c-login__main {
              max-width: 420px !important;
              width: 100% !important;
              border-radius: 16px !important;
              padding: 32px !important;
              background: #0f1720 !important;
              box-shadow: 0 14px 38px rgba(0, 0, 0, 0.45) !important;
            }
            .pf-c-login__main-header.pf-c-brand {
              padding-bottom: 8px !important;
            }
            .pf-c-login__main-header.pf-c-brand img,
            .pf-c-login__main-header .pf-c-brand img {
              width: 175px !important;
              height: 175px !important;
              margin-bottom: 8px !important;
            }
            .pf-c-login__main .pf-c-title {
              display: none !important;
            }
            .pf-c-login__main-body {
              margin-top: 8px !important;
            }
            .pf-c-form-control {
              height: 48px !important;
              border-radius: 12px !important;
              background: #1f2e42 !important;
              border: 1px solid #1f2e42 !important;
              color: #ffffff !important;
              padding-left: 16px !important;
              padding-right: 16px !important;
            }
            .pf-c-form-control:focus {
              border-color: #6495ed !important;
              box-shadow: 0 0 0 2px rgba(100, 149, 237, 0.35) !important;
            }
            .pf-c-form__label,
            .pf-c-form__label-required,
            .pf-c-form__label .pf-c-form__label-required {
              display: none !important;
            }
            .pf-c-divider {
              margin: 24px 0 !important;
              border-top-color: rgba(148, 163, 184, 0.45) !important;
            }
            /* Google source button */
            .pf-c-login__main-footer .source-button,
            .pf-c-login__main-footer .pf-c-button {
              min-height: 52px !important;
              border-radius: 999px !important;
              background: #6495ed !important;
              border-color: #6495ed !important;
              color: #ffffff !important;
              font-weight: 600 !important;
              font-size: 18px !important;
            }
            .pf-c-login__main-footer .source-button:hover,
            .pf-c-login__main-footer .source-button:focus,
            .pf-c-login__main-footer .pf-c-button:hover,
            .pf-c-login__main-footer .pf-c-button:focus {
              background: #4f7ed5 !important;
              border-color: #4f7ed5 !important;
            }
            /* Local Authentik submit button */
            .pf-c-login__main-body .pf-c-button.pf-m-primary {
              min-height: 52px !important;
              border-radius: 999px !important;
              background: #ff7a00 !important;
              border-color: #ff7a00 !important;
              color: #ffffff !important;
              font-weight: 600 !important;
              font-size: 18px !important;
              position: relative !important;
            }
            .pf-c-login__main-body .pf-c-button.pf-m-primary .pf-c-button__text {
              color: transparent !important;
              font-size: 0 !important;
            }
            .pf-c-login__main-body .pf-c-button.pf-m-primary .pf-c-button__text::after {
              content: "Login with Authentik";
              font-size: 18px !important;
              font-weight: 600 !important;
              line-height: 1 !important;
              color: #ffffff !important;
              position: absolute !important;
              inset: 0 !important;
              display: flex !important;
              align-items: center !important;
              justify-content: center !important;
            }
            .pf-c-login__main-body .pf-c-button.pf-m-primary:hover,
            .pf-c-login__main-body .pf-c-button.pf-m-primary:focus {
              background: #e56d00 !important;
              border-color: #e56d00 !important;
            }
          flow_authentication: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
      - model: authentik_brands.brand
        state: present
        identifiers:
          domain: authentik-default
        attrs:
          domain: authentik-default
  google-source.yaml: |
    version: 1
    metadata:
      name: Google OAuth Source
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Silent enrollment flow must be created BEFORE the source references it
      - model: authentik_flows.flow
        state: present
        identifiers:
          slug: source-enrollment-silent
        attrs:
          name: Source Enrollment (Silent)
          slug: source-enrollment-silent
          title: "Setting up your account..."
          designation: enrollment
      - model: authentik_stages_user_write.userwritestage
        state: present
        identifiers:
          name: source-enrollment-silent-write
        attrs:
          name: source-enrollment-silent-write
          create_users_as_inactive: false
      - model: authentik_stages_user_login.userloginstage
        state: present
        identifiers:
          name: source-enrollment-silent-login
        attrs:
          name: source-enrollment-silent-login
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_write.userwritestage, [name, source-enrollment-silent-write]]
          order: 10
        attrs:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_write.userwritestage, [name, source-enrollment-silent-write]]
          order: 10
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, source-enrollment-silent-login]]
          order: 20
        attrs:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, source-enrollment-silent-login]]
          order: 20
      # Expression policy to set username from email before UserWriteStage runs
      # (Google OAuth returns email+name but not username; UserWriteStage requires username)
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: source-enrollment-set-username
        attrs:
          name: source-enrollment-set-username
          expression: |
            from authentik.stages.prompt.stage import PLAN_CONTEXT_PROMPT
            prompt_data = request.context.get(PLAN_CONTEXT_PROMPT, {})
            if not prompt_data.get("username"):
                prompt_data["username"] = prompt_data.get("email", "")
                request.context[PLAN_CONTEXT_PROMPT] = prompt_data
            return True
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, source-enrollment-set-username]]
          target: !Find [authentik_flows.flowstagebinding, [target__slug, source-enrollment-silent], [order, 10]]
          order: 0
        attrs:
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, source-enrollment-set-username]]
          target: !Find [authentik_flows.flowstagebinding, [target__slug, source-enrollment-silent], [order, 10]]
          order: 0
          enabled: true
          negate: false
          timeout: 30
      # Source defined after flow so !Find [source-enrollment-silent] resolves correctly
      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: google
        attrs:
          name: Login with Google
          slug: google
          enabled: true
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
          enrollment_flow: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          provider_type: google
          consumer_key: !Env GOOGLE_CLIENT_ID
          consumer_secret: !Env GOOGLE_CLIENT_SECRET
          additional_scopes: "email profile"
          user_matching_mode: identifier
          user_path_template: "goauthentik.io/sources/%(slug)s"
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: default-authentication-identification
        attrs:
          # Keep default identification stage local-only.
          # Host-specific flows handle Google routing logic explicitly.
          user_fields:
            - username
            - email
          password_stage: !Find [authentik_stages_password.passwordstage, [name, default-authentication-password]]
  immich-provider.yaml: |
    version: 1
    metadata:
      name: Immich OIDC Provider
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: immich
        attrs:
          name: immich
          client_id: !Env IMMICH_OIDC_CLIENT_ID
          client_secret: !Env IMMICH_OIDC_CLIENT_SECRET
          redirect_uris:
            - url: "https://immich.sulibot.com/auth/login"
              matching_mode: strict
            - url: "https://immich.sulibot.com/api/oauth/mobile-redirect"
              matching_mode: strict
            - url: "app.immich:/"
              matching_mode: strict
          authentication_flow: !Find [authentik_flows.flow, [slug, sulibot-internal-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: immich
        attrs:
          name: Immich
          slug: immich
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, immich]]
          meta_launch_url: "https://immich.sulibot.com"
          policy_engine_mode: any
