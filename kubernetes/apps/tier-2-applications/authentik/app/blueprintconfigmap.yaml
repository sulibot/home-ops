---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
data:
  google-source.yaml: |
    version: 1
    metadata:
      name: Google OAuth Source
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Silent enrollment flow must be created BEFORE the source references it
      - model: authentik_flows.flow
        state: present
        identifiers:
          slug: source-enrollment-silent
        attrs:
          name: Source Enrollment (Silent)
          slug: source-enrollment-silent
          title: "Setting up your account..."
          designation: enrollment
      - model: authentik_stages_user_write.userwritestage
        state: present
        identifiers:
          name: source-enrollment-silent-write
        attrs:
          name: source-enrollment-silent-write
          create_users_as_inactive: false
      - model: authentik_stages_user_login.userloginstage
        state: present
        identifiers:
          name: source-enrollment-silent-login
        attrs:
          name: source-enrollment-silent-login
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_write.userwritestage, [name, source-enrollment-silent-write]]
          order: 10
        attrs:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_write.userwritestage, [name, source-enrollment-silent-write]]
          order: 10
      - model: authentik_flows.flowstagebinding
        state: present
        identifiers:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, source-enrollment-silent-login]]
          order: 20
        attrs:
          target: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          stage: !Find [authentik_stages_user_login.userloginstage, [name, source-enrollment-silent-login]]
          order: 20
      # Source defined after flow so !Find [source-enrollment-silent] resolves correctly
      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: google
        attrs:
          name: Google
          slug: google
          enabled: true
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
          enrollment_flow: !Find [authentik_flows.flow, [slug, source-enrollment-silent]]
          provider_type: google
          consumer_key: !Env GOOGLE_CLIENT_ID
          consumer_secret: !Env GOOGLE_CLIENT_SECRET
          additional_scopes: "email profile"
          user_matching_mode: identifier
          user_path_template: "goauthentik.io/sources/%(slug)s"
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: default-authentication-identification
        attrs:
          user_fields: []
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
  immich-provider.yaml: |
    version: 1
    metadata:
      name: Immich OIDC Provider
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: immich
        attrs:
          name: immich
          client_id: !Env IMMICH_OIDC_CLIENT_ID
          client_secret: !Env IMMICH_OIDC_CLIENT_SECRET
          redirect_uris:
            - url: "https://immich.sulibot.com/auth/login"
              matching_mode: strict
            - url: "https://immich.sulibot.com/api/oauth/mobile-redirect"
              matching_mode: strict
            - url: "app.immich:/"
              matching_mode: strict
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: immich
        attrs:
          name: Immich
          slug: immich
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, immich]]
          meta_launch_url: "https://immich.sulibot.com"
          policy_engine_mode: any
  cloudflare-access.yaml: |
    version: 1
    metadata:
      name: Cloudflare Access OIDC
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: cloudflare-access
        attrs:
          name: cloudflare-access
          client_id: !Env CF_ACCESS_CLIENT_ID
          client_secret: !Env CF_ACCESS_CLIENT_SECRET
          redirect_uris:
            - url: !Env CF_ACCESS_CALLBACK_URL
              matching_mode: strict
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: cloudflare-access
        attrs:
          name: Cloudflare Access
          slug: cloudflare-access
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, cloudflare-access]]
          policy_engine_mode: any
  karakeep-provider.yaml: |
    version: 1
