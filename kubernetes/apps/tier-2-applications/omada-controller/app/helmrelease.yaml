---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omada-controller
spec:
  chartRef:
    kind: OCIRepository
    name: omada-controller
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      omada-controller:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mbentley/omada-controller
              tag: 6.2.10.17@sha256:faca76d8a0246732a0b8310502fbd5741b386251dc5fb7df9ece0d3776a4409a
            env:
              TZ: America/Los_Angeles
              MANAGE_HTTP_PORT: "8088"
              MANAGE_HTTPS_PORT: "8043"
              PORTAL_HTTP_PORT: "8888"
              PORTAL_HTTPS_PORT: "8843"
              SHOW_SERVER_LOGS: "true"
              SHOW_MONGODB_LOGS: "true"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 500m
                memory: 1200Mi
              limits:
                memory: 2400Mi
          # Cilium 1.19 has no BackendTLSPolicy support; this sidecar bridges the
          # gateway's HTTP to Omada's HTTPS-only management port (self-signed cert).
          # Replace with BackendTLSPolicy + cert-manager cert after upgrading to Cilium 1.20+.
          proxy:
            image:
              repository: docker.io/library/nginx
              tag: 1.27-alpine
            command:
              - /bin/sh
              - -c
              - |
                cat > /etc/nginx/conf.d/default.conf << 'NGINX'
                server {
                  listen 8080;
                  location / {
                    proxy_pass https://127.0.0.1:8043;
                    proxy_ssl_verify off;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_read_timeout 600;
                    proxy_connect_timeout 600;
                    client_max_body_size 128m;
                  }
                }
                NGINX
                exec nginx -g 'daemon off;'
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    service:
      app:
        controller: omada-controller
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: 8080
            targetPort: 8080
            protocol: TCP
      controller:
        controller: omada-controller
        type: LoadBalancer
        externalTrafficPolicy: Local
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          # https://www.tp-link.com/us/support/faq/3281/
          mgmt-http:
            port: 8088
            targetPort: 8088
            protocol: TCP
          mgmt-https:
            port: 8043
            protocol: TCP
            targetPort: 8043
          portal-https:
            port: 8843
            protocol: TCP
            targetPort: 8843
          eap-v5-discovery:
            port: 29810
            protocol: UDP
            targetPort: 29810
          eap-v4-discovery1:
            port: 29811
            protocol: TCP
            targetPort: 29811
          eap-v4-discovery2:
            port: 29812
            protocol: TCP
            targetPort: 29812
          eap-v4-upgrade:
            port: 29813
            protocol: TCP
            targetPort: 29813
          eap-v5-manage:
            port: 29814
            protocol: TCP
            targetPort: 29814
          eap-v5-device-info:
            port: 29815
            protocol: TCP
            targetPort: 29815
          eap-v5-remote-control:
            port: 29816
            protocol: TCP
            targetPort: 29816
          eap-v6-monitoring:
            port: 29817
            protocol: TCP
            targetPort: 29817
          init-check:
            port: 27001
            protocol: UDP
            targetPort: 27001
          old-init-info:
            port: 27002
            protocol: TCP
            targetPort: 27002
          old-db-access:
            port: 27017
            protocol: TCP
            targetPort: 27017
          db-access:
            port: 27217
            protocol: TCP
            targetPort: 27217
    route:
      app:
        hostnames:
          - "omada-controller.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /opt/tplink/EAPController/data
      work:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /opt/tplink/EAPController/work
      logs:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /opt/tplink/EAPController/logs
