---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nzbget
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: nzbget-secret
    template:
      data:
        NZBGET__CONTROLUSERNAME: '{{ index . "NZBGET_USER" | default .username }}'
        NZBGET__CONTROLPASSWORD: '{{ index . "NZBGET_PASS" | default .password }}'
  dataFrom:
    - extract:
        key: nzbget
