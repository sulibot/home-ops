---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
spec:
  chartRef:
    kind: OCIRepository
    name: nzbget
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      nzbget:
        initContainers:
          init-config:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.0.0@sha256:0185f0b026696bfbb89f29aecf777b721a8aa288da90ceb1021b6ee52c6de8f7
            env:
              NZBGET__CONTROLIP: "::"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            command:
              - /bin/sh
              - -c
              - |
                set -x
                MAIN_DIR="/config"
                CONFIG_DIR="/config"
                INTER_DIR="/data/usenet/intermediate"
                TEMP_DIR="/config/tmp"
                CONFIG_FILE="/config/nzbget.conf"
                echo "=== Init container starting ==="

                mkdir -p "$MAIN_DIR" "$INTER_DIR" "$TEMP_DIR" \
                  "$MAIN_DIR/nzb" "$MAIN_DIR/queue" "$MAIN_DIR/scripts"
                chown -R 1000:1000 /config /data/usenet/intermediate

                if [ ! -s "$CONFIG_FILE" ]; then
                  cp /app/nzbget.conf "$CONFIG_FILE"
                fi

                echo "Config file ready, size: $(wc -l < "$CONFIG_FILE") lines"

                # Update config
                sed -i "s@^MainDir=.*@MainDir=/config@" "$CONFIG_FILE"
                sed -i "s@^DestDir=.*@DestDir=/data/usenet/completed@" "$CONFIG_FILE"
                sed -i "s@^InterDir=.*@InterDir=/data/usenet/intermediate@" "$CONFIG_FILE"
                sed -i "s@^TempDir=.*@TempDir=\$${MainDir}/tmp@" "$CONFIG_FILE"
                sed -i "s@^QueueDir=.*@QueueDir=\$${MainDir}/queue@" "$CONFIG_FILE"
                sed -i "s@^NzbDir=.*@NzbDir=\$${MainDir}/nzb@" "$CONFIG_FILE"
                sed -i "s@^ScriptDir=.*@ScriptDir=\$${MainDir}/scripts@" "$CONFIG_FILE"
                sed -i "s@^LockFile=.*@LockFile=\$${MainDir}/nzbget.lock@" "$CONFIG_FILE"
                sed -i "s@^LogFile=.*@LogFile=\$${MainDir}/nzbget.log@" "$CONFIG_FILE"
                sed -i "s@^UnrarCmd=.*@UnrarCmd=unrar@" "$CONFIG_FILE"
                sed -i "s@^SevenZipCmd=.*@SevenZipCmd=7z@" "$CONFIG_FILE"
                sed -i "s@^ControlIP=.*@ControlIP=::@" "$CONFIG_FILE"
                sed -i "s@^ControlUsername=.*@ControlUsername=$${NZBGET__CONTROLUSERNAME}@" "$CONFIG_FILE"
                sed -i "s@^ControlPassword=.*@ControlPassword=$${NZBGET__CONTROLPASSWORD}@" "$CONFIG_FILE"
                sed -i "s@^ControlPort=.*@ControlPort=6789@" "$CONFIG_FILE"
                sed -i "s@^Server1.Active=.*@Server1.Active=no@" "$CONFIG_FILE"
                sed -i "s@^Server1.Name=.*@Server1.Name=Eweka@" "$CONFIG_FILE"
                sed -i "s@^Server1.Level=.*@Server1.Level=0@" "$CONFIG_FILE"
                sed -i "s@^Server1.Optional=.*@Server1.Optional=no@" "$CONFIG_FILE"
                sed -i "s@^Server1.Group=.*@Server1.Group=0@" "$CONFIG_FILE"
                sed -i "s@^Server1.Host=.*@Server1.Host=news.eweka.nl@" "$CONFIG_FILE"
                sed -i "s@^Server1.Encryption=.*@Server1.Encryption=yes@" "$CONFIG_FILE"
                sed -i "s@^Server1.Port=.*@Server1.Port=563@" "$CONFIG_FILE"
                if [ -n "$${NZBGET__EWEKA_USERNAME:-}" ]; then
                  sed -i "s@^Server1.Username=.*@Server1.Username=$${NZBGET__EWEKA_USERNAME}@" "$CONFIG_FILE"
                fi
                if [ -n "$${NZBGET__EWEKA_PASSWORD:-}" ]; then
                  sed -i "s@^Server1.Password=.*@Server1.Password=$${NZBGET__EWEKA_PASSWORD}@" "$CONFIG_FILE"
                fi
                sed -i "s@^Server1.JoinGroup=.*@Server1.JoinGroup=no@" "$CONFIG_FILE"
                sed -i "s@^Server1.Connections=.*@Server1.Connections=0@" "$CONFIG_FILE"
                sed -i "s@^Server1.Retention=.*@Server1.Retention=0@" "$CONFIG_FILE"
                sed -i "s@^Server1.CertVerification=.*@Server1.CertVerification=strict@" "$CONFIG_FILE"
                sed -i "s@^Server1.IpVersion=.*@Server1.IpVersion=auto@" "$CONFIG_FILE"
                if ! grep -q '^Server2.Host=' "$CONFIG_FILE"; then
                  printf '\n%s\n' \
                    'Server2.Active=yes' \
                    'Server2.Name=Frugal West' \
                    'Server2.Level=0' \
                    'Server2.Optional=no' \
                    'Server2.Group=0' \
                    'Server2.Host=newswest.frugalusenet.com' \
                    'Server2.Encryption=yes' \
                    'Server2.Port=563' \
                    'Server2.Username=' \
                    'Server2.Password=' \
                    'Server2.JoinGroup=no' \
                    'Server2.Cipher=' \
                    'Server2.Connections=150' \
                    'Server2.Retention=0' \
                    'Server2.CertVerification=strict' \
                    'Server2.IpVersion=auto' \
                    'Server2.Notes=' >> "$CONFIG_FILE"
                fi
                sed -i "s@^Server2.Active=.*@Server2.Active=yes@" "$CONFIG_FILE"
                sed -i "s@^Server2.Name=.*@Server2.Name=Frugal West@" "$CONFIG_FILE"
                sed -i "s@^Server2.Level=.*@Server2.Level=0@" "$CONFIG_FILE"
                sed -i "s@^Server2.Optional=.*@Server2.Optional=no@" "$CONFIG_FILE"
                sed -i "s@^Server2.Group=.*@Server2.Group=0@" "$CONFIG_FILE"
                sed -i "s@^Server2.Host=.*@Server2.Host=newswest.frugalusenet.com@" "$CONFIG_FILE"
                sed -i "s@^Server2.Encryption=.*@Server2.Encryption=yes@" "$CONFIG_FILE"
                sed -i "s@^Server2.Port=.*@Server2.Port=563@" "$CONFIG_FILE"
                if [ -n "$${NZBGET__FRUGAL_USERNAME:-}" ]; then
                  sed -i "s@^Server2.Username=.*@Server2.Username=$${NZBGET__FRUGAL_USERNAME}@" "$CONFIG_FILE"
                fi
                if [ -n "$${NZBGET__FRUGAL_PASSWORD:-}" ]; then
                  sed -i "s@^Server2.Password=.*@Server2.Password=$${NZBGET__FRUGAL_PASSWORD}@" "$CONFIG_FILE"
                fi
                sed -i "s@^Server2.JoinGroup=.*@Server2.JoinGroup=no@" "$CONFIG_FILE"
                sed -i "s@^Server2.Connections=.*@Server2.Connections=150@" "$CONFIG_FILE"
                sed -i "s@^Server2.Retention=.*@Server2.Retention=0@" "$CONFIG_FILE"
                sed -i "s@^Server2.CertVerification=.*@Server2.CertVerification=strict@" "$CONFIG_FILE"
                sed -i "s@^Server2.IpVersion=.*@Server2.IpVersion=auto@" "$CONFIG_FILE"
                if ! grep -q '^Server3.Host=' "$CONFIG_FILE"; then
                  printf '\n%s\n' \
                    'Server3.Active=yes' \
                    'Server3.Name=Frugal Bonus' \
                    'Server3.Level=1' \
                    'Server3.Optional=yes' \
                    'Server3.Group=0' \
                    'Server3.Host=bonus.frugalusenet.com' \
                    'Server3.Encryption=yes' \
                    'Server3.Port=563' \
                    'Server3.Username=' \
                    'Server3.Password=' \
                    'Server3.JoinGroup=no' \
                    'Server3.Cipher=' \
                    'Server3.Connections=10' \
                    'Server3.Retention=0' \
                    'Server3.CertVerification=strict' \
                    'Server3.IpVersion=auto' \
                    'Server3.Notes=' >> "$CONFIG_FILE"
                fi
                sed -i "s@^Server3.Active=.*@Server3.Active=yes@" "$CONFIG_FILE"
                sed -i "s@^Server3.Name=.*@Server3.Name=Frugal Bonus@" "$CONFIG_FILE"
                sed -i "s@^Server3.Level=.*@Server3.Level=1@" "$CONFIG_FILE"
                sed -i "s@^Server3.Optional=.*@Server3.Optional=yes@" "$CONFIG_FILE"
                sed -i "s@^Server3.Group=.*@Server3.Group=0@" "$CONFIG_FILE"
                sed -i "s@^Server3.Host=.*@Server3.Host=bonus.frugalusenet.com@" "$CONFIG_FILE"
                sed -i "s@^Server3.Encryption=.*@Server3.Encryption=yes@" "$CONFIG_FILE"
                sed -i "s@^Server3.Port=.*@Server3.Port=563@" "$CONFIG_FILE"
                if [ -n "$${NZBGET__FRUGAL_USERNAME:-}" ]; then
                  sed -i "s@^Server3.Username=.*@Server3.Username=$${NZBGET__FRUGAL_USERNAME}@" "$CONFIG_FILE"
                elif ! grep -q '^Server3.Username=' "$CONFIG_FILE"; then
                  printf '\nServer3.Username=\n' >> "$CONFIG_FILE"
                fi
                if [ -n "$${NZBGET__FRUGAL_PASSWORD:-}" ]; then
                  sed -i "s@^Server3.Password=.*@Server3.Password=$${NZBGET__FRUGAL_PASSWORD}@" "$CONFIG_FILE"
                elif ! grep -q '^Server3.Password=' "$CONFIG_FILE"; then
                  printf '\nServer3.Password=\n' >> "$CONFIG_FILE"
                fi
                sed -i "s@^Server3.JoinGroup=.*@Server3.JoinGroup=no@" "$CONFIG_FILE"
                sed -i "s@^Server3.Connections=.*@Server3.Connections=10@" "$CONFIG_FILE"
                sed -i "s@^Server3.Retention=.*@Server3.Retention=0@" "$CONFIG_FILE"
                sed -i "s@^Server3.CertVerification=.*@Server3.CertVerification=strict@" "$CONFIG_FILE"
                sed -i "s@^Server3.IpVersion=.*@Server3.IpVersion=auto@" "$CONFIG_FILE"
                if ! grep -q '^Server4.Host=' "$CONFIG_FILE"; then
                  printf '\n%s\n' \
                    'Server4.Active=yes' \
                    'Server4.Name=Blocknews US' \
                    'Server4.Level=2' \
                    'Server4.Optional=yes' \
                    'Server4.Group=0' \
                    'Server4.Host=usnews.blocknews.net' \
                    'Server4.Encryption=yes' \
                    'Server4.Port=563' \
                    'Server4.Username=' \
                    'Server4.Password=' \
                    'Server4.JoinGroup=no' \
                    'Server4.Cipher=' \
                    'Server4.Connections=20' \
                    'Server4.Retention=0' \
                    'Server4.CertVerification=strict' \
                    'Server4.IpVersion=auto' \
                    'Server4.Notes=' >> "$CONFIG_FILE"
                fi
                sed -i "s@^Server4.Active=.*@Server4.Active=yes@" "$CONFIG_FILE"
                sed -i "s@^Server4.Name=.*@Server4.Name=Blocknews US@" "$CONFIG_FILE"
                sed -i "s@^Server4.Level=.*@Server4.Level=2@" "$CONFIG_FILE"
                sed -i "s@^Server4.Optional=.*@Server4.Optional=yes@" "$CONFIG_FILE"
                sed -i "s@^Server4.Group=.*@Server4.Group=0@" "$CONFIG_FILE"
                sed -i "s@^Server4.Host=.*@Server4.Host=usnews.blocknews.net@" "$CONFIG_FILE"
                sed -i "s@^Server4.Encryption=.*@Server4.Encryption=yes@" "$CONFIG_FILE"
                sed -i "s@^Server4.Port=.*@Server4.Port=563@" "$CONFIG_FILE"
                if [ -n "$${NZBGET__BLOCKNEWS_USERNAME:-}" ]; then
                  sed -i "s@^Server4.Username=.*@Server4.Username=$${NZBGET__BLOCKNEWS_USERNAME}@" "$CONFIG_FILE"
                fi
                if [ -n "$${NZBGET__BLOCKNEWS_PASSWORD:-}" ]; then
                  sed -i "s@^Server4.Password=.*@Server4.Password=$${NZBGET__BLOCKNEWS_PASSWORD}@" "$CONFIG_FILE"
                fi
                sed -i "s@^Server4.JoinGroup=.*@Server4.JoinGroup=no@" "$CONFIG_FILE"
                sed -i "s@^Server4.Connections=.*@Server4.Connections=20@" "$CONFIG_FILE"
                sed -i "s@^Server4.Retention=.*@Server4.Retention=0@" "$CONFIG_FILE"
                sed -i "s@^Server4.CertVerification=.*@Server4.CertVerification=strict@" "$CONFIG_FILE"
                sed -i "s@^Server4.IpVersion=.*@Server4.IpVersion=auto@" "$CONFIG_FILE"
                sed -i "s@^Category1.Name=.*@Category1.Name=movies@" "$CONFIG_FILE"
                sed -i "s@^Category1.DestDir=.*@Category1.DestDir=\$${DestDir}/movies@" "$CONFIG_FILE"
                sed -i "s@^Category1.Unpack=.*@Category1.Unpack=yes@" "$CONFIG_FILE"
                sed -i "s@^Category2.Name=.*@Category2.Name=tv@" "$CONFIG_FILE"
                if grep -q '^Category2.DestDir=' "$CONFIG_FILE"; then
                  sed -i "s@^Category2.DestDir=.*@Category2.DestDir=\$${DestDir}/tv@" "$CONFIG_FILE"
                else
                  printf '\nCategory2.DestDir=\$${DestDir}/tv\n' >> "$CONFIG_FILE"
                fi
                if grep -q '^Category2.Unpack=' "$CONFIG_FILE"; then
                  sed -i "s@^Category2.Unpack=.*@Category2.Unpack=yes@" "$CONFIG_FILE"
                else
                  printf '\nCategory2.Unpack=yes\n' >> "$CONFIG_FILE"
                fi
                sed -i "s@^ArticleCache=.*@ArticleCache=500@" "$CONFIG_FILE"
                sed -i "s@^DirectWrite=.*@DirectWrite=yes@" "$CONFIG_FILE"

                echo "After update:"
                grep "^MainDir=" "$CONFIG_FILE"
                grep "^DestDir=" "$CONFIG_FILE"
                grep "^InterDir=" "$CONFIG_FILE"
                grep "^TempDir=" "$CONFIG_FILE"
                grep "^NzbDir=" "$CONFIG_FILE"
                grep "^QueueDir=" "$CONFIG_FILE"
                grep "^ScriptDir=" "$CONFIG_FILE"
                grep "^LockFile=" "$CONFIG_FILE"
                grep "^LogFile=" "$CONFIG_FILE"
                grep "^ControlIP=" "$CONFIG_FILE"
                grep "^ControlUsername=" "$CONFIG_FILE"
                grep "^Server1.Connections=" "$CONFIG_FILE"
                grep "^Server1.Host=" "$CONFIG_FILE"
                grep "^Server2.Host=" "$CONFIG_FILE"
                grep "^Server2.Connections=" "$CONFIG_FILE"
                grep "^Server3.Host=" "$CONFIG_FILE"
                grep "^Server3.Connections=" "$CONFIG_FILE"
                grep "^Server4.Host=" "$CONFIG_FILE"
                grep "^Server4.Connections=" "$CONFIG_FILE"
                grep "^ArticleCache=" "$CONFIG_FILE"
                grep "^DirectWrite=" "$CONFIG_FILE"
                echo "=== Init container complete ==="
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.0.0@sha256:0185f0b026696bfbb89f29aecf777b721a8aa288da90ceb1021b6ee52c6de8f7
            command:
              - /app/nzbget
            args:
              - --server
              - --configfile
              - /config/nzbget.conf
              - -o
              - OutputMode=log
              - -o
              - ControlPort=6789
            env:
              NZBGET__PORT: "6789"
              NZBGET__CONTROLIP: "::"
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ports:
          http:
            port: 80
            targetPort: 6789
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}-config-rbd"
        globalMounts:
          - path: /config
      content:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data
            subPath: data
      tmp:
        enabled: false
      work:
        enabled: false
