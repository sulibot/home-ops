---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
spec:
  chartRef:
    kind: OCIRepository
    name: nzbget
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      nzbget:
        initContainers:
          init-config:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.0.0@sha256:0185f0b026696bfbb89f29aecf777b721a8aa288da90ceb1021b6ee52c6de8f7
            env:
              NZBGET__CONTROLIP: "::"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            command:
              - /bin/sh
              - -c
              - |
                set -x
                CONFIG_DIR="/work/config"
                INTER_DIR="/work/intermediate"
                TEMP_DIR="/work/tmp"
                CONFIG_FILE="/work/config/nzbget.conf"
                COMPAT_CONFIG="/config"
                echo "=== Init container starting ==="

                mkdir -p "$CONFIG_DIR" "$INTER_DIR" "$TEMP_DIR" \
                  "$CONFIG_DIR/nzb" "$CONFIG_DIR/queue" "$CONFIG_DIR/scripts" "$COMPAT_CONFIG"
                chown -R 1000:1000 /work "$COMPAT_CONFIG"

                if [ ! -f "$CONFIG_FILE" ]; then
                  cp /app/nzbget.conf "$CONFIG_FILE"
                fi

                echo "Config file ready, size: $(wc -l < "$CONFIG_FILE") lines"

                # Update config - use $$ to escape for Helm
                sed -i "s@^MainDir=.*@MainDir=/work/config@" "$CONFIG_FILE"
                sed -i "s@^DestDir=.*@DestDir=/data/usenet/completed@" "$CONFIG_FILE"
                sed -i "s@^InterDir=.*@InterDir=/work/intermediate@" "$CONFIG_FILE"
                sed -i "s@^TempDir=.*@TempDir=/work/tmp@" "$CONFIG_FILE"
                sed -i "s@^QueueDir=.*@QueueDir=\${MainDir}/queue@" "$CONFIG_FILE"
                sed -i "s@^NzbDir=.*@NzbDir=\${MainDir}/nzb@" "$CONFIG_FILE"
                sed -i "s@^ScriptDir=.*@ScriptDir=\${MainDir}/scripts@" "$CONFIG_FILE"
                sed -i "s@^ControlIP=.*@ControlIP=$${NZBGET__CONTROLIP}@" "$CONFIG_FILE"
                sed -i "s@^ControlUsername=.*@ControlUsername=$${NZBGET__CONTROLUSERNAME}@" "$CONFIG_FILE"
                sed -i "s@^ControlPassword=.*@ControlPassword=$${NZBGET__CONTROLPASSWORD}@" "$CONFIG_FILE"
                sed -i "s@^ControlPort=.*@ControlPort=80@" "$CONFIG_FILE"
                sed -i "s@^Server1.Active=.*@Server1.Active=no@" "$CONFIG_FILE"
                sed -i "s@^Server1.Connections=.*@Server1.Connections=0@" "$CONFIG_FILE"
                sed -i "s@^ArticleCache=.*@ArticleCache=500@" "$CONFIG_FILE"
                sed -i "s@^DirectWrite=.*@DirectWrite=no@" "$CONFIG_FILE"

                rm -rf "$COMPAT_CONFIG/nzbget.conf" \
                  "$COMPAT_CONFIG/nzb" \
                  "$COMPAT_CONFIG/queue" \
                  "$COMPAT_CONFIG/tmp" \
                  "$COMPAT_CONFIG/scripts" \
                  "$COMPAT_CONFIG/completed" \
                  "$COMPAT_CONFIG/intermediate"

                ln -snf /work/config/nzbget.conf "$COMPAT_CONFIG/nzbget.conf"
                ln -snf /work/config/nzb "$COMPAT_CONFIG/nzb"
                ln -snf /work/config/queue "$COMPAT_CONFIG/queue"
                ln -snf /work/tmp "$COMPAT_CONFIG/tmp"
                ln -snf /work/config/scripts "$COMPAT_CONFIG/scripts"
                ln -snf /data/usenet/completed "$COMPAT_CONFIG/completed"
                ln -snf /work/intermediate "$COMPAT_CONFIG/intermediate"

                echo "After update:"
                grep "^MainDir=" "$CONFIG_FILE"
                grep "^DestDir=" "$CONFIG_FILE"
                grep "^InterDir=" "$CONFIG_FILE"
                grep "^TempDir=" "$CONFIG_FILE"
                grep "^ControlIP=" "$CONFIG_FILE"
                grep "^ControlUsername=" "$CONFIG_FILE"
                grep "^Server1.Connections=" "$CONFIG_FILE"
                grep "^ArticleCache=" "$CONFIG_FILE"
                grep "^DirectWrite=" "$CONFIG_FILE"
                echo "=== Init container complete ==="
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.0.0@sha256:0185f0b026696bfbb89f29aecf777b721a8aa288da90ceb1021b6ee52c6de8f7
            command:
              - /app/nzbget
            args:
              - --server
              - --configfile
              - /work/config/nzbget.conf
              - -o
              - OutputMode=log
              - -o
              - ControlPort=80
            env:
              NZBGET__PORT: &port 80
              NZBGET__CONTROLIP: "::"
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 100m
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
    persistence:
      config:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /config
      work:
        enabled: true
        existingClaim: "{{ .Release.Name }}-work"
        globalMounts:
          - path: /work
      content:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data
            subPath: data
      tmp:
        type: emptyDir
