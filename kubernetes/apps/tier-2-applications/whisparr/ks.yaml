---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whisparr
  namespace: flux-system
  labels:
    layer: "applications"
    component: application
    critical: "false"
spec:
  components:
    - ../../../../components/volsync

  dependsOn:
    - name: secrets-ready
      namespace: flux-system
    - name: storage-ready
      namespace: flux-system
    - name: volsync
      namespace: flux-system
    - name: volsync-repository-pvc
      namespace: flux-system
  interval: 15m
  retryInterval: 30s
  path: ./kubernetes/apps/tier-2-applications/whisparr/app
  postBuild:
    substitute:
      APP: whisparr
      VOLSYNC_SCHEDULE: "39 * * * *"
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_STORAGECLASS: csi-rbd-rbd-vm-sc
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_STORAGECLASS: csi-rbd-rbd-vm-sc
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_SNAPSHOTCLASS: csi-rbd-rbd-vm-sc
      VOLSYNC_SNAPSHOTCLASS: csi-rbd-rbd-vm-snapclass
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
