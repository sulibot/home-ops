---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: navidrome
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: navidrome-secret
    template:
      data:
        # Shared token between Navidrome and multi-scrobbler ListenBrainz source
        ND_LISTENBRAINZ_API_KEY: "{{ .NAVIDROME_LB_TOKEN }}"
  data:
    - secretKey: NAVIDROME_LB_TOKEN
      remoteRef:
        key: multi-scrobbler
        property: NAVIDROME_LB_TOKEN
