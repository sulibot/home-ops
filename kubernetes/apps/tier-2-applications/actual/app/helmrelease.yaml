---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  chartRef:
    kind: OCIRepository
    name: actual
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      actual:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: 26.2.0
            env:
              ACTUAL_PORT: &port 5006
              TZ: America/Los_Angeles
              # OIDC via Authentik (Google SSO) — auto-creates accounts on first login
              ACTUAL_OPENID_DISCOVERY_URL: "https://auth.sulibot.com/application/o/actual/.well-known/openid-configuration"
              ACTUAL_OPENID_SERVER_HOSTNAME: "https://actual.sulibot.com"
              ACTUAL_OPENID_AUTH_METHOD: "openid"
              ACTUAL_USER_CREATION_MODE: "login"
              ACTUAL_OPENID_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: actual-oidc
                    key: ACTUAL_OPENID_CLIENT_ID
              ACTUAL_OPENID_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: actual-oidc
                    key: ACTUAL_OPENID_CLIENT_SECRET
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    host: 127.0.0.1
                    path: /
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    host: 127.0.0.1
                    path: /
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    host: 127.0.0.1
                    path: /
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 12m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /data
