---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vikunja-secret
    creationPolicy: Owner
    template:
      data:
        VIKUNJA_SERVICE_JWTSECRET: "{{ .VIKUNJA_SERVICE_JWTSECRET }}"
        VIKUNJA_DATABASE_HOST: "postgres-vectorchord-rw.default.svc.cluster.local"
        VIKUNJA_DATABASE_DATABASE: "vikunja"
        VIKUNJA_DATABASE_USER: "vikunja"
        VIKUNJA_DATABASE_PASSWORD: "{{ .VIKUNJA_DB_PASSWORD }}"
        VIKUNJA_REDIS_PASSWORD: "{{ .VALKEY_PASSWORD }}"
        INIT_POSTGRES_DBNAME: "vikunja"
        INIT_POSTGRES_HOST: "postgres-vectorchord-rw.default.svc.cluster.local"
        INIT_POSTGRES_USER: "vikunja"
        INIT_POSTGRES_PASS: "{{ .VIKUNJA_DB_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        config.yml: |
          auth:
            local:
              enabled: true
            openid:
              enabled: true
              redirecturl: https://vikunja.sulibot.com/auth/openid
              providers:
                - name: Authentik
                  authurl: https://auth.sulibot.com/application/o/vikunja/
                  clientid: "{{ .VIKUNJA_OIDC_CLIENT_ID }}"
                  clientsecret: "{{ .VIKUNJA_OIDC_CLIENT_SECRET }}"
                  scope: openid profile email
  dataFrom:
    - extract:
        key: vikunja
    - extract:
        key: valkey
    - extract:
        key: cloudnative-pg
