---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vikunja-secret
    creationPolicy: Owner
    template:
      data:
        VIKUNJA_SERVICE_JWTSECRET: "{{ .VIKUNJA_SERVICE_JWTSECRET }}"
        VIKUNJA_DATABASE_HOST: "postgres-vectorchord-rw.default.svc.cluster.local"
        VIKUNJA_DATABASE_DATABASE: "vikunja"
        VIKUNJA_DATABASE_USER: "vikunja"
        VIKUNJA_DATABASE_PASSWORD: "{{ .VIKUNJA_DB_PASSWORD }}"
        VIKUNJA_REDIS_PASSWORD: "{{ .VALKEY_PASSWORD }}"
        config.yml: |
          auth:
            local:
              enabled: true
            openid:
              enabled: true
              redirecturl: https://vikunja.sulibot.com/auth/openid/authentik
              emailfallback: true
              usernamefallback: true
              providers:
                authentik:
                  name: Authentik
                  authurl: https://auth.sulibot.com/application/o/vikunja/
                  clientid: "{{ .VIKUNJA_OIDC_CLIENT_ID }}"
                  clientsecret: "{{ .VIKUNJA_OIDC_CLIENT_SECRET }}"
                  scope: openid profile email
  dataFrom:
    - extract:
        key: vikunja
    - extract:
        key: valkey
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-admin
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vikunja-admin
    creationPolicy: Owner
    template:
      data:
        VIKUNJA_ADMIN_USERNAME: "{{ .username }}"
        VIKUNJA_ADMIN_EMAIL: "admin@sulibot.com"
        VIKUNJA_ADMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: vikunja-admin
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vikunja-pg-password
    creationPolicy: Owner
    template:
      data:
        username: vikunja
        password: "{{ .VIKUNJA_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: vikunja
