---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vikunja
  namespace: flux-system
  labels:
    layer: "applications"
    component: application
    critical: "false"
spec:
  dependsOn:
    - name: onepassword
      namespace: flux-system
    - name: storage-ready
      namespace: flux-system
    - name: volsync
      namespace: flux-system
    - name: volsync-repository-pvc
      namespace: flux-system
    - name: valkey
      namespace: flux-system
    - name: postgres-vectorchord-ready
      namespace: flux-system
  interval: 15m
  retryInterval: 30s
  path: ./kubernetes/apps/tier-2-applications/vikunja/app
  postBuild:
    substitute:
      APP: vikunja
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_STORAGECLASS: csi-cephfs-config-sc
      VOLSYNC_CACHE_SNAPSHOTCLASS: csi-cephfs-config-sc
      VOLSYNC_SNAPSHOTCLASS: csi-cephfs-config-snapclass
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
