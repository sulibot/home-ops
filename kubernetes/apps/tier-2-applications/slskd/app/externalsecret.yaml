---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: slskd-secret
    template:
      data:
        SLSKD_SLSK_USERNAME: "{{ .SLSKD_SLSK_USERNAME }}"
        SLSKD_SLSK_PASSWORD: "{{ .SLSKD_SLSK_PASSWORD }}"
  dataFrom:
    - extract:
        key: slskd
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd-nordvpn
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: slskd-nordvpn-secret
    template:
      data:
        VPN_SERVICE_PROVIDER: nordvpn
        VPN_TYPE: wireguard
        WIREGUARD_PRIVATE_KEY: '{{ index . "WIREGUARD_PRIVATE_KEY" | default (index . "NORDVPN_WIREGUARD_PRIVATE_KEY") }}'
        SERVER_COUNTRIES: '{{ index . "SERVER_COUNTRIES" | default "" }}'
        FIREWALL_INPUT_PORTS: "80,8081,50429"
        TZ: America/Los_Angeles
  dataFrom:
    - extract:
        key: nordvpn
