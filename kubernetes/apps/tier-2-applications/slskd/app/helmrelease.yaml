---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slskd
spec:
  chartRef:
    kind: OCIRepository
    name: slskd
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    controllers:
      slskd:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-dirs:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.24.4@sha256:4031fc99b824ed2eec3bdbd92914fe6071539f3f71f0742052276afc2c69353d
            command:
              - sh
              - -c
              - |
                echo "[init] Creating required directories"
                mkdir -p /media/Downloads/soulseek/complete
                mkdir -p /media/Downloads/soulseek/incomplete
                mkdir -p /media/Downloads/soulseek/shared
                mkdir -p /tmp/gluetun
                echo "[init] Setting permissions"
                chown -R 1000:1000 /media/Downloads/soulseek/complete /media/Downloads/soulseek/incomplete /media/Downloads/soulseek/shared 2>/dev/null || true
                chown -R 1000:1000 /tmp/gluetun
                echo "[init] Initialization complete"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              HEALTH_SERVER_ADDRESS: :9999
            envFrom:
              - secretRef:
                  name: slskd-nordvpn-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                drop: ["ALL"]
                add: ["NET_ADMIN"]
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.24.4@sha256:4031fc99b824ed2eec3bdbd92914fe6071539f3f71f0742052276afc2c69353d
            env:
              DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp/.net
              TZ: America/Los_Angeles
              SLSKD_APP_DIR: /config
              SLSKD_HTTP_PORT: &port 80
              SLSKD_HTTP_IP_ADDRESS: '::'
              SLSKD_NO_AUTH: true
              SLSKD_NO_HTTPS: true
              SLSKD_NO_VERSION_CHECK: true
              SLSKD_SLSK_LISTEN_PORT: &slskPort 50429
              SLSKD_SLSK_LISTEN_IP_ADDRESS: 0.0.0.0
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 12
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
#              limits:
#                memory: 1Gi
          proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.1.1
            args:
              - TCP6-LISTEN:8081,ipv6only=0,fork,reuseaddr
              - TCP6:[::1]:80
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
          peer-proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.1.1
            args:
              - TCP6-LISTEN:50429,ipv6only=1,fork,reuseaddr
              - TCP4:127.0.0.1:50429
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
    defaultPodOptions:
      dnsConfig:
        options:
          - name: single-request
          - name: single-request-reopen
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: *port
            targetPort: 8081
      # Soulseek peer traffic needs a reachable TCP listen port. With NordVPN,
      # this VIP is useful only if slskd is not advertising the NordVPN egress IP.
      peer:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: fd00:101:250::130,10.101.250.130
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        externalTrafficPolicy: Cluster
        labels:
          advertise: loadbalancer
        ports:
          slsk:
            port: *slskPort
            protocol: TCP
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.sulibot.com"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    configMaps:
      config:
        data:
          slskd.yml: |-
            web:
              ip_address: '::'
            soulseek:
              address: vps.slsknet.org
              port: 2271
              listen_ip_address: 0.0.0.0
              listen_port: 50429
            directories:
              downloads: /media/Downloads/soulseek/complete
              incomplete: /media/Downloads/soulseek/incomplete
            permissions:
              file:
                mode: 750
            shares:
              directories:
                - /media/music
                - /media/Downloads/soulseek/complete
              filters:
                - \.ini$
                - Thumbs.db$
                - \.DS_Store$
    persistence:
      dev-net-tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          slskd:
            gluetun:
              - path: /dev/net/tun
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/slskd.yml
            subPath: slskd.yml
      media:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /media/Downloads/soulseek
            subPath: data/media/soulseek
          - path: /media/music
            subPath: data/media/music
      tmp:
        type: emptyDir
