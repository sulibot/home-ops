---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mediasage
spec:
  chartRef:
    kind: OCIRepository
    name: mediasage
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      mediasage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ecwilsonaz/mediasage
              tag: latest@sha256:bec22809257abd149b91176bf29814b7bbf3e23bb547b599c7f7800b7ab2e4ea
            # Image entrypoint hardcodes `--host 0.0.0.0` (IPv4-only). This cluster is
            # dual-stack with IPv6 as the pod's primary address, so kubelet probes and
            # the gateway route would get connection-refused. Bind dual-stack instead.
            command: ["sh", "-c"]
            args:
              - "uvicorn backend.main:app --host :: --port 5765 --workers ${UVICORN_WORKERS:-1}"
            env:
              TZ: America/Los_Angeles
              PLEX_URL: http://plex.default.svc.cluster.local:32400
              PLEX_MUSIC_LIBRARY: Music
              LLM_PROVIDER: openai
            envFrom:
              - secretRef:
                  name: mediasage-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 5765
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 5765
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      app:
        ports:
          http:
            port: 5765

    route:
      app:
        hostnames:
          - mediasage.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 5765

    persistence:
      data:
        existingClaim: mediasage-config
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
