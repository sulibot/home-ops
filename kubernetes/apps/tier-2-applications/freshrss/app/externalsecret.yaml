---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: freshrss-secret
    creationPolicy: Owner
    template:
      data:
        DB_HOST: postgres-vectorchord-rw.default.svc.cluster.local
        DB_BASE: freshrss
        DB_USER: freshrss
        DB_PASSWORD: '{{ .FRESHRSS_DB_PASSWORD }}'
        FRESHRSS_INSTALL: >-
          --default-user "admin"
          --base-url "https://freshrss.sulibot.com"
          --auth-type form
          --api-enabled
          --db-type "pgsql"
          --db-host "postgres-vectorchord-rw.default.svc.cluster.local"
          --db-user "freshrss"
          --db-password "{{ .FRESHRSS_DB_PASSWORD }}"
          --db-base "freshrss"
        config.custom.php: |
          <?php
          return [];
  dataFrom:
    - extract:
        key: freshrss
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-admin
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: freshrss-admin
    creationPolicy: Owner
    template:
      data:
        FRESHRSS_ADMIN_USERNAME: admin
        FRESHRSS_ADMIN_EMAIL: '{{ .username | default "admin@sulibot.com" }}'
        FRESHRSS_ADMIN_PASSWORD: '{{ .password }}'
        FRESHRSS_DEFAULT_USER: admin
        FRESHRSS_USER: >-
          --user "admin"
          --email "{{ .username | default "admin@sulibot.com" }}"
          --password "{{ .password }}"
  dataFrom:
    - extract:
        key: freshrss-admin
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-pg
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: freshrss-pg-password
    creationPolicy: Owner
    template:
      data:
        username: freshrss
        password: '{{ .FRESHRSS_DB_PASSWORD }}'
  dataFrom:
    - extract:
        key: freshrss
