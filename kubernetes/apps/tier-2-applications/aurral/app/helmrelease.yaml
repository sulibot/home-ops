---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aurral
spec:
  chartRef:
    kind: OCIRepository
    name: aurral
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      aurral:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lklynet/aurral
              tag: latest@sha256:c15021d52ac12673e16ce1e0efbde46dc49f512afb83445c7fe38b230ec835f0
            env:
              TZ: America/Los_Angeles
              NODE_OPTIONS: "--max-old-space-size=1536"
              LIDARR_URL: http://lidarr.default.svc.cluster.local
              MUSICBRAINZ_CONTACT: sulibot@gmail.com
              DOWNLOAD_FOLDER: /data/media/music_discovery
              WEEKLY_FLOW_FOLDER: /app/backend/data/weekly-flow
            envFrom:
              - secretRef:
                  name: aurral-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 4Gi
          proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.0.3
            command:
              - sh
              - -c
              - socat TCP6-LISTEN:3001,ipv6only=1,fork,reuseaddr TCP4:127.0.0.1:3001
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: 3001

    route:
      app:
        hostnames:
          - aurral.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 3001

    persistence:
      data:
        existingClaim: aurral-config
        globalMounts:
          - path: /app/backend/data
      media:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data/media/music_discovery
            subPath: data/media/music_discovery
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
