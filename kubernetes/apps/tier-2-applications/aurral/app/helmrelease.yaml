---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aurral
spec:
  chartRef:
    kind: OCIRepository
    name: aurral
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      aurral:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              HEALTH_SERVER_ADDRESS: :9999
              WIREGUARD_ALLOWED_IPS: 0.0.0.0/0
            envFrom:
              - secretRef:
                  name: aurral-nordvpn-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                drop: ["ALL"]
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
          app:
            image:
              repository: ghcr.io/lklynet/aurral
              tag: latest@sha256:b30405522fc107e6872d8947c11d75af75930b3c7b1577bb193b3d9fb4fe99b2
            env:
              TZ: America/Los_Angeles
              # --experimental-loader: aurral is ESM ("type": "module");
              # the operator-injected --require hook is CJS-only and produces
              # zero spans without OTel's ESM loader hook alongside it.
              NODE_OPTIONS: "--max-old-space-size=1536 --experimental-loader=/otel-auto-instrumentation-nodejs/node_modules/@opentelemetry/instrumentation/hook.mjs"
              # Keep service.name aligned with the Loki `app` label (trace->logs join)
              OTEL_SERVICE_NAME: aurral
              LIDARR_URL: http://lidarr.default.svc.cluster.local
              MUSICBRAINZ_CONTACT: sulibot@gmail.com
              DOWNLOAD_FOLDER: /data/media/music_discovery
              WEEKLY_FLOW_FOLDER: /app/backend/data/weekly-flow
              TRUST_PROXY: "true"
              AUTH_PROXY_ENABLED: "true"
              AUTH_PROXY_HEADER: X-authentik-username
              AUTH_PROXY_ADMIN_USERS: sulibot,admin
              AUTH_PROXY_DEFAULT_ROLE: user
            envFrom:
              - secretRef:
                  name: aurral-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 4Gi
          proxy:
            image:
              repository: docker.io/alpine/socat
              tag: 1.8.1.1
            command:
              - sh
              - -c
              - socat TCP6-LISTEN:3001,ipv6only=1,fork,reuseaddr TCP4:127.0.0.1:3001
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 16Mi

    defaultPodOptions:
      annotations:
        # OTel Node.js SDK auto-injection (pure-JS, no native profiler -
        # avoids the musl/.NET landmines that killed the sonarr pilot).
        # Scoped to the app container; gluetun/socat stay untouched.
        instrumentation.opentelemetry.io/inject-nodejs: "observability/default"
        instrumentation.opentelemetry.io/container-names: "app"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          http:
            port: 3001

    route:
      app:
        hostnames:
          - aurral.sulibot.com
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - name: authentik-outpost
                port: 9000

    persistence:
      dev-net-tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          aurral:
            gluetun:
              - path: /dev/net/tun
      data:
        existingClaim: aurral-config
        globalMounts:
          - path: /app/backend/data
      media:
        type: persistentVolumeClaim
        existingClaim: csi-cephfs-content-pvc
        globalMounts:
          - path: /data/media/music_discovery
            subPath: data/media/music_discovery
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
