---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-gpt
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-gpt-secret
    template:
      data:
        PAPERLESS_API_TOKEN: "{{ .PAPERLESS_API_TOKEN }}"
        # Provider toggle defaults; override in 1Password item `paperless-gpt`.
        LLM_PROVIDER: '{{ index . "LLM_PROVIDER" | default "ollama" }}'
        LLM_MODEL: '{{ index . "LLM_MODEL" | default "llama3.2:3b" }}'
        LLM_API_BASE_URL: '{{ index . "LLM_API_BASE_URL" | default "http://ollama.default.svc.cluster.local:11434" }}'
        VISION_LLM_PROVIDER: '{{ index . "VISION_LLM_PROVIDER" | default "ollama" }}'
        VISION_LLM_MODEL: '{{ index . "VISION_LLM_MODEL" | default "moondream:1.8b" }}'
        OPENAI_API_KEY: '{{ index . "OPENAI_API_KEY" | default "" }}'
        OPENAI_BASE_URL: '{{ index . "OPENAI_BASE_URL" | default "" }}'
  dataFrom:
    - extract:
        key: paperless-gpt
