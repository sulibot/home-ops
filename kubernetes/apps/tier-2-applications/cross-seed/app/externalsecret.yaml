---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cross-seed
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cross-seed-secret
    template:
      data:
        config.js: |-
          function fetchIndexers(baseUrl, apiKey, tag){
            const buffer = require('child_process').execSync(`curl -fsSL "$${baseUrl}/api/v1/tag/detail?apikey=$${apiKey}"`);
            const response = JSON.parse(buffer.toString('utf8'));
            const indexerIds = response.filter(t => t.label === tag)[0]?.indexerIds ?? [];
            const indexers = indexerIds.map(i => `$${baseUrl}/$${i}/api?apikey=$${apiKey}`);
            console.log(`Loaded $${indexers.length} indexers from Prowlarr`);
            return indexers;
          }
          module.exports = {
            action: "inject",
            apiKey: "{{.CROSS_SEED_API_KEY}}",
            blockList: ["category:manual"],
            linkCategory: "cross-seed",
            linkDirs: ["/data/torrents/cross-seed"],
            linkType: "hardlink",
            matchMode: "partial",
            port: Number(process.env.CROSS_SEED_PORT),
            skipRecheck: true,
            radarr: [
              "http://radarr.default.svc.cluster.local/?apikey={{ .RADARR_API_KEY }}",
              "http://radarr-4k.default.svc.cluster.local/?apikey={{ .RADARR_4K_API_KEY }}"
            ],
            sonarr: [
              "http://sonarr.default.svc.cluster.local/?apikey={{ .SONARR_API_KEY }}",
              "http://sonarr-4k.default.svc.cluster.local/?apikey={{ .SONARR_4K_API_KEY }}"
            ],
            torrentClients: ["qbittorrent:http://qui.default.svc.cluster.local/proxy/{{ .QUI_CLIENT_API_KEY }}"],
            torznab: fetchIndexers("http://prowlarr.default.svc.cluster.local", "{{.PROWLARR_API_KEY}}", "cross-seed"),
            useClientTorrents: true
          };
  data:
    - secretKey: CROSS_SEED_API_KEY
      remoteRef:
        key: cross-seed
        property: CROSS_SEED_API_KEY
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: prowlarr
        property: PROWLARR_API_KEY
    - secretKey: QUI_CLIENT_API_KEY
      remoteRef:
        key: qui
        property: QUI_CLIENT_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: radarr
        property: RADARR_API_KEY
    - secretKey: RADARR_4K_API_KEY
      remoteRef:
        key: radarr-4k
        property: RADARR_API_KEY
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: sonarr
        property: SONARR_API_KEY
    - secretKey: SONARR_4K_API_KEY
      remoteRef:
        key: sonarr-4k
        property: SONARR_API_KEY
