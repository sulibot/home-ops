---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud
spec:
  chartRef:
    kind: OCIRepository
    name: opencloud
  interval: 1h
  timeout: 10m
  maxHistory: 3
  install:
    remediation:
      retries: 5
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      opencloud:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/opencloudeu/opencloud-rolling
              tag: 5.2.0@sha256:c840de29b7287da070ffc9d5eb52a1b291a046877402bf70f387ccf56c820aee
            command:
              - /bin/sh
              - -c
              - "opencloud init || true; opencloud server"
            env:
              TZ: America/Los_Angeles
              OC_URL: https://opencloud.sulibot.com
              OC_LOG_LEVEL: info
              OC_INSECURE: "false"
              OC_OIDC_ISSUER: "https://auth.sulibot.com/application/o/opencloud/"
              OC_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-secret
                    key: OPENCLOUD_OIDC_CLIENT_ID
              OC_OIDC_SCOPE: "openid profile email"
              PROXY_OIDC_REWRITE_WELLKNOWN: "true"
              PROXY_AUTOPROVISION_ACCOUNTS: "true"
              GRAPH_USERNAME_MATCH: "none"
              PROXY_USER_OIDC_CLAIM: "preferred_username"
              PROXY_AUTOPROVISION_CLAIM_USERNAME: "preferred_username"
              PROXY_USER_CS3_CLAIM: "username"
              OC_ENABLE_OCM: "false"
              PROXY_HTTP_ADDR: 0.0.0.0:9200
              PROXY_TLS: "false"
              PROXY_CSP_CONFIG_FILE_LOCATION: /etc/opencloud/csp.yaml
              WEB_OIDC_AUTHORITY: "https://auth.sulibot.com/application/o/opencloud/"
              WEB_OIDC_METADATA_URL: "https://auth.sulibot.com/application/o/opencloud/.well-known/openid-configuration"
              WEB_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-secret
                    key: OPENCLOUD_OIDC_CLIENT_ID
              WEB_OIDC_SCOPE: "openid profile email"
              IDM_CREATE_DEMO_USERS: "false"
              OC_ADMIN_USER_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-secret
                    key: IDM_ADMIN_USERNAME
              IDM_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-secret
                    key: IDM_ADMIN_PASSWORD
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
          collaboration:
            image:
              repository: docker.io/opencloudeu/opencloud-rolling
              tag: 5.2.0@sha256:c840de29b7287da070ffc9d5eb52a1b291a046877402bf70f387ccf56c820aee
            command:
              - /bin/sh
              - -c
              - "opencloud collaboration server"
            env:
              TZ: America/Los_Angeles
              OC_URL: https://opencloud.sulibot.com
              OC_LOG_LEVEL: info
              COLLABORATION_APP_NAME: CollaboraOnline
              COLLABORATION_APP_PRODUCT: Collabora
              COLLABORATION_APP_ADDR: https://collabora.sulibot.com
              COLLABORATION_APP_INSECURE: "false"
              COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
              COLLABORATION_WOPI_SRC: https://wopiserver.sulibot.com
              OC_REVA_GATEWAY: eu.opencloud.api.gateway
              MICRO_REGISTRY_ADDRESS: 127.0.0.1:9233
            probes:
              liveness: &collaborationProbes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9300
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *collaborationProbes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9300
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 25m
                memory: 128Mi

    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv6
          - IPv4
        ports:
          http:
            port: &port 9200
          wopi:
            port: &wopiPort 9300

    route:
      app:
        hostnames:
          - "opencloud.sulibot.com"
        parentRefs:
          - name: gateway-tunnel
            namespace: network
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      wopi:
        hostnames:
          - "wopiserver.sulibot.com"
        parentRefs:
          - name: gateway-tunnel
            namespace: network
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *wopiPort

    configMaps:
      config:
        data:
          csp.yaml: |-
            directives:
              child-src:
                - "'self'"
                - "https://collabora.sulibot.com"
              connect-src:
                - "'self'"
                - "blob:"
                - "https://raw.githubusercontent.com/opencloud-eu/awesome-apps/"
                - "https://update.opencloud.eu/"
                - "https://auth.sulibot.com"
                - "wss://auth.sulibot.com"
                - "https://collabora.sulibot.com"
                - "https://wopiserver.sulibot.com"
              default-src:
                - "'none'"
              font-src:
                - "'self'"
              frame-ancestors:
                - "'self'"
              frame-src:
                - "'self'"
                - "blob:"
                - "https://embed.diagrams.net/"
                - "https://auth.sulibot.com"
                - "https://collabora.sulibot.com"
              img-src:
                - "'self'"
                - "data:"
                - "blob:"
                - "https://raw.githubusercontent.com/opencloud-eu/awesome-apps/"
              manifest-src:
                - "'self'"
              media-src:
                - "'self'"
              object-src:
                - "'self'"
                - "blob:"
              script-src:
                - "'self'"
                - "'unsafe-inline'"
              style-src:
                - "'self'"
                - "'unsafe-inline'"

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}-config"
        globalMounts:
          - path: /var/lib/opencloud
            subPath: data
          - path: /etc/opencloud
            subPath: config
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /etc/opencloud/csp.yaml
            subPath: csp.yaml
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
