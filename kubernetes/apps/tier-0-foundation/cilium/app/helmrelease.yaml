---
# Cilium CNI HelmRelease for cluster-101
# Managed by Flux after bootstrap
#
# Bootstrap (task cluster:bootstrap) reads spec.chart.spec.version and values.yaml from this
# directory to install Cilium — single source of truth, no drift between bootstrap and Flux.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: kube-system

  interval: 30m
  timeout: 10m
  maxHistory: 3

  install:
    crds: CreateReplace
    # Replace existing resources installed by bootstrap helm install
    replace: true
    remediation:
      retries: 5
    timeout: 10m

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 5
      strategy: rollback
    timeout: 10m

  # Values from ConfigMap (generated from values.yaml)
  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-values
      valuesKey: values.yaml
