  use_blueprint:
    path: jhol-byte/Ikea_bilresa_scroll_wheel.yaml
    input:
      remote: 913eb22217db840f332b74696e80ed80
      click_action_ch1:
        - action: light.toggle
          target:
            entity_id: light.master_lights
      on_hold_action_ch1:
        - action: script.light_color_temp_helper
          data:
            mode: up
