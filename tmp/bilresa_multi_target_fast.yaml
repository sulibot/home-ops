blueprint:
  name: Bilresa Multi-Target Preset Controller
  description: >
    Reusable BILRESA Matter controller blueprint with three channels.

    Channel model:
    - channel 1: button + wheel zone 1
    - channel 2: button + wheel zone 2
    - channel 3: button + wheel zone 3

    Behavior:
    - single click: deterministic on/off with debounce
    - double click: reading preset
    - triple click: max preset
    - scroll: brightness down/up with debounce and opposite-direction suppression
    - optional min-brightness floor on scroll down
    - optional max-brightness flash on scroll up
    - long press: color temperature shift with endpoint flash

    Notes:
    - uses explicit event/sensor entities for reliable Matter triggers
    - hold_state_helper stores next direction as CSV: cooler,warmer,cooler
  domain: automation
  input:
    button_ch1_entity:
      name: Channel 1 button event entity
      selector:
        entity:
          domain: event
          multiple: false
    hold_state_helper:
      name: Hold direction state helper
      description: Input text storing next hold direction as cooler,warmer,cooler
      selector:
        entity:
          domain: input_text
          multiple: false
    scroll_up_ch1_entity:
      name: Channel 1 scroll up sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    scroll_down_ch1_entity:
      name: Channel 1 scroll down sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    button_ch2_entity:
      name: Channel 2 button event entity
      selector:
        entity:
          domain: event
          multiple: false
    scroll_up_ch2_entity:
      name: Channel 2 scroll up sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    scroll_down_ch2_entity:
      name: Channel 2 scroll down sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    button_ch3_entity:
      name: Channel 3 button event entity
      selector:
        entity:
          domain: event
          multiple: false
    scroll_up_ch3_entity:
      name: Channel 3 scroll up sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    scroll_down_ch3_entity:
      name: Channel 3 scroll down sensor
      selector:
        entity:
          domain: sensor
          multiple: false
    channel_1_target:
      name: Channel 1 target
      selector:
        entity:
          domain: light
          multiple: true
    channel_2_target:
      name: Channel 2 target
      selector:
        entity:
          domain: light
          multiple: true
    channel_3_target:
      name: Channel 3 target
      selector:
        entity:
          domain: light
          multiple: true
    brightness_step_pct:
      name: Scroll brightness step percentage
      default: 20
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider
          unit_of_measurement: "%"
    scroll_debounce_ms:
      name: Scroll debounce milliseconds
      default: 200
      selector:
        number:
          min: 0
          max: 1000
          step: 10
          mode: slider
          unit_of_measurement: ms
    press_debounce_ms:
      name: Single press debounce milliseconds
      default: 350
      selector:
        number:
          min: 0
          max: 1000
          step: 10
          mode: slider
          unit_of_measurement: ms
    hold_repeat_ms:
      name: Hold repeat milliseconds
      default: 100
      selector:
        number:
          min: 50
          max: 1000
          step: 10
          mode: slider
          unit_of_measurement: ms
    min_brightness_pct:
      name: Minimum brightness floor for scroll down
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider
          unit_of_measurement: "%"
    enforce_min_brightness_on_scroll_down:
      name: Enforce brightness floor on scroll down
      default: false
      selector:
        boolean: {}
    flash_on_max_brightness:
      name: Flash at max brightness on scroll up
      default: false
      selector:
        boolean: {}
    max_flash_rgb_color:
      name: Max brightness flash RGB color
      default: [255, 0, 255]
      selector:
        color_rgb: {}
    max_flash_ms:
      name: Max brightness flash duration
      default: 220
      selector:
        number:
          min: 50
          max: 1000
          step: 10
          mode: slider
          unit_of_measurement: ms
    min_color_temp_kelvin:
      name: Minimum color temperature
      default: 2200
      selector:
        number:
          min: 1800
          max: 5000
          step: 50
          mode: slider
          unit_of_measurement: K
    max_color_temp_kelvin:
      name: Maximum color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    color_temp_step_kelvin:
      name: Hold color temperature step
      default: 150
      selector:
        number:
          min: 50
          max: 1000
          step: 50
          mode: slider
          unit_of_measurement: K
    reading_brightness_pct_channel_1:
      name: Channel 1 reading brightness
      default: 75
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    reading_color_temp_kelvin_channel_1:
      name: Channel 1 reading color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    max_brightness_pct_channel_1:
      name: Channel 1 max brightness
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    max_color_temp_kelvin_channel_1:
      name: Channel 1 max color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    reading_brightness_pct_channel_2:
      name: Channel 2 reading brightness
      default: 75
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    reading_color_temp_kelvin_channel_2:
      name: Channel 2 reading color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    max_brightness_pct_channel_2:
      name: Channel 2 max brightness
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    max_color_temp_kelvin_channel_2:
      name: Channel 2 max color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    reading_brightness_pct_channel_3:
      name: Channel 3 reading brightness
      default: 75
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    reading_color_temp_kelvin_channel_3:
      name: Channel 3 reading color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    max_brightness_pct_channel_3:
      name: Channel 3 max brightness
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    max_color_temp_kelvin_channel_3:
      name: Channel 3 max color temperature
      default: 4000
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          mode: slider
          unit_of_measurement: K
    debug_logging:
      name: Debug logging
      default: false
      selector:
        boolean: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input button_ch1_entity
    id: button_ch1
  - platform: state
    entity_id: !input button_ch2_entity
    id: button_ch2
  - platform: state
    entity_id: !input button_ch3_entity
    id: button_ch3
  - platform: state
    entity_id: !input scroll_up_ch1_entity
    to: "1"
    id: scroll_up_ch1
  - platform: state
    entity_id: !input scroll_down_ch1_entity
    to: "1"
    id: scroll_down_ch1
  - platform: state
    entity_id: !input scroll_up_ch2_entity
    to: "1"
    id: scroll_up_ch2
  - platform: state
    entity_id: !input scroll_down_ch2_entity
    to: "1"
    id: scroll_down_ch2
  - platform: state
    entity_id: !input scroll_up_ch3_entity
    to: "1"
    id: scroll_up_ch3
  - platform: state
    entity_id: !input scroll_down_ch3_entity
    to: "1"
    id: scroll_down_ch3

condition:
  - condition: template
    value_template: >
      {{ trigger.to_state is not none and
         trigger.to_state.state not in ['unknown', 'unavailable'] }}

variables:
  button_ch1_entity: !input button_ch1_entity
  button_ch2_entity: !input button_ch2_entity
  button_ch3_entity: !input button_ch3_entity
  hold_state_helper: !input hold_state_helper
  scroll_up_ch1_entity: !input scroll_up_ch1_entity
  scroll_down_ch1_entity: !input scroll_down_ch1_entity
  scroll_up_ch2_entity: !input scroll_up_ch2_entity
  scroll_down_ch2_entity: !input scroll_down_ch2_entity
  scroll_up_ch3_entity: !input scroll_up_ch3_entity
  scroll_down_ch3_entity: !input scroll_down_ch3_entity
  channel_1_target: !input channel_1_target
  channel_2_target: !input channel_2_target
  channel_3_target: !input channel_3_target
  brightness_step_pct: !input brightness_step_pct
  scroll_debounce_ms: !input scroll_debounce_ms
  press_debounce_ms: !input press_debounce_ms
  hold_repeat_ms: !input hold_repeat_ms
  min_brightness_pct: !input min_brightness_pct
  enforce_min_brightness_on_scroll_down: !input enforce_min_brightness_on_scroll_down
  flash_on_max_brightness: !input flash_on_max_brightness
  max_flash_rgb_color: !input max_flash_rgb_color
  max_flash_ms: !input max_flash_ms
  min_color_temp_kelvin: !input min_color_temp_kelvin
  max_color_temp_kelvin: !input max_color_temp_kelvin
  color_temp_step_kelvin: !input color_temp_step_kelvin
  reading_brightness_pct_channel_1: !input reading_brightness_pct_channel_1
  reading_color_temp_kelvin_channel_1: !input reading_color_temp_kelvin_channel_1
  max_brightness_pct_channel_1: !input max_brightness_pct_channel_1
  max_color_temp_kelvin_channel_1: !input max_color_temp_kelvin_channel_1
  reading_brightness_pct_channel_2: !input reading_brightness_pct_channel_2
  reading_color_temp_kelvin_channel_2: !input reading_color_temp_kelvin_channel_2
  max_brightness_pct_channel_2: !input max_brightness_pct_channel_2
  max_color_temp_kelvin_channel_2: !input max_color_temp_kelvin_channel_2
  reading_brightness_pct_channel_3: !input reading_brightness_pct_channel_3
  reading_color_temp_kelvin_channel_3: !input reading_color_temp_kelvin_channel_3
  max_brightness_pct_channel_3: !input max_brightness_pct_channel_3
  max_color_temp_kelvin_channel_3: !input max_color_temp_kelvin_channel_3
  debug_logging: !input debug_logging

  current_channel_index: >
    {% if trigger.id in ['button_ch1', 'scroll_up_ch1', 'scroll_down_ch1'] %}
      0
    {% elif trigger.id in ['button_ch2', 'scroll_up_ch2', 'scroll_down_ch2'] %}
      1
    {% else %}
      2
    {% endif %}

  current_button_entity: >
    {% if trigger.id in ['button_ch1', 'scroll_up_ch1', 'scroll_down_ch1'] %}
      {{ button_ch1_entity }}
    {% elif trigger.id in ['button_ch2', 'scroll_up_ch2', 'scroll_down_ch2'] %}
      {{ button_ch2_entity }}
    {% else %}
      {{ button_ch3_entity }}
    {% endif %}

  current_scroll_opposite_active: >
    {% if trigger.id == 'scroll_up_ch1' %}
      {{ is_state(scroll_down_ch1_entity, '1') }}
    {% elif trigger.id == 'scroll_down_ch1' %}
      {{ is_state(scroll_up_ch1_entity, '1') }}
    {% elif trigger.id == 'scroll_up_ch2' %}
      {{ is_state(scroll_down_ch2_entity, '1') }}
    {% elif trigger.id == 'scroll_down_ch2' %}
      {{ is_state(scroll_up_ch2_entity, '1') }}
    {% elif trigger.id == 'scroll_up_ch3' %}
      {{ is_state(scroll_down_ch3_entity, '1') }}
    {% elif trigger.id == 'scroll_down_ch3' %}
      {{ is_state(scroll_up_ch3_entity, '1') }}
    {% else %}
      false
    {% endif %}

  target_entities: >
    {% if trigger.id in ['button_ch1', 'scroll_up_ch1', 'scroll_down_ch1'] %}
      {{ channel_1_target }}
    {% elif trigger.id in ['button_ch2', 'scroll_up_ch2', 'scroll_down_ch2'] %}
      {{ channel_2_target }}
    {% else %}
      {{ channel_3_target }}
    {% endif %}

  target_entity_list: "{{ [target_entities] if target_entities is string else target_entities }}"

  first_target_entity: >
    {% if target_entities is string %}
      {{ target_entities }}
    {% else %}
      {{ target_entities[0] }}
    {% endif %}

  event_type: >
    {% if trigger.id == 'button_ch1' %}
      {{ state_attr(button_ch1_entity, 'event_type') }}
    {% elif trigger.id == 'button_ch2' %}
      {{ state_attr(button_ch2_entity, 'event_type') }}
    {% elif trigger.id == 'button_ch3' %}
      {{ state_attr(button_ch3_entity, 'event_type') }}
    {% else %}
      none
    {% endif %}

  reading_brightness_pct: >
    {% if current_channel_index | int == 0 %}
      {{ reading_brightness_pct_channel_1 | int }}
    {% elif current_channel_index | int == 1 %}
      {{ reading_brightness_pct_channel_2 | int }}
    {% else %}
      {{ reading_brightness_pct_channel_3 | int }}
    {% endif %}

  reading_color_temp_kelvin: >
    {% if current_channel_index | int == 0 %}
      {{ reading_color_temp_kelvin_channel_1 | int }}
    {% elif current_channel_index | int == 1 %}
      {{ reading_color_temp_kelvin_channel_2 | int }}
    {% else %}
      {{ reading_color_temp_kelvin_channel_3 | int }}
    {% endif %}

  max_brightness_pct: >
    {% if current_channel_index | int == 0 %}
      {{ max_brightness_pct_channel_1 | int }}
    {% elif current_channel_index | int == 1 %}
      {{ max_brightness_pct_channel_2 | int }}
    {% else %}
      {{ max_brightness_pct_channel_3 | int }}
    {% endif %}

  max_color_temp_kelvin_selected: >
    {% if current_channel_index | int == 0 %}
      {{ max_color_temp_kelvin_channel_1 | int }}
    {% elif current_channel_index | int == 1 %}
      {{ max_color_temp_kelvin_channel_2 | int }}
    {% else %}
      {{ max_color_temp_kelvin_channel_3 | int }}
    {% endif %}

  hold_state_csv: >
    {% set raw = states(hold_state_helper) %}
    {% if raw in ['unknown', 'unavailable', 'none', '', None] %}
      cooler,cooler,cooler
    {% else %}
      {{ raw }}
    {% endif %}

  current_hold_direction: >
    {% set parts = hold_state_csv.split(',') %}
    {% set idx = current_channel_index | int %}
    {% if parts | count > idx and parts[idx] in ['cooler', 'warmer'] %}
      {{ parts[idx] }}
    {% else %}
      cooler
    {% endif %}

  hold_start_color_temp_kelvin: >
    {{ state_attr(first_target_entity, 'color_temp_kelvin') | int(default=min_color_temp_kelvin | int) }}

  press_debounce_seconds: "{{ (press_debounce_ms | int(350)) / 1000 }}"
  scroll_debounce_seconds: "{{ (scroll_debounce_ms | int(200)) / 1000 }}"

  scroll_delta_seconds: >
    {% if trigger.from_state is none %}
      999
    {% else %}
      {{ as_timestamp(trigger.to_state.last_changed) - as_timestamp(trigger.from_state.last_changed) }}
    {% endif %}

action:
  - choose:
      - conditions: "{{ debug_logging }}"
        sequence:
          - service: system_log.write
            data:
              level: warning
              message: >
                Bilresa trigger={{ trigger.id }} event_type={{ event_type }}
                target={{ target_entities }} opposite_active={{ current_scroll_opposite_active }}

  - choose:
      - conditions: >
          {{ trigger.id.startswith('scroll_up_')
             and not (current_scroll_opposite_active | bool)
             and (scroll_delta_seconds | float(999)) >= (scroll_debounce_seconds | float(0)) }}
        sequence:
          - choose:
              - conditions: "{{ flash_on_max_brightness }}"
                sequence:
                  - repeat:
                      for_each: "{{ target_entity_list }}"
                      sequence:
                        - variables:
                            current_brightness: "{{ state_attr(repeat.item, 'brightness') | int(0) }}"
                            current_pct: >
                              {% if current_brightness > 0 %}
                                {{ ((current_brightness / 255) * 100) | round(0) | int }}
                              {% else %}
                                0
                              {% endif %}
                            next_pct: "{{ [100, (current_pct | int(0)) + (brightness_step_pct | int(20))] | min }}"
                            hit_max: "{{ (current_pct | int(0)) >= 99 or (next_pct | int(0)) >= 100 }}"
                            current_color_temp: "{{ state_attr(repeat.item, 'color_temp_kelvin') | int(default=max_color_temp_kelvin | int(4000)) }}"
                        - service: light.turn_on
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            brightness_pct: "{{ next_pct | int(100) }}"
                            transition: 0
                        - choose:
                            - conditions: "{{ hit_max }}"
                              sequence:
                                - service: light.turn_on
                                  target:
                                    entity_id: "{{ repeat.item }}"
                                  data:
                                    brightness: 255
                                    rgb_color: !input max_flash_rgb_color
                                    transition: 0
                                - delay:
                                    milliseconds: !input max_flash_ms
                                - service: light.turn_on
                                  target:
                                    entity_id: "{{ repeat.item }}"
                                  data:
                                    brightness_pct: 100
                                    color_temp_kelvin: "{{ current_color_temp | int(max_color_temp_kelvin | int(4000)) }}"
                                    transition: 0
            default:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_entity_list }}"
                data:
                  brightness_step_pct: !input brightness_step_pct
                  transition: 0

      - conditions: >
          {{ trigger.id.startswith('scroll_down_')
             and not (current_scroll_opposite_active | bool)
             and (scroll_delta_seconds | float(999)) >= (scroll_debounce_seconds | float(0)) }}
        sequence:
          - choose:
              - conditions: "{{ enforce_min_brightness_on_scroll_down }}"
                sequence:
                  - repeat:
                      for_each: "{{ target_entity_list }}"
                      sequence:
                        - choose:
                            - conditions: "{{ not is_state(repeat.item, 'off') }}"
                              sequence:
                                - variables:
                                    current_brightness: "{{ state_attr(repeat.item, 'brightness') | int(255) }}"
                                    current_pct: "{{ ((current_brightness / 255) * 100) | round(0) | int }}"
                                    next_pct: "{{ [min_brightness_pct | int(10), (current_pct | int(100)) - (brightness_step_pct | int(20))] | max }}"
                                - service: light.turn_on
                                  target:
                                    entity_id: "{{ repeat.item }}"
                                  data:
                                    brightness_pct: "{{ next_pct | int(min_brightness_pct | int(10)) }}"
                                    transition: 0
            default:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_entity_list }}"
                data:
                  brightness_step_pct: "{{ (brightness_step_pct | int(20)) * -1 }}"
                  transition: 0

      - conditions: >
          {{ event_type == 'multi_press_1'
             and (this.attributes.last_triggered is none
                  or (as_timestamp(now()) - as_timestamp(this.attributes.last_triggered)) > (press_debounce_seconds | float(0.35))) }}
        sequence:
          - choose:
              - conditions: "{{ is_state(first_target_entity, 'on') }}"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: "{{ target_entity_list }}"
              - conditions: "{{ not is_state(first_target_entity, 'on') }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: "{{ target_entity_list }}"
                    data:
                      brightness_pct: "{{ reading_brightness_pct | int(75) }}"
                      color_temp_kelvin: "{{ reading_color_temp_kelvin | int(4000) }}"
                      transition: 0

      - conditions: "{{ event_type == 'multi_press_2' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_entity_list }}"
            data:
              brightness_pct: "{{ reading_brightness_pct | int(75) }}"
              color_temp_kelvin: "{{ reading_color_temp_kelvin | int(4000) }}"
              transition: 0

      - conditions: "{{ event_type == 'multi_press_3' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_entity_list }}"
            data:
              brightness_pct: "{{ max_brightness_pct | int(100) }}"
              color_temp_kelvin: "{{ max_color_temp_kelvin_selected | int(4000) }}"
              transition: 0

      - conditions: "{{ event_type == 'long_press' }}"
        sequence:
          - repeat:
              while: >
                {{ state_attr(current_button_entity, 'event_type') == 'long_press'
                   and repeat.index < 100 }}
              sequence:
                - variables:
                    step_target_color_temp_kelvin: >
                      {% set base = hold_start_color_temp_kelvin | int(min_color_temp_kelvin | int) %}
                      {% set offset = (repeat.index | int(1)) * (color_temp_step_kelvin | int(150)) %}
                      {% if current_hold_direction == 'cooler' %}
                        {{ [base + offset, max_color_temp_kelvin | int(4000)] | min }}
                      {% else %}
                        {{ [base - offset, min_color_temp_kelvin | int(2200)] | max }}
                      {% endif %}
                    at_hold_limit: >
                      {% if current_hold_direction == 'cooler' %}
                        {{ (step_target_color_temp_kelvin | int) >= (max_color_temp_kelvin | int(4000)) }}
                      {% else %}
                        {{ (step_target_color_temp_kelvin | int) <= (min_color_temp_kelvin | int(2200)) }}
                      {% endif %}
                - choose:
                    - conditions: "{{ at_hold_limit }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: "{{ target_entity_list }}"
                          data:
                            brightness: "{{ state_attr(first_target_entity, 'brightness') | int(default=255) }}"
                            rgb_color: !input max_flash_rgb_color
                            transition: 0
                        - delay:
                            milliseconds: !input max_flash_ms
                        - service: light.turn_on
                          target:
                            entity_id: "{{ target_entity_list }}"
                          data:
                            brightness: "{{ state_attr(first_target_entity, 'brightness') | int(default=255) }}"
                            color_temp_kelvin: "{{ step_target_color_temp_kelvin | int(min_color_temp_kelvin | int(2200)) }}"
                            transition: 0
                        - stop: Reached color temperature limit
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ target_entity_list }}"
                      data:
                        color_temp_kelvin: "{{ step_target_color_temp_kelvin | int(min_color_temp_kelvin | int(2200)) }}"
                        transition: 0
                - delay:
                    milliseconds: !input hold_repeat_ms

      - conditions: "{{ event_type == 'long_release' }}"
        sequence:
          - service: input_text.set_value
            target:
              entity_id: !input hold_state_helper
            data:
              value: >
                {% set parts = hold_state_csv.split(',') %}
                {% set normalized = [
                  parts[0] if parts|count > 0 and parts[0] in ['cooler', 'warmer'] else 'cooler',
                  parts[1] if parts|count > 1 and parts[1] in ['cooler', 'warmer'] else 'cooler',
                  parts[2] if parts|count > 2 and parts[2] in ['cooler', 'warmer'] else 'cooler'
                ] %}
                {% set idx = current_channel_index | int %}
                {% set replacement = 'warmer' if normalized[idx] == 'cooler' else 'cooler' %}
                {% set ns = namespace(result=[]) %}
                {% for value in normalized %}
                  {% if loop.index0 == idx %}
                    {% set ns.result = ns.result + [replacement] %}
                  {% else %}
                    {% set ns.result = ns.result + [value] %}
                  {% endif %}
                {% endfor %}
                {{ ns.result | join(',') }}
