- id: button_orange_2_dining_ch1_scroll_up
  alias: Button_orange_2 Dining Channel 1 Scroll Up
  mode: restart
  trigger:
  - platform: state
    entity_id: sensor.bilresa_scroll_wheel_current_switch_position_1_6
    to: '1'
  condition:
  - condition: template
    value_template: "{{ this.attributes.last_triggered is none or (as_timestamp(now()) - as_timestamp(this.attributes.last_triggered)) > 0.20 }}"
  - condition: template
    value_template: "{{ not is_state('sensor.bilresa_scroll_wheel_current_switch_position_2_6', '1') }}"
  action:
  - service: light.turn_on
    target:
      entity_id: light.dining_room_lights
    data:
      brightness_step_pct: 10
      transition: 0
