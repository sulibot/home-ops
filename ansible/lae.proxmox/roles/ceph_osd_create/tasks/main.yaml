---
- name: Validate canonical Ceph OSD inventory exists
  ansible.builtin.assert:
    that:
      - ceph_osds is defined
      - ceph_osds | length > 0
    fail_msg: "ceph_osds must be defined for {{ inventory_hostname }}"

- name: Validate Ceph OSD intent schema
  ansible.builtin.assert:
    that:
      - item.osd_id is defined
      - item.data_device is defined
      - item.class is defined
      - item.class in ['hdd', 'ssd', 'nvme']
      - item.expected_bluefs_db | default(false) | bool == false or item.db_device is defined
    fail_msg: "Invalid ceph_osds entry for {{ inventory_hostname }}: {{ item }}"
  loop: "{{ ceph_osds }}"
  loop_control:
    label: "osd.{{ item.osd_id }}"

- name: Check whether Ceph is safe for OSD create work
  ansible.builtin.shell: |
    set -o pipefail
    bad_pg_count="$(
      ceph pg dump pgs_brief 2>/dev/null |
        awk '/degraded|undersized|remapped|backfill|recover|peering|stale|incomplete/ {c++} END {print c+0}'
    )"
    osd_stat="$(ceph osd stat)"
    total_osds="$(printf '%s\n' "$osd_stat" | awk '{print $1}')"
    up_osds="$(printf '%s\n' "$osd_stat" | sed -n 's/.*: \([0-9][0-9]*\) up.*/\1/p')"
    in_osds="$(printf '%s\n' "$osd_stat" | sed -n 's/.*up.* \([0-9][0-9]*\) in.*/\1/p')"
    test "$bad_pg_count" -eq 0
    test "$total_osds" = "$up_osds"
    test "$total_osds" = "$in_osds"
  args:
    executable: /bin/bash
  register: ceph_osd_create_clean_check
  changed_when: false
  failed_when: false

- name: Refuse OSD create work unless the cluster is clean
  ansible.builtin.assert:
    that:
      - ceph_osd_create_clean_check.rc == 0
    fail_msg: "Ceph is not fully active+clean/up/in; do not create OSDs while recovery/backfill is active."
  when: ceph_osd_create_require_clean | bool

- name: Inspect declared OSD state
  ansible.builtin.shell: |
    set -o pipefail
    osd_id="{{ item.osd_id }}"
    data_device="{{ item.data_device }}"
    expected_class="{{ item.class }}"
    expected_db="{{ item.expected_bluefs_db | default(false) | bool | ternary('1', '0') }}"
    drive_bucket="{{ item.drive_bucket | default('') }}"

    data_exists=0
    [ -b "$data_device" ] && data_exists=1

    db_exists=0
    {% if item.db_device is defined %}
    [ -e "{{ item.db_device }}" ] && db_exists=1
    {% endif %}

    metadata_json="$(ceph osd metadata "$osd_id" --format json 2>/dev/null || true)"
    exists=0
    live_db=""
    live_wal=""
    live_devices=""
    if [ -n "$metadata_json" ]; then
      exists=1
      live_db="$(printf '%s\n' "$metadata_json" | jq -r '.bluefs_dedicated_db // "unknown"')"
      live_wal="$(printf '%s\n' "$metadata_json" | jq -r '.bluefs_dedicated_wal // "unknown"')"
      live_devices="$(printf '%s\n' "$metadata_json" | jq -r '.devices // "unknown"')"
    fi

    live_class="$(ceph osd crush get-device-class "osd.$osd_id" 2>/dev/null || true)"
    crush_ok=1
    if [ -n "$drive_bucket" ] && [ "$exists" = "1" ]; then
      ceph osd tree --format json |
        jq -e --arg osd "osd.$osd_id" --arg bucket "$drive_bucket" '
          .nodes as $nodes
          | ($nodes[] | select(.name == $osd).id) as $osd_id
          | ($nodes[] | select(.name == $bucket).children) as $children
          | ($children | index($osd_id)) != null
        ' >/dev/null || crush_ok=0
    fi

    jq -n \
      --argjson osd_id "$osd_id" \
      --argjson exists "$exists" \
      --argjson data_exists "$data_exists" \
      --argjson db_exists "$db_exists" \
      --arg expected_class "$expected_class" \
      --arg live_class "$live_class" \
      --arg expected_db "$expected_db" \
      --arg live_db "$live_db" \
      --arg live_wal "$live_wal" \
      --arg live_devices "$live_devices" \
      --arg drive_bucket "$drive_bucket" \
      --argjson crush_ok "$crush_ok" \
      '{
        osd_id: $osd_id,
        exists: ($exists == 1),
        data_exists: ($data_exists == 1),
        db_exists: ($db_exists == 1),
        expected_class: $expected_class,
        live_class: $live_class,
        expected_db: ($expected_db == "1"),
        live_db: $live_db,
        live_wal: $live_wal,
        live_devices: $live_devices,
        drive_bucket: $drive_bucket,
        crush_ok: ($crush_ok == 1)
      }'
  args:
    executable: /bin/bash
  register: ceph_osd_create_inspection
  changed_when: false
  loop: "{{ ceph_osds }}"
  loop_control:
    label: "osd.{{ item.osd_id }}"

- name: Report OSD reconciliation plan
  ansible.builtin.debug:
    msg: >-
      osd.{{ (item.stdout | from_json).osd_id }}
      exists={{ (item.stdout | from_json).exists }}
      data_exists={{ (item.stdout | from_json).data_exists }}
      db_exists={{ (item.stdout | from_json).db_exists }}
      class={{ (item.stdout | from_json).live_class | default('') }}/{{ (item.stdout | from_json).expected_class }}
      live_db={{ (item.stdout | from_json).live_db | default('') }}
      crush_ok={{ (item.stdout | from_json).crush_ok }}
      action={{ ((item.stdout | from_json).exists) | ternary('skip-existing', 'create-if-execute') }}
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"

- name: Fail if declared data devices are missing
  ansible.builtin.assert:
    that:
      - (item.stdout | from_json).data_exists
    fail_msg: "{{ item.item.data_device }} for osd.{{ item.item.osd_id }} does not exist."
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"

- name: Fail if declared DB devices are missing for DB-backed OSDs
  ansible.builtin.assert:
    that:
      - (item.stdout | from_json).db_exists
    fail_msg: "{{ item.item.db_device }} for osd.{{ item.item.osd_id }} does not exist."
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"
  when:
    - item.item.expected_bluefs_db | default(false) | bool

- name: Fail if existing OSD class does not match intent
  ansible.builtin.assert:
    that:
      - (item.stdout | from_json).live_class == (item.stdout | from_json).expected_class
    fail_msg: >-
      osd.{{ item.item.osd_id }} class mismatch:
      live={{ (item.stdout | from_json).live_class }}
      expected={{ (item.stdout | from_json).expected_class }}
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"
  when:
    - ceph_osd_create_enforce_class | bool
    - (item.stdout | from_json).exists

- name: Fail if existing OSD is not under declared CRUSH drive bucket
  ansible.builtin.assert:
    that:
      - (item.stdout | from_json).crush_ok
    fail_msg: "osd.{{ item.item.osd_id }} is not under {{ item.item.drive_bucket }}."
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"
  when:
    - ceph_osd_create_enforce_crush | bool
    - item.item.drive_bucket is defined
    - (item.stdout | from_json).exists

- name: Fail if existing OSD is expected to have a dedicated DB but does not
  ansible.builtin.assert:
    that:
      - ((item.stdout | from_json).live_db | string) == '1'
    fail_msg: "osd.{{ item.item.osd_id }} is expected to use dedicated DB but live metadata says it does not."
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }}"
  when:
    - ceph_osd_create_enforce_db | bool
    - item.item.expected_bluefs_db | default(false) | bool
    - (item.stdout | from_json).exists

- name: Prepare missing Ceph OSDs with ceph-volume
  ansible.builtin.command:
    cmd: >
      ceph-volume lvm prepare
      --bluestore
      --osd-id {{ item.item.osd_id }}
      --crush-device-class {{ item.item.class }}
      --data {{ item.item.data_device }}
      {% if item.item.expected_bluefs_db | default(false) | bool %}
      --block.db {{ item.item.db_device }}
      {% endif %}
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }} -> {{ item.item.data_device }}"
  become: true
  when:
    - ceph_osd_create_execute | bool
    - not (item.stdout | from_json).exists

- name: Activate prepared OSDs
  ansible.builtin.command:
    cmd: ceph-volume lvm activate --all
  become: true
  when:
    - ceph_osd_create_execute | bool
    - ceph_osd_create_inspection.results | selectattr('stdout', 'search', '"exists": false') | list | length > 0

- name: Ensure CRUSH device class is explicitly set for created/missing OSDs
  ansible.builtin.command:
    cmd: "ceph osd crush set-class {{ item.item.class }} osd.{{ item.item.osd_id }}"
  loop: "{{ ceph_osd_create_inspection.results }}"
  loop_control:
    label: "osd.{{ item.item.osd_id }} class={{ item.item.class }}"
  become: true
  when:
    - ceph_osd_create_execute | bool
    - not (item.stdout | from_json).exists
