- name: Stop legacy kubevip role before it creates a second source of truth
  ansible.builtin.fail:
    msg: >-
      The active cluster-101 kube-vip BGP anycast implementation is generated by
      terraform/infra/modules/talos_config as a Talos machine.pods static pod.
      This legacy kubeadm-era Ansible role is intentionally disabled to avoid
      hand-rendered kube-vip manifests drifting from the Terraform/Talos apply
      path.
