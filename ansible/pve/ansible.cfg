[defaults]
inventory           = inventory/hosts.ini
roles_path          = ./roles:../common/roles:~/.ansible/roles
# Collections are installed via `ansible-galaxy collection install -r
# requirements.yml` (see README) rather than vendored in git.
collections_path    = ~/.ansible/collections
host_key_checking   = False

[ssh_connection]
ssh_args = -o ForwardAgent=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null


[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes'
ansible_python_interpreter=/usr/bin/python3