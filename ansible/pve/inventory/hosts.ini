[all:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[pve:vars]
ansible_user = root

[all_nodes]
pve01 ansible_host=fd00:10::1 ansible_service_host=fd00:0:0:ffff::1 node_role=bootstrap ceph_role=mon,osd
pve02 ansible_host=fd00:10::2 ansible_service_host=fd00:0:0:ffff::2 node_role=standard  ceph_role=mon,osd
pve03 ansible_host=fd00:10::3 ansible_service_host=fd00:0:0:ffff::3 node_role=standard  ceph_role=mon,osd


[pve]
pve01 ansible_host=fd00:10::1 ansible_service_host=fd00:0:0:ffff::1 node_role=bootstrap ceph_role=mon,osd
pve02 ansible_host=fd00:10::2 ansible_service_host=fd00:0:0:ffff::2 node_role=standard  ceph_role=mon,osd
pve03 ansible_host=fd00:10::3 ansible_service_host=fd00:0:0:ffff::3 node_role=standard  ceph_role=mon,osd

[cluster]
pve01 ansible_host=fd00:10::1 ansible_service_host=fd00:0:0:ffff::1 node_role=bootstrap ceph_role=mon,osd
pve02 ansible_host=fd00:10::2 ansible_service_host=fd00:0:0:ffff::2 node_role=standard  ceph_role=mon,osd
pve03 ansible_host=fd00:10::3 ansible_service_host=fd00:0:0:ffff::3 node_role=standard  ceph_role=mon,osd


[bootstrap]
pve01

[ceph_mon]
pve01
pve02
pve03

[ceph_mgr]
pve01

[ceph_osd]
pve01
pve02
pve03

[edge_routers]
routeros ansible_host=10.0.30.254 ansible_user=admin ansible_network_os=community.routeros.routeros ansible_connection=ansible.netcommon.network_cli ansible_ssh_private_key_file=~/.ssh/id_ed25519
